<!-- 상각_07-19: 팀장 원본 마이페이지를 변경하지 않는 일반회원 비밀번호 변경 화면 -->
<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>비밀번호 변경 | PetCity</title><style>body{font-family:sans-serif;background:#f6f8fb}.box{max-width:560px;margin:70px auto;padding:36px;background:white;border-radius:20px;box-shadow:0 12px 35px #1f35521a}label{display:block;font-weight:700;margin:18px 0 7px}input{box-sizing:border-box;width:100%;padding:13px;border:1px solid #ccd5e1;border-radius:10px}button{width:100%;margin-top:24px;padding:14px;border:0;border-radius:10px;background:#2563eb;color:white;font-weight:700}.msg{padding:14px;background:#fff1f2;color:#b42338;border-radius:10px}</style></head><body><main class="box"><h1>비밀번호 변경</h1><p>8자 이상이며 영문·숫자·특수문자를 모두 포함해주세요.</p><p th:if="${message}" class="msg" th:text="${message}"></p><form method="post" action="/member/feature/password"><label>현재 비밀번호</label><input type="password" name="currentPassword" required><label>새 비밀번호</label><input type="password" name="newPassword" required><label>새 비밀번호 확인</label><input type="password" name="newPasswordConfirm" required><button>비밀번호 변경</button></form></main></body></html>
