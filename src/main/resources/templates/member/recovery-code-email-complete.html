<!-- 상각_07-19: 복구코드 재발급 완료 안내 화면 -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>복구코드 재발급 완료 | PetCity</title>

    <!-- 07-22 상각 : 공통 헤더 CSS 적용 -->
    <link rel="stylesheet"
          th:href="@{/css/common/head.css}">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f8fb;
            color: #111827;
        }

        .page {
            padding: 60px 20px 80px;
        }

        .card {

            width: 100%;
            max-width: 620px;

            margin: 0 auto;

            padding: 42px 38px;

            background: #ffffff;

            border-radius: 20px;

            box-shadow: 0 12px 35px rgba(31, 53, 82, .10);

            text-align: center;

        }

        .icon {

            width: 58px;
            height: 58px;

            margin: 0 auto 22px;

            border-radius: 50%;

            background: #ecfdf3;

            color: #039855;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 34px;
            font-weight: bold;

        }

        h1 {

            margin: 0 0 24px;

            font-size: 30px;

        }

        .msg {

            padding: 18px;

            border-radius: 12px;

            background: #ecfdf3;

            color: #027a48;

            font-weight: 700;

            line-height: 1.8;

        }

        .button {

            display: inline-block;

            margin-top: 30px;

            padding: 14px 28px;

            border-radius: 10px;

            background: #2563eb;

            color: white;

            text-decoration: none;

            font-weight: bold;

        }

    </style>

</head>

<body>

<!-- 07-22 상각 : 로그인 페이지와 동일한 공통 헤더 적용 -->
<th:block th:replace="~{common/head :: head}"></th:block>

<div class="page">

    <main class="card">

        <div class="icon">
            ✓
        </div>

        <h1>새 복구코드 발송 완료</h1>

        <div class="msg">

            등록된 이메일로 새 복구코드를 발송했습니다.<br>

            기존 복구코드는 더 이상 사용할 수 없습니다.

        </div>

        <a class="button"
           th:href="${snsRecovery == true ? '/member/recovery?type=sns' : '/member/recovery?type=local'}">

            탈퇴 취소 요청하기

        </a>

    </main>

</div>

</body>
</html>
