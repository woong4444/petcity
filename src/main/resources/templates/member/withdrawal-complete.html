<!-- 상각_07-19: 8080 독립 탈퇴 완료 및 복구코드 안내 화면 -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>탈퇴 접수 완료 | PetCity</title>

    <!-- 07-22 상각 : 공통 헤더 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/common/head.css}">

    <style>

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f6f8fb;
        }

        .page {
            padding: 55px 20px 70px;
        }

        .box {
            max-width: 600px;
            margin: 0 auto;
            padding: 38px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 35px #1f35521a;
            text-align: center;
        }

        .code {
            padding: 20px;
            margin: 24px 0;
            background: #0f172a;
            color: #fff;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 3px;
        }

        .warn {
            color: #b42318;
            font-weight: 700;
        }

        .links {
            margin-top: 30px;
        }

        .links a {
            display: inline-block;
            padding: 13px 24px;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

    </style>

</head>

<body>

<!-- 07-22 상각 : 공통 헤더 -->
<th:block th:replace="~{common/head :: head}"></th:block>

<div class="page">

    <main class="box">

        <h1>탈퇴 요청이 접수되었습니다</h1>

        <p>
            탈퇴 대기 상태로 전환되었습니다.<br>
            3일 후 계정이 완전히 삭제되며,
            삭제 전까지 복구를 신청할 수 있습니다.
        </p>

        <div th:if="${recoveryCode != null}"
             class="code"
             th:text="${recoveryCode}">
        </div>

        <p th:if="${recoveryCode == null}"
           class="warn">
            복구코드는 탈퇴 직후에만 표시됩니다.
        </p>

        <div class="links">

            <a th:href="${snsMember == true ? '/member/recovery?type=sns' : '/member/recovery?type=local'}">
                탈퇴 취소 및 복구 신청
            </a>

        </div>

    </main>

</div>

</body>
</html>
