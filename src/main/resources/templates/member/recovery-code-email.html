<!-- 상각_07-19: 8080 독립 복구코드 이메일 재발급 화면 -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>복구코드 이메일 재발급 | PetCity</title>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <style>
        body {
            background: #f6f8fb
        }

        .box {
            max-width: 540px;
            margin: 65px auto;
            padding: 34px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 35px #1f35521a
        }

        .box label {
            display: block;
            font-weight: 700;
            margin: 17px 0 7px
        }

        .box input {
            box-sizing: border-box;
            width: 100%;
            padding: 13px;
            border: 1px solid #d4dce8;
            border-radius: 10px
        }

        .box button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            font-weight: 800
        }

        .note, .msg, .ok {
            padding: 14px;
            border-radius: 10px;
            line-height: 1.6
        }

        .note {
            background: #eff6ff;
            color: #1d4ed8
        }

        .msg {
            background: #fff1f2;
            color: #b42338
        }

        .ok {
            background: #ecfdf3;
            color: #067647
        }

        .help {
            margin: 8px 0 0;
            color: #667085;
            font-size: 14px;
            line-height: 1.6
        }

        .back {
            display: block;
            margin-top: 18px;
            text-align: center
        }
    </style>
</head>
<body>
<header th:replace="~{common/head :: head}"></header>
<main class="box">
    <h1>복구코드 이메일 받기</h1>
    <p class="note">가입할 때 확인된 등록 이메일로 새 복구코드를 바로 발송합니다.</p>
    <div th:if="${message}" class="msg" th:text="${message}"></div>
    <form method="post" action="/member/recovery-code-email/send">
        <input type="hidden" name="accountType" th:value="${snsRecovery ? 'sns' : 'local'}">
        <label th:text="${snsRecovery ? 'SNS 등록 이메일' : '등록 이메일'}">등록 이메일</label>
        <input type="email" name="loginId" th:value="${prefillLoginId}"
               th:placeholder="${snsRecovery ? 'SNS 가입에 사용한 이메일 주소' : '가입 시 등록한 이메일 주소'}" autocomplete="username"
               required>
        <p class="help"
           th:text="${snsRecovery ? 'Google·Kakao·Naver 가입에 사용한 이메일 주소를 입력해주세요.' : '일반회원 가입 시 등록한 이메일 주소를 입력해주세요.'}"></p>
        <button>등록 이메일로 새 복구코드 받기</button>
    </form>
    <a class="back" th:href="${snsRecovery ? '/member/recovery?type=sns' : '/member/recovery?type=local'}">탈퇴 취소 요청으로
        돌아가기</a>
</main>
</body>
</html>
