<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삭제된 계정 | PetCity</title>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <style>
        body {
            background: #f6f8fb;
            color: #172033
        }

        .notice {
            max-width: 620px;
            margin: 72px auto;
            padding: 38px;
            background: #fff;
            border: 1px solid #fee2e2;
            border-radius: 22px;
            box-shadow: 0 14px 38px rgba(31, 53, 82, .1)
        }

        .badge {
            display: inline-block;
            padding: 7px 11px;
            border-radius: 999px;
            background: #fff1f2;
            color: #be123c;
            font-weight: 800
        }

        .notice h1 {
            margin: 18px 0 10px
        }

        .description {
            color: #667085;
            line-height: 1.7
        }

        .reason {
            margin: 26px 0;
            padding: 20px;
            background: #fff7ed;
            border-left: 5px solid #f97316;
            border-radius: 12px
        }

        .reason span {
            display: block;
            margin-bottom: 8px;
            color: #9a3412;
            font-size: 14px;
            font-weight: 800
        }

        .reason strong {
            display: block;
            white-space: pre-wrap;
            line-height: 1.7
        }

        .links {
            display: flex;
            gap: 12px;
            margin-top: 28px
        }

        .links a {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: 800
        }

        .home {
            background: #2563eb;
            color: #fff
        }

        .login {
            background: #eef2f6;
            color: #344054
        }

        @media (max-width: 600px) {
            .notice {
                margin: 30px 16px;
                padding: 26px
            }

            .links {
                flex-direction: column
            }
        }
    </style>
</head>
<body>
<header th:replace="~{common/head :: head}"></header>
<main class="notice">
    <span class="badge">이용 제한 계정</span>
    <h1>관리자에 의해 삭제된 계정입니다</h1>
    <p class="description"><strong th:text="${loginId}">member</strong> 계정은 더 이상 PetCity에 로그인할 수 없습니다.</p>
    <section class="reason">
        <span>계정 삭제 사유</span>
        <strong th:text="${deleteReason != null && !deleteReason.isBlank() ? deleteReason : '운영 정책에 따라 계정이 삭제되었습니다.'}">삭제
            사유</strong>
    </section>
    <p class="description">삭제 조치에 문의가 필요한 경우 운영자에게 계정 아이디와 함께 문의해주세요.</p>
    <div class="links"><a class="login" href="/member/login">로그인 화면</a><a class="home" href="/">홈으로</a></div>
</main>
</body>
</html>
