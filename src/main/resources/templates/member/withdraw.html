<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>회원 탈퇴 | PetCity</title><link rel="stylesheet" th:href="@{/css/common/head.css}"><style>.box{max-width:650px;margin:60px auto;padding:36px;border:1px solid #fee2e2;border-radius:20px;box-shadow:0 12px 35px #1f35521a}.warn{padding:16px;background:#fff7ed;color:#9a3412;border-radius:12px;line-height:1.7;margin:15px 0}.box label{display:block;font-weight:800;margin:20px 0 8px}.box textarea,.box input{box-sizing:border-box;width:100%;padding:13px;border:1px solid #d4dce8;border-radius:10px}.box textarea{min-height:130px;resize:vertical}.buttons{display:flex;gap:12px;margin-top:24px}.buttons *{flex:1;text-align:center;padding:14px;border-radius:10px;font-weight:800;text-decoration:none}.cancel{background:#eef2f6;color:#344054}.submit{border:0;background:#dc2626;color:#fff}.msg{padding:14px;background:#fff1f2;color:#b42338;border-radius:10px}</style></head><body><header th:replace="~{common/head :: head}"></header><main class="box"><h1>회원 탈퇴</h1><div class="warn">탈퇴 요청 즉시 로그아웃되며, 3일 후 계정이 완전히 삭제됩니다. 삭제되기 전까지 탈퇴 취소 및 복구를 신청해주세요.</div><div th:if="${withdrawMessage}" class="msg" th:text="${withdrawMessage}"></div><form method="post" action="/member/mypage/withdraw" onsubmit="return confirm('탈퇴를 요청하시겠습니까?');"><label>탈퇴 사유</label><textarea name="deleteReason" minlength="5" maxlength="500" required></textarea><div th:if="${member.loginType == null || member.loginType == 'LOCAL'}"><label>현재 비밀번호</label><input type="password" name="password" autocomplete="current-password" required></div><div class="buttons"><a class="cancel" href="/member/mypage">취소</a><button class="submit">탈퇴 요청</button></div></form></main></body></html>
