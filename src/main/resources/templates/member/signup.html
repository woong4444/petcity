<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>회원가입 | PetCity</title>

    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <link rel="stylesheet" th:href="@{/css/member/signup.css}">

</head>

<body>

<header th:replace="~{common/head :: head}"></header>

<section class="signup-section">

    <div class="signup-container">

        <!-- ================= LEFT ================= -->

        <div class="signup-left">

            <img th:src="@{/images/signup.jpg}"
                 class="signup-image">

            <h2>
                우리 아이를 위한<br>
                동물병원 플랫폼
            </h2>

            <p>

                가까운 병원 찾기부터
                진료기록 관리까지
                PetCity 하나면 충분합니다.

            </p>

            <ul>

                <li>🏥 가까운 동물병원 찾기</li>

                <li>📋 진료기록 관리</li>

                <li>💉 예방접종 일정 관리</li>

                <li>⭐ 병원 리뷰 확인</li>

            </ul>

        </div>

        <!-- ================= RIGHT ================= -->

        <div class="signup-right">

            <h1>🐾 3초 만에 시작하기</h1>

            <p>

                SNS 계정으로 쉽고 빠르게 시작하세요.

            </p>

            <!-- ================================================= -->
            <!-- 07-15 오후 추가_상각 : SNS 이메일 수집 동의 -->
            <!-- ================================================= -->

            <div class="agreement-box">

                <label class="agreement-label">

                    <input
                            type="checkbox"
                            id="agreementEmail">

                    <span>

            이메일 수집 및 개인정보 이용에 동의합니다.
            <strong>(필수)</strong>

        </span>

                </label>

                <p class="agreement-desc">

                    SNS 회원가입을 위해 이메일 수집 동의가 필요합니다.

                </p>

            </div>

            <a href="/oauth2/authorization/google"
               id="googleLoginBtn"
               class="sns-btn google">

                Google로 시작하기

            </a>

            <a href="/oauth2/authorization/kakao"
               id="kakaoLoginBtn"
               class="sns-btn kakao">
                Kakao로 시작하기

            </a>

            <a href="/oauth2/authorization/naver"
               id="naverLoginBtn"
               class="sns-btn naver">
                NAVER로 시작하기

            </a>

            <div class="divider">

                <span>또는</span>

            </div>

            <a href="/member/signup/form"
               class="normal-btn">

                일반 회원가입

            </a>

            <div class="login-link">

                이미 회원이신가요?

                <a href="/member/login">

                    로그인

                </a>

            </div>

        </div>

    </div>

</section>

<!-- ================================================= -->
<!-- 07-15 오후 추가_상각 : 회원가입 JS -->
<!-- ================================================= -->
<script th:src="@{/js/member/signup.js}"></script>

</body>
</html>
