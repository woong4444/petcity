<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>이미 가입된 계정 | PetCity</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: #f4f7fb;
            font-family: Arial, "Noto Sans KR", sans-serif;
            color: #111827
        }

        .card {
            width: min(560px, calc(100% - 32px));
            margin: 12vh auto;
            padding: 44px;
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 18px 50px #1f35521f;
            text-align: center
        }

        h1 {
            margin: 0 0 20px;
            font-size: 30px
        }

        .notice {
            padding: 20px;
            border-radius: 14px;
            background: #fff1f2;
            color: #c0263d;
            line-height: 1.7;
            font-weight: 700
        }

        p {
            margin: 20px 0;
            color: #667085;
            line-height: 1.7
        }

        .redirect {
            margin-top: -8px;
            font-weight: 700;
            color: #475467
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center
        }

        .actions a {
            padding: 14px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800
        }

        .login {
            background: #2563eb;
            color: #fff
        }

        .home {
            background: #edf1f7;
            color: #344054
        }
    </style>
</head>
<body>
<main class="card">
    <!-- 상각_07-19: 기존 SNS 회원의 중복 회원가입 방지 안내 -->
    <h1>이미 가입된 SNS 계정입니다</h1>
    <div class="notice">해당 SNS 계정은 이미 PetCity 회원으로 등록되어 있습니다.</div>
    <p>새로 가입할 필요 없이 로그인 페이지에서 같은 SNS 계정으로 로그인해 주세요.</p>
    <p class="redirect">10초 후 메인 화면으로 이동합니다.</p>
    <div class="actions">

        <!-- 07-22 상각 : 공통 헤더에서 메인 이동이 가능하므로 메인 버튼 제거 -->
        <a class="login" th:href="@{/member/login}">
            로그인 페이지로
        </a>

    </div>
</main>
</body>
</html>
