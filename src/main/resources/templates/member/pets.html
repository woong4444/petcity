<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pets | PetCity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
</head>
<body class="bg-slate-50 font-sans pb-20">

<header th:replace="~{common/head :: head}"></header>

<main class="max-w-[1024px] w-full mx-auto px-4 mt-12 space-y-10 mb-20">

    <div class="flex items-end justify-between border-b border-slate-200 pb-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 flex items-center gap-3 m-0">
                <span class="text-4xl">🐾</span> 내 반려동물
            </h1>
            <p class="text-slate-500 font-bold mt-2 m-0">반려동물 정보를 등록하고 관리하세요.</p>
        </div>
        <a href="/member/mypage" class="text-sky-600 font-extrabold hover:text-sky-700 hover:underline">← 마이페이지</a>
    </div>

    <div class="space-y-6">
        <div th:if="${#lists.isEmpty(petList)}" class="bg-white border-2 border-dashed border-slate-300 rounded-[2.5rem] p-16 text-center shadow-sm">
            <div class="text-5xl mb-4 opacity-50">😿</div>
            <h3 class="text-xl font-extrabold text-slate-700 mb-2">등록된 반려동물이 없습니다.</h3>
            <p class="text-slate-500 font-bold">아래 버튼을 눌러 우리 아이를 등록해보세요.</p>
        </div>

        <ul th:unless="${#lists.isEmpty(petList)}" class="grid grid-cols-1 gap-6">
            <li th:each="pet : ${petList}" class="bg-white rounded-[2.5rem] border border-slate-200 p-6 md:p-8 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6 hover:shadow-md transition-shadow">

                <div class="flex items-center gap-6 w-full md:w-auto">
                    <img th:if="${not #strings.isEmpty(pet.photoUrl)}" th:src="${pet.photoUrl}" alt="pet photo" class="w-20 h-20 rounded-full object-cover shadow-sm shrink-0">
                    <div th:unless="${not #strings.isEmpty(pet.photoUrl)}" class="w-20 h-20 bg-orange-50 border border-orange-100 rounded-full flex items-center justify-center text-3xl shadow-inner shrink-0">🐾</div>
                    <div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tight mb-2 m-0" th:text="${pet.petName}">Pet Name</h2>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-sky-100 text-sky-700 px-3 py-1 rounded-lg text-xs font-extrabold" th:text="${pet.animalName}">Animal</span>
                            <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-xs font-extrabold" th:text="${pet.breedName}">Breed</span>
                        </div>
                        <p class="text-sm font-bold text-slate-500 m-0" th:text="${pet.birthDate} + ' / ' + ${pet.weight} + 'kg'">Info</p>
                    </div>
                </div>

                <!-- 🌟 버튼 50:50 정렬 완료! -->
                <div class="flex w-full md:w-96 gap-3 shrink-0">
                    <button type="button" class="flex-1 px-4 py-3.5 bg-white border-2 border-sky-100 text-sky-600 rounded-xl font-extrabold hover:bg-sky-50 hover:border-sky-200 text-center transition-all"
                            th:attr="data-id=${pet.petId},data-name=${pet.petName},data-animal=${pet.animalId},data-breed=${pet.breedName},data-gender=${pet.gender},data-birth=${pet.birthDate},data-weight=${pet.weight},data-reg=${pet.registrationNo}"
                            onclick="loadPet(this)">수정</button>
                    <form th:action="@{/pet/delete}" method="post" class="flex-1 m-0" onsubmit="return confirm('정말 이 반려동물을 삭제하시겠습니까?');">
                        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="petId" th:value="${pet.petId}">
                        <button type="submit" class="w-full px-4 py-3.5 bg-rose-50 border-2 border-rose-100 text-rose-500 rounded-xl font-extrabold hover:bg-rose-100 hover:border-rose-200 transition-all cursor-pointer">삭제</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>

    <section class="bg-white rounded-[2.5rem] border border-slate-200 p-8 shadow-sm mt-10" id="petFormCard">
        <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
            <h2 id="formTitle" class="text-2xl font-black text-slate-900 m-0">반려동물 등록</h2>
            <button type="button" onclick="resetForm()" class="text-sky-600 font-extrabold hover:text-sky-700 bg-sky-50 px-4 py-2 rounded-lg transition-colors">새로 등록</button>
        </div>

        <form id="petForm" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="petId" id="petId" value="0">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">이름</label>
                    <input name="petName" id="petName" required maxlength="30" class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">종류</label>
                    <select name="animalId" id="animalId" required onchange="fillBreeds()" class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                        <option value="">선택</option>
                        <option th:each="animal : ${animalTypeList}" th:value="${animal.animalId}" th:text="${animal.animalName}">Animal</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">품종</label>
                    <select name="breedName" id="breedName" required class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                        <option value="">종류를 먼저 선택하세요</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">성별 / 중성화</label>
                    <select name="gender" id="gender" required class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                        <option value="M">수컷</option>
                        <option value="F">암컷</option>
                        <option value="NM">중성화 수컷</option>
                        <option value="NF">중성화 암컷</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">생년월일</label>
                    <input type="date" name="birthDate" id="birthDate" required class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">몸무게(kg)</label>
                    <input type="number" name="weight" id="weight" min="0.1" step="0.1" required class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">등록번호 (선택)</label>
                    <input name="registrationNo" id="registrationNo" maxlength="15" placeholder="최대 15자리" class="p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:border-sky-400 transition-colors">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-extrabold text-sm text-slate-700">사진 (선택)</label>
                    <input type="file" name="file" accept="image/*" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-extrabold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100 transition-all cursor-pointer">
                </div>
            </div>

            <p id="saveMessage" class="text-rose-500 font-bold min-h-[20px] mt-4 mb-0"></p>

            <div class="pt-2">
                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black text-lg py-4 rounded-xl shadow-lg transition-colors" id="saveBtn">반려동물 저장</button>
            </div>
        </form>
    </section>
</main>

<script th:inline="javascript">
    const subAnimals = /*[[${subAnimalTypeList}]]*/ [];

    function fillBreeds(selectedBreed) {
        const animalId = document.getElementById('animalId').value;
        const breed = document.getElementById('breedName');
        breed.innerHTML = '<option value="">선택</option>';
        if (subAnimals) {
            subAnimals.filter(item => String(item.parentId) === String(animalId)).forEach(item => {
                const option = document.createElement('option');
                option.value = item.animalName;
                option.textContent = item.animalName;
                if (item.animalName === selectedBreed) option.selected = true;
                breed.appendChild(option);
            });
        }
    }

    function loadPet(button) {
        document.getElementById('petId').value = button.dataset.id;
        document.getElementById('petName').value = button.dataset.name;
        document.getElementById('animalId').value = button.dataset.animal;
        fillBreeds(button.dataset.breed);
        document.getElementById('gender').value = button.dataset.gender;
        document.getElementById('birthDate').value = button.dataset.birth;
        document.getElementById('weight').value = button.dataset.weight;
        document.getElementById('registrationNo').value = button.dataset.reg || '';
        document.getElementById('formTitle').textContent = '반려동물 수정';
        document.getElementById('petFormCard').scrollIntoView({behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('petForm').reset();
        document.getElementById('petId').value = 0;
        document.getElementById('breedName').innerHTML = '<option value="">종류를 먼저 선택하세요</option>';
        document.getElementById('formTitle').textContent = '반려동물 등록';
        document.getElementById('saveMessage').textContent = '';
    }

    document.addEventListener('DOMContentLoaded', function() {
        const petForm = document.getElementById('petForm');
        if(petForm) {
            petForm.addEventListener('submit', async event => {
                event.preventDefault();
                const message = document.getElementById('saveMessage');
                message.textContent = '';
                const formData = new FormData(event.target);

                // 🌟 DB 성별/중성화 에러 해결 로직 (가장 중요) 🌟
                const genderVal = formData.get('gender');
                if (genderVal === 'NM') {
                    formData.set('gender', 'M');
                    formData.append('neutered', 'Y');
                } else if (genderVal === 'NF') {
                    formData.set('gender', 'F');
                    formData.append('neutered', 'Y');
                } else {
                    formData.append('neutered', 'N');
                }

                try {
                    const response = await fetch('/pet/api/save', {method: 'POST', body: formData});
                    const result = await response.json();
                    if (result.isSuccess) { location.reload(); return; }
                    message.textContent = '저장에 실패했습니다. 입력값을 확인해주세요.';
                } catch(e) {
                    message.textContent = '서버 오류가 발생했습니다.';
                }
            });
        }
    });
</script>
</body>
</html>
