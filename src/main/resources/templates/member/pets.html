<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pets | PetCity</title>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
</head>
<body>
<header th:replace="~{common/head :: head}"></header>
<main class="pet-page">
    <div class="pet-page-title">
        <div><h1>&#128062; &#45236; &#48152;&#47140;&#46041;&#47932;</h1><p>&#48152;&#47140;&#46041;&#47932; &#51221;&#48372;&#47484; &#46321;&#47197;&#54616;&#44256; &#44288;&#47532;&#54616;&#49464;&#50836;.</p></div>
        <a href="/member/mypage">&#8592; &#47560;&#51060;&#54168;&#51060;&#51648;</a>
    </div>

    <section class="pet-list" th:if="${!#lists.isEmpty(petList)}">
        <article class="pet-card" th:each="pet : ${petList}">
            <img th:if="${pet.photoUrl}" th:src="${pet.photoUrl}" alt="pet photo">
            <div class="pet-image" th:unless="${pet.photoUrl}">&#128062;</div>
            <div class="pet-info"><h2 th:text="${pet.petName}">Pet</h2><p><b th:text="${pet.animalName}">Animal</b> <span th:text="${pet.breedName}">Breed</span></p><p th:text="${pet.birthDate} + ' / ' + ${pet.weight} + 'kg'">Info</p></div>
            <button type="button" class="edit-btn" th:attr="data-id=${pet.petId},data-name=${pet.petName},data-animal=${pet.animalId},data-breed=${pet.breedName},data-gender=${pet.gender},data-birth=${pet.birthDate},data-weight=${pet.weight},data-reg=${pet.registrationNo}" onclick="loadPet(this)">&#49688;&#51221;</button>
        </article>
    </section>
    <div class="empty-pet" th:if="${#lists.isEmpty(petList)}">&#46321;&#47197;&#46108; &#48152;&#47140;&#46041;&#47932;&#51060; &#50630;&#49845;&#45768;&#45796;. &#50500;&#47000; &#48260;&#53948;&#51012; &#45580;&#47084; &#46321;&#47197;&#54644;&#48372;&#49464;&#50836;.</div>

    <section class="pet-form-card" id="petFormCard">
        <div class="form-title"><h2 id="formTitle">&#48152;&#47140;&#46041;&#47932; &#46321;&#47197;</h2><button type="button" onclick="resetForm()" class="reset-btn">&#49352;&#47196; &#46321;&#47197;</button></div>
        <form id="petForm" enctype="multipart/form-data">
            <input type="hidden" name="petId" id="petId" value="0">
            <div class="form-grid">
                <label>&#51060;&#47492;<input name="petName" id="petName" required maxlength="30"></label>
                <label>&#51333;&#47448;<select name="animalId" id="animalId" required onchange="fillBreeds()"><option value="">&#49440;&#53469;</option><option th:each="animal : ${animalTypeList}" th:value="${animal.animalId}" th:text="${animal.animalName}">Animal</option></select></label>
                <label>&#54408;&#51333;<select name="breedName" id="breedName" required><option value="">&#51333;&#47448;&#47484; &#47676;&#51200; &#49440;&#53469;&#54616;&#49464;&#50836;</option></select></label>
                <label>&#49457;&#48324; / &#51473;&#49457;&#54868;<select name="gender" id="gender" required><option value="M">&#49688;&#52983;</option><option value="F">&#50516;&#52983;</option><option value="NM">&#51473;&#49457;&#54868; &#49688;&#52983;</option><option value="NF">&#51473;&#49457;&#54868; &#50516;&#52983;</option></select></label>
                <label>&#49373;&#45380;&#50900;&#51068;<input type="date" name="birthDate" id="birthDate" required></label>
                <label>&#47800;&#47924;&#44172;(kg)<input type="number" name="weight" id="weight" min="0.1" step="0.1" required></label>
                <label>&#46321;&#47197;&#48264;&#54840;<input name="registrationNo" id="registrationNo" maxlength="50"></label>
                <label>&#49324;&#51652;<input type="file" name="file" accept="image/*"></label>
            </div>
            <p id="saveMessage" class="save-message"></p>
            <button type="submit" class="save-btn" id="saveBtn">&#48152;&#47140;&#46041;&#47932; &#51200;&#51109;</button>
        </form>
    </section>
</main>
<style>
.pet-page{max-width:1080px;margin:52px auto 90px;padding:0 20px;color:#172033}.pet-page-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.pet-page-title h1{margin:0;font-size:30px}.pet-page-title p{color:#718096}.pet-page-title a{color:#2563eb;text-decoration:none;font-weight:800}.pet-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:18px;margin-bottom:28px}.pet-card{background:#fff;border:1px solid #e6ebf2;border-radius:18px;padding:18px;display:grid;grid-template-columns:68px 1fr;gap:14px;align-items:center;box-shadow:0 8px 24px rgba(31,53,82,.06)}.pet-card img,.pet-image{width:68px;height:68px;border-radius:50%;object-fit:cover;background:#eef7ff;display:flex;justify-content:center;align-items:center;font-size:30px}.pet-info h2{margin:0 0 6px;font-size:19px}.pet-info p{margin:3px 0;color:#62718a;font-size:14px}.edit-btn{grid-column:1/-1;border:1px solid #bfdbfe;background:#eff6ff;color:#2563eb;border-radius:9px;padding:9px;font-weight:800;cursor:pointer}.empty-pet{padding:25px;background:#f8fafc;border-radius:16px;color:#64748b;margin-bottom:25px}.pet-form-card{background:#fff;border:1px solid #dce8f7;border-radius:20px;padding:30px;box-shadow:0 12px 30px rgba(31,53,82,.08)}.form-title{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #edf0f5;margin-bottom:20px}.form-title h2{margin:0 0 16px}.reset-btn{border:0;background:none;color:#2563eb;font-weight:800;cursor:pointer}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.form-grid label{display:flex;flex-direction:column;gap:8px;font-weight:800;font-size:14px}.form-grid input,.form-grid select{border:1px solid #d8e0ec;border-radius:10px;padding:12px;font-size:15px}.save-btn{margin-top:22px;width:100%;background:#2563eb;color:#fff;border:0;border-radius:10px;padding:14px;font-size:16px;font-weight:800;cursor:pointer}.save-message{min-height:20px;color:#dc3545;font-weight:700;margin:14px 0 0}@media(max-width:650px){.pet-page-title{align-items:flex-start;flex-direction:column;gap:12px}.form-grid{grid-template-columns:1fr}}
</style>
<script th:inline="javascript">
const subAnimals = /*[[${subAnimalTypeList}]]*/ [];
function fillBreeds(selectedBreed){const animalId=document.getElementById('animalId').value;const breed=document.getElementById('breedName');breed.innerHTML='<option value="">Select</option>';subAnimals.filter(item=>String(item.parentId)===String(animalId)).forEach(item=>{const option=document.createElement('option');option.value=item.animalName;option.textContent=item.animalName;if(item.animalName===selectedBreed)option.selected=true;breed.appendChild(option);});}
function loadPet(button){document.getElementById('petId').value=button.dataset.id;document.getElementById('petName').value=button.dataset.name;document.getElementById('animalId').value=button.dataset.animal;fillBreeds(button.dataset.breed);document.getElementById('gender').value=button.dataset.gender;document.getElementById('birthDate').value=button.dataset.birth;document.getElementById('weight').value=button.dataset.weight;document.getElementById('registrationNo').value=button.dataset.reg||'';document.getElementById('formTitle').textContent='Edit Pet';document.getElementById('petFormCard').scrollIntoView({behavior:'smooth'});}
function resetForm(){document.getElementById('petForm').reset();document.getElementById('petId').value=0;document.getElementById('breedName').innerHTML='<option value="">Select animal first</option>';document.getElementById('formTitle').textContent='Register Pet';document.getElementById('saveMessage').textContent='';}
document.getElementById('petForm').addEventListener('submit',async event=>{event.preventDefault();const message=document.getElementById('saveMessage');message.textContent='';const response=await fetch('/pet/api/save',{method:'POST',body:new FormData(event.target)});const result=await response.json();if(result.isSuccess){location.reload();return;}message.textContent='Unable to save. Please check the input.';});
</script>
</body>
</html>
