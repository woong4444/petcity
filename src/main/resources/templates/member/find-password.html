<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>비밀번호 찾기 | PetCity</title>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <style>body {
        background: #f6f8fb
    }

    .box {
        max-width: 540px;
        margin: 65px auto;
        padding: 34px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 12px 35px #1f35521a
    }

    .box p {
        color: #667085;
        line-height: 1.6
    }

    .box label {
        display: block;
        font-weight: 800;
        margin: 17px 0 7px
    }

    .box input {
        box-sizing: border-box;
        width: 100%;
        padding: 13px;
        border: 1px solid #d4dce8;
        border-radius: 10px
    }

    .box input[readonly] {
        background: #eef2f6;
        color: #475467;
        cursor: not-allowed
    }

    .box button {
        width: 100%;
        margin-top: 22px;
        padding: 14px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: #fff;
        font-weight: 800
    }

    .verify {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #e5e7eb
    }

    .msg {
        padding: 14px;
        border-radius: 10px;
        background: #eff6ff;
        color: #1d4ed8
    }

    .reset {
        background: none !important;
        color: #667085 !important;
        text-decoration: underline
    }</style>
</head>
<body>
<header th:replace="~{common/head :: head}"></header>
<main class="box"><h1>비밀번호 찾기</h1>
    <p>아이디, 이메일, 휴대전화 정보가 모두 일치하면 가입 이메일로 인증번호를 전송합니다.</p>
    <div th:if="${message}" class="msg" th:text="${message}"></div>
    <form method="post" action="/member/find-password/send"><label>아이디</label><input name="loginId"
                                                                                     th:value="${resetLoginId}"
                                                                                     th:readonly="${verificationPending}"
                                                                                     required><label>가입
        이메일</label><input type="email" name="email" th:value="${resetEmail}" th:readonly="${verificationPending}"
                          required><label>등록 휴대전화</label><input type="tel" name="phone" th:value="${resetPhone}"
                                                                th:readonly="${verificationPending}"
                                                                placeholder="010-0000-0000" required>
        <button th:unless="${verificationPending}">인증번호 받기</button>
    </form>
    <form th:if="${verificationPending}" class="verify" method="post" action="/member/find-password/verify"><p
            class="msg">인증번호를 보낸 회원정보는 변경할 수 없습니다.</p><label>이메일 인증번호</label><input name="code" inputmode="numeric"
                                                                                    pattern="[0-9]{6}" maxlength="6"
                                                                                    required>
        <button>인증하고 비밀번호 재설정</button>
    </form>
    <form th:if="${verificationPending}" method="post" action="/member/find-password/reset">
        <button class="reset">처음부터 다시 입력</button>
    </form>
</main>
</body>
</html>
