<!-- 상각_07-19: 일반회원은 비밀번호 확인, SNS 회원은 비밀번호 없이 탈퇴 요청하는 독립 화면 -->
<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>회원 탈퇴 | PetCity</title><style>body{font-family:sans-serif;background:#f6f8fb}.box{max-width:650px;margin:70px auto;padding:36px;background:white;border-radius:20px;box-shadow:0 12px 35px #1f35521a}.warn,.msg{padding:16px;border-radius:10px}.warn{background:#fff7ed;color:#9a3412}.msg{background:#fff1f2;color:#b42338}label{display:block;font-weight:700;margin:20px 0 8px}textarea,input{box-sizing:border-box;width:100%;padding:13px;border:1px solid #ccd5e1;border-radius:10px}textarea{min-height:130px}.buttons{display:flex;gap:12px;margin-top:24px}.buttons>*{flex:1;padding:14px;text-align:center;border:0;border-radius:10px;text-decoration:none;font-weight:700}.cancel{background:#eef2f6;color:#344054}.submit{background:#dc2626;color:white}</style></head><body><main class="box"><h1>회원 탈퇴</h1><p class="warn">탈퇴 요청 즉시 로그아웃되며 3일 후 계정이 완전히 삭제됩니다. 삭제 전까지 복구를 신청할 수 있습니다.</p><p th:if="${withdrawMessage}" class="msg" th:text="${withdrawMessage}"></p><form method="post" action="/member/feature/withdraw"><label>탈퇴 사유</label><textarea name="deleteReason" minlength="5" maxlength="500" required></textarea><div th:if="${member.loginType == null || member.loginType == 'LOCAL'}"><label>현재 비밀번호</label><input type="password" name="password" required></div><div class="buttons"><a class="cancel" href="/member/mypage">취소</a><button class="submit">탈퇴 요청</button></div></form></main></body></html>
