<!-- 상각_07-19: 일반회원은 비밀번호 확인, SNS 회원은 비밀번호 없이 탈퇴 요청하는 독립 화면 -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>회원 탈퇴 | PetCity</title>

    <!-- 07-22 상각 : 공통 헤더 CSS 적용 -->
    <link rel="stylesheet"
          th:href="@{/css/common/head.css}">

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f6f8fb;
        }

        /* 07-22 상각 : 공통 헤더 아래에 탈퇴 화면 배치 */
        .withdraw-page {
            padding: 55px 20px 70px;
        }

        .box {
            box-sizing: border-box;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            padding: 36px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 35px #1f35521a;
        }

        .warn,
        .msg {
            padding: 16px;
            border-radius: 10px;
        }

        .warn {
            background: #fff7ed;
            color: #9a3412;
        }

        .msg {
            background: #fff1f2;
            color: #b42338;
        }

        label {
            display: block;
            margin: 20px 0 8px;
            font-weight: 700;
        }

        textarea,
        input {
            box-sizing: border-box;
            width: 100%;
            padding: 13px;
            border: 1px solid #ccd5e1;
            border-radius: 10px;
            font: inherit;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .buttons > * {
            flex: 1;
            box-sizing: border-box;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .cancel {
            background: #eef2f6;
            color: #344054;
        }

        .submit {
            background: #dc2626;
            color: white;
        }
    </style>
</head>

<body>

<!-- 07-22 상각 : 기존 common/head.html은 변경하지 않고 불러오기만 함 -->
<th:block th:replace="~{common/head :: head}"></th:block>

<!-- 07-22 상각 : 공통 헤더와 탈퇴 화면 영역 분리 -->
<div class="withdraw-page">

    <main class="box">

        <h1>회원 탈퇴</h1>

        <p class="warn">
            탈퇴 요청 즉시 로그아웃되며 3일 후 계정이 완전히 삭제됩니다.
            삭제 전까지 복구를 신청할 수 있습니다.
        </p>

        <p th:if="${withdrawMessage}"
           class="msg"
           th:text="${withdrawMessage}">
        </p>

        <form method="post"
              th:action="@{/member/feature/withdraw}">

            <label for="deleteReason">
                탈퇴 사유
            </label>

            <textarea id="deleteReason"
                      name="deleteReason"
                      minlength="5"
                      maxlength="500"
                      required></textarea>

            <!-- 07-22 상각 : 일반회원만 현재 비밀번호 입력 -->
            <div th:if="${member.loginType == null || member.loginType == 'LOCAL'}">

                <label for="password">
                    현재 비밀번호
                </label>

                <input id="password"
                       type="password"
                       name="password"
                       required>

            </div>

            <div class="buttons">

                <a class="cancel"
                   th:href="@{/member/mypage}">
                    취소
                </a>

                <button class="submit"
                        type="submit">
                    탈퇴 요청
                </button>

            </div>

        </form>

    </main>

</div>

</body>
</html>
