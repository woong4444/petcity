<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>일반 회원가입 | PetCity</title>

    <!-- Header -->
    <link rel="stylesheet" th:href="@{/css/common/head.css}">

    <!-- Signup -->
    <link rel="stylesheet" th:href="@{/css/member/signup.css}">

</head>

<body>

<!-- ================= HEADER ================= -->

<header th:replace="~{common/head :: head}"></header>

<!-- ================= CONTENT ================= -->

<section class="signup-section">

    <div class="signup-container">

        <!-- ================= LEFT ================= -->

        <div class="signup-left">

            <img
                    th:src="@{/images/signup.jpg}"
                    class="signup-image"
                    alt="signup">

            <h2>

                우리 아이를 위한<br>
                동물병원 플랫폼

            </h2>

            <p>

                가까운 병원 찾기부터<br>
                진료기록 관리까지<br>
                PetCity 하나면 충분합니다.

            </p>

            <ul>

                <li>🏥 가까운 동물병원 찾기</li>

                <li>📋 진료기록 관리</li>

                <li>💉 예방접종 일정 관리</li>

                <li>⭐ 병원 리뷰 확인</li>

            </ul>

        </div>

        <!-- ================= RIGHT ================= -->

        <div class="signup-right">

            <h1>🐾 일반 회원가입</h1>

            <p>

                회원 정보를 입력하여 가입하세요.

            </p>

            <!-- ================= ERROR ================= -->

            <div
                    th:if="${message}"
                    class="alert alert-error mb-4">

                <span th:text="${message}"></span>

            </div>

            <!-- ================= FORM ================= -->

            <!-- 07-16 상각: 일반 회원가입 브라우저 입력 제약 -->
            <form
                    action="/member/signup"
                    method="post"
                    id="signupForm">

                <!-- 아이디 -->

                <div class="form-control mb-3">

                    <label class="label">

        <span class="label-text">

            아이디

        </span>

                    </label>

                    <!-- ================================================= -->
                    <!-- 07-15 추가 : 아이디 입력 + 중복확인 -->
                    <!-- ================================================= -->

                    <div class="id-check-wrap">

                        <input
                                type="text"
                                id="loginId"
                                name="loginId"
                                class="input input-bordered"
                                placeholder="아이디를 입력하세요"
                                autocomplete="off"
                                minlength="5"
                                maxlength="20"
                                pattern="[a-z][a-z0-9_]{4,19}"
                                title="영문 소문자로 시작하는 5~20자의 영문 소문자, 숫자, 밑줄만 사용할 수 있습니다."
                                required>

                        <button
                                type="button"
                                id="checkLoginIdBtn"
                                class="check-btn">

                            중복확인

                        </button>

                    </div>

                    <!-- ================================================= -->
                    <!-- 07-15 추가 : 아이디 중복확인 결과 -->
                    <!-- ================================================= -->

                    <div id="loginIdMessage"
                         class="check-message">

                    </div>
                </div>
                <!-- 비밀번호 -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            비밀번호

                        </span>

                    </label>

                    <input
                            type="password"
                            id="password"
                            name="password"
                            class="input input-bordered"
                            minlength="9"
                            maxlength="64"
                            autocomplete="new-password"
                            title="9~64자이며 영문 대·소문자, 숫자, 특수문자 중 3종 이상을 사용해주세요."
                            placeholder="비밀번호"
                            required>

                </div>


                <!-- ========================= -->
                <!-- 비밀번호 확인 -->
                <!-- ========================= -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            비밀번호 확인

                        </span>

                    </label>

                    <input
                            type="password"
                            id="passwordCheck"
                            name="passwordConfirm"
                            class="input input-bordered"
                            autocomplete="new-password"
                            placeholder="비밀번호 확인"
                            required>

                    <label class="label">

                        <span
                                id="passwordMessage"
                                class="label-text-alt">

                        </span>

                    </label>

                </div>

                <!-- ========================= -->
                <!-- 닉네임 -->
                <!-- ========================= -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            닉네임

                        </span>

                    </label>

                    <input
                            type="text"
                            id="nickname"
                            name="nickname"
                            class="input input-bordered"
                            minlength="2"
                            maxlength="20"
                            pattern="[가-힣a-zA-Z0-9_]+"
                            title="닉네임은 2~20자의 한글, 영문, 숫자, 밑줄만 사용할 수 있습니다."
                            placeholder="닉네임"
                            required>

                    <button type="button" id="checkNicknameBtn" class="check-btn" style="margin-top: 10px;">닉네임 중복확인</button>
                    <div id="nicknameMessage" class="check-message"></div>

                </div>

                <!-- ========================= -->
                <!-- 이메일 -->
                <!-- ========================= -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            이메일

                        </span>

                    </label>

                    <input
                            type="email"
                            id="email"
                            name="email"
                            class="input input-bordered"
                            maxlength="254"
                            autocomplete="email"
                            placeholder="example@email.com"
                            required>

                    <!-- 07-16 상각: 이메일 중복확인 -->
                    <div id="emailActivationMessage" class="check-message">이메일 중복확인을 해주세요.</div>
                    <button type="button" id="checkEmailBtn" class="check-btn" style="margin-top: 10px;">이메일 중복확인</button>
                    <div id="emailDuplicateMessage" class="check-message"></div>

                    <!-- 07-16 상각: 가입 전 이메일 인증 -->
                    <div class="id-check-wrap" style="margin-top: 10px;">
                        <button type="button" id="sendEmailCodeBtn" class="check-btn" disabled>인증번호 발송</button>
                        <input type="text" id="emailCode" class="input input-bordered"
                               placeholder="인증번호 6자리" inputmode="numeric" maxlength="6" disabled>
                    </div>
                    <div id="emailVerificationMessage" class="check-message"></div>

                </div>

                <!-- ========================= -->
                <!-- 전화번호 -->
                <!-- ========================= -->

                <div class="form-control mb-4">

                    <label class="label">

                        <span class="label-text">

                            전화번호

                        </span>

                    </label>

                    <input
                            type="text"
                            name="phone"
                            class="input input-bordered"
                            inputmode="tel"
                            autocomplete="tel"
                            maxlength="13"
                            pattern="01[016789]-?[0-9]{3,4}-?[0-9]{4}"
                            title="휴대전화 번호를 010-0000-0000 형식으로 입력해주세요."
                            placeholder="010-0000-0000"
                            required>

                </div>

                <!-- ========================= -->
                <!-- 회원가입 버튼 -->
                <!-- ========================= -->

                <button
                        type="submit"
                        class="normal-btn">

                    회원가입

                </button>

            </form>

            <!-- ========================= -->
            <!-- SNS -->
            <!-- ========================= -->

            <div class="divider">

                <span>또는</span>

            </div>

            <a href="/oauth2/authorization/google"
               class="sns-btn google">

                Google로 시작하기

            </a>

            <a href="/oauth2/authorization/kakao"
               class="sns-btn kakao">

                Kakao로 시작하기

            </a>

            <a href="/oauth2/authorization/naver"
               class="sns-btn naver">

                NAVER로 시작하기

            </a>

            <div class="login-link">

                이미 회원이신가요?

                <a href="/member/login">

                    로그인

                </a>

            </div>

        </div>

    </div>

</section>

<script>

    const password = document.querySelector("#password");
    const passwordCheck = document.querySelector("#passwordCheck");
    const passwordMessage = document.querySelector("#passwordMessage");
    const signupForm = document.querySelector("#signupForm");
    const email = document.querySelector("#email");
    const checkEmailBtn = document.querySelector("#checkEmailBtn");
    const emailActivationMessage = document.querySelector("#emailActivationMessage");
    const emailDuplicateMessage = document.querySelector("#emailDuplicateMessage");
    const nickname = document.querySelector("#nickname");
    const checkNicknameBtn = document.querySelector("#checkNicknameBtn");
    const nicknameMessage = document.querySelector("#nicknameMessage");
    const sendEmailCodeBtn = document.querySelector("#sendEmailCodeBtn");
    const emailCode = document.querySelector("#emailCode");
    const emailVerificationMessage = document.querySelector("#emailVerificationMessage");
    let emailVerified = false;
    let emailCodeSent = false;
    let emailChecked = false;
    let nicknameChecked = false;

    // 07-16 상각: 비밀번호 정책 사전 검증
    function isStrongPassword(value) {

        if (value.length < 9 || value.length > 64 || /\s/.test(value)) {
            return false;
        }

        let characterTypes = 0;
        if (/[a-z]/.test(value)) characterTypes++;
        if (/[A-Z]/.test(value)) characterTypes++;
        if (/\d/.test(value)) characterTypes++;
        if (/[^a-zA-Z0-9]/.test(value)) characterTypes++;

        return characterTypes >= 3;
    }

    function isEmailLikePassword(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function passwordContainsMemberInfo(value) {
        const lowerPassword = value.toLowerCase();
        const normalizedLoginId = loginId.value.trim().toLowerCase();
        const normalizedEmail = email.value.trim().toLowerCase();
        const atIndex = normalizedEmail.indexOf("@");
        const emailPrefix = atIndex > 0
            ? normalizedEmail.substring(0, atIndex)
            : "";

        return (normalizedLoginId !== "" && lowerPassword.includes(normalizedLoginId))
            || (emailPrefix.length >= 3 && lowerPassword.includes(emailPrefix));
    }

    // 07-16 상각: 추측 쉬운 아이디 사전 차단
    function isWeakLoginId(value) {

        const weakIds = ["admin", "administrator", "root", "manager", "test", "test01",
            "guest", "user", "member", "petcity", "qwerty", "asdf", "abcde"];

        return weakIds.includes(value)
            || /^(.)\1{4,}$/.test(value)
            || value.includes("12345")
            || value.includes("01234")
            || value.includes("abcde");
    }

    // 07-16 상각: 이메일 인증은 다른 항목의 검사 완료 여부와 독립적으로 진행
    function updateEmailActivation() {
        email.disabled = false;
        checkEmailBtn.disabled = emailVerified;
        sendEmailCodeBtn.disabled = !emailChecked || emailVerified;
        emailCode.disabled = !emailCodeSent || emailVerified;

        emailActivationMessage.textContent = emailVerified
            ? "이메일 인증이 완료되었습니다."
            : emailChecked
                ? "인증번호를 발송할 수 있습니다."
                : "이메일 중복확인을 해주세요.";
        emailActivationMessage.className = emailVerified || emailChecked
            ? "check-message text-success"
            : "check-message";
    }

    // 07-16 상각: 가입 전 이메일 인증 요청 및 확인
    async function requestEmailVerification(url, params) {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(params)
        });

        const message = await response.text();
        emailVerificationMessage.textContent = message;
        emailVerificationMessage.className = response.ok ? "check-message text-success" : "check-message text-error";
        return response.ok;
    }

    sendEmailCodeBtn.addEventListener("click", async () => {
        if (!emailCodeSent) {
            if (!email.reportValidity()) return;

            emailVerified = false;
            emailCode.value = "";
            const sent = await requestEmailVerification("/member/signup/email/send", { email: email.value });
            if (sent) {
                emailCodeSent = true;
                emailCode.disabled = false;
                sendEmailCodeBtn.textContent = "이메일 인증";
                sendEmailCodeBtn.classList.add("is-verifying");
                emailCode.focus();
            }
            return;
        }

        const verified = await requestEmailVerification("/member/signup/email/verify", {
            email: email.value,
            code: emailCode.value
        });
        emailVerified = verified;
        if (verified) {
            email.readOnly = true;
            emailCode.disabled = true;
            sendEmailCodeBtn.disabled = true;
            sendEmailCodeBtn.textContent = "인증 완료";
            sendEmailCodeBtn.classList.remove("is-verifying");
            sendEmailCodeBtn.classList.add("is-complete");
        }
    });

    email.addEventListener("input", () => {
        emailVerified = false;
        emailCodeSent = false;
        emailChecked = false;
        emailCode.disabled = true;
        sendEmailCodeBtn.disabled = false;
        sendEmailCodeBtn.textContent = "인증번호 발송";
        sendEmailCodeBtn.classList.remove("is-verifying", "is-complete");
        emailVerificationMessage.textContent = "";
        emailDuplicateMessage.textContent = "";
        checkPassword();
        updateEmailActivation();
    });

    // 07-16 상각: 이메일 중복확인 후 인증번호 발송 허용
    checkEmailBtn.addEventListener("click", () => {
        if (!email.reportValidity()) return;

        fetch("/member/check-email?email=" + encodeURIComponent(email.value))
            .then(response => response.json())
            .then(exists => {
                emailChecked = !exists;
                emailDuplicateMessage.textContent = exists
                    ? "이미 사용 중인 이메일입니다."
                    : "사용 가능한 이메일입니다.";
                emailDuplicateMessage.className = exists
                    ? "check-message text-error"
                    : "check-message text-success";
                updateEmailActivation();
            });
    });

    function checkPassword() {

        if (password.value !== "" && isEmailLikePassword(password.value)) {

            passwordMessage.textContent =
                "이메일 형식은 비밀번호로 사용할 수 없습니다.";
            passwordMessage.className = "label-text-alt text-error";
            return;

        }

        if (password.value !== "" && passwordContainsMemberInfo(password.value)) {

            passwordMessage.textContent =
                "비밀번호에는 아이디나 이메일을 포함할 수 없습니다.";
            passwordMessage.className = "label-text-alt text-error";
            return;

        }

        if (password.value !== "" && !isStrongPassword(password.value)) {

            passwordMessage.textContent =
                "취약한 비밀번호입니다. 올바른 비밀번호로 기입 부탁드립니다.";
            passwordMessage.className = "label-text-alt text-error";
            return;

        }

        if (passwordCheck.value === "") {

            passwordMessage.textContent = "";
            return;

        }

        if (password.value === passwordCheck.value) {

            passwordMessage.textContent = "비밀번호가 일치합니다.";
            passwordMessage.className = "label-text-alt text-success";

        } else {

            passwordMessage.textContent = "비밀번호가 일치하지 않습니다.";
            passwordMessage.className = "label-text-alt text-error";

        }

    }

    password.addEventListener("input", () => {
        checkPassword();
        updateEmailActivation();
    });
    passwordCheck.addEventListener("input", () => {
        checkPassword();
        updateEmailActivation();
    });

    // =====================================================
    // 07-15 수정 : 회원가입 검사
    // =====================================================
    signupForm.addEventListener("submit", function (e) {

        if (!emailVerified) {
            alert("이메일 인증을 완료해주세요.");
            email.focus();
            e.preventDefault();
            return;
        }

        if (isWeakLoginId(loginId.value.trim().toLowerCase())) {

            alert("보안에 취약하거나 쉽게 추측되는 아이디는 사용할 수 없습니다.");

            loginId.focus();

            e.preventDefault();

            return;

        }

        if (isEmailLikePassword(password.value)) {

            alert("이메일 형식은 비밀번호로 사용할 수 없습니다.");
            password.focus();
            e.preventDefault();
            return;

        }

        if (passwordContainsMemberInfo(password.value)) {

            alert("비밀번호에는 아이디나 이메일을 포함할 수 없습니다.");
            password.focus();
            e.preventDefault();
            return;

        }

        if (!isStrongPassword(password.value)) {

            alert("비밀번호는 공백 없이 9~64자이며 영문 대·소문자, 숫자, 특수문자 중 3종 이상을 사용해주세요.");

            password.focus();

            e.preventDefault();

            return;

        }

        if (!loginIdChecked) {

            alert("아이디 중복확인을 해주세요.");

            loginId.focus();

            e.preventDefault();

            return;

        }

        if (password.value !== passwordCheck.value) {

            alert("비밀번호가 일치하지 않습니다.");

            passwordCheck.focus();

            e.preventDefault();

        }

    });
    // =====================================================
    // 07-15 추가 : 아이디 중복 확인(AJAX)
    // =====================================================

    const checkLoginIdBtn = document.querySelector("#checkLoginIdBtn");
    const loginId = document.querySelector("#loginId");
    const loginIdMessage = document.querySelector("#loginIdMessage");

    let loginIdChecked = false;

    checkLoginIdBtn.addEventListener("click", function () {

        const normalizedLoginId = loginId.value.trim().toLowerCase();

        if (normalizedLoginId === "") {

            loginIdMessage.innerHTML = "아이디를 입력하세요.";
            loginIdMessage.className = "check-message text-error";

            loginId.focus();

            return;

        }

        if (!/^[a-z][a-z0-9_]{4,19}$/.test(normalizedLoginId)) {
            loginIdMessage.textContent =
                "아이디는 영문 소문자로 시작하는 5~20자의 영문 소문자, 숫자, 밑줄만 사용할 수 있습니다.";
            loginIdMessage.className = "check-message text-error";
            loginIdChecked = false;
            loginId.focus();
            updateEmailActivation();
            return;
        }

        if (isWeakLoginId(normalizedLoginId)) {
            loginIdMessage.textContent =
                "보안에 취약하거나 쉽게 추측되는 아이디는 사용할 수 없습니다.";
            loginIdMessage.className = "check-message text-error";
            loginIdChecked = false;
            loginId.focus();
            updateEmailActivation();
            return;
        }

        loginId.value = normalizedLoginId;

        fetch("/member/check-loginId?loginId=" + encodeURIComponent(normalizedLoginId))

            .then(response => response.json())

            .then(result => {

                if (result) {

                    loginIdMessage.innerHTML = "❌ 이미 사용중인 아이디입니다.";
                    loginIdMessage.className = "check-message text-error";

                    loginIdChecked = false;

                } else {

                    loginIdMessage.innerHTML = "✅ 사용 가능한 아이디입니다.";
                    loginIdMessage.className = "check-message text-success";

                    loginIdChecked = true;

                }

                updateEmailActivation();

            });

    });

    // =====================================================
    // 07-15 추가 : 아이디 변경 시 다시 검사
    // =====================================================

    loginId.addEventListener("keyup", function () {

        loginIdChecked = false;

        loginIdMessage.innerHTML = "";
        updateEmailActivation();

    });

    // 07-16 상각: 닉네임 중복확인
    checkNicknameBtn.addEventListener("click", () => {
        if (!nickname.reportValidity()) return;

        fetch("/member/check-nickname?nickname=" + encodeURIComponent(nickname.value))
            .then(response => response.json())
            .then(exists => {
                nicknameChecked = !exists;
                nicknameMessage.textContent = exists
                    ? "이미 사용 중인 닉네임입니다."
                    : "사용 가능한 닉네임입니다.";
                nicknameMessage.className = exists
                    ? "check-message text-error"
                    : "check-message text-success";
                updateEmailActivation();
            });
    });

    nickname.addEventListener("input", () => {
        nicknameChecked = false;
        nicknameMessage.textContent = "";
        updateEmailActivation();
    });

</script>
</body>

</html>
