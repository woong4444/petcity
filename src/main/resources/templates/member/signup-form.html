<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>일반 회원가입 | PetCity</title>

    <!-- Header -->
    <link rel="stylesheet" th:href="@{/css/common/head.css}">

    <!-- Signup -->
    <link rel="stylesheet" th:href="@{/css/member/signup.css}">

</head>

<body>

<!-- ================= HEADER ================= -->

<header th:replace="~{common/head :: head}"></header>

<!-- ================= CONTENT ================= -->

<!--<section class="signup-section">-->

    <div class="signup-container">

        <!-- ================= LEFT ================= -->

        <div class="signup-left">

            <img
                    th:src="@{/images/signup.jpg}"
                    class="signup-image"
                    alt="signup">

            <h2>

                우리 아이를 위한<br>
                동물병원 플랫폼

            </h2>

            <p>

                가까운 병원 찾기부터<br>
                진료기록 관리까지<br>
                PetCity 하나면 충분합니다.

            </p>

            <ul>

                <li>🏥 가까운 동물병원 찾기</li>

                <li>📋 진료기록 관리</li>

                <li>💉 예방접종 일정 관리</li>

                <li>⭐ 병원 리뷰 확인</li>

            </ul>

        </div>

        <!-- ================= RIGHT ================= -->

        <div class="signup-right">

            <h1>🐾 일반 회원가입</h1>

            <p>

                회원 정보를 입력하여 가입하세요.

            </p>

            <!-- ================= ERROR ================= -->

            <div
                    th:if="${message}"
                    class="alert alert-error mb-4">

                <span th:text="${message}"></span>

            </div>

            <!-- ================= FORM ================= -->

            <form
                    action="/member/signup"
                    method="post"
                    id="signupForm">

                <!-- 아이디 -->

                <div class="form-control mb-3">

                    <label class="label">

        <span class="label-text">

            아이디

        </span>

                    </label>

                    <!-- ================================================= -->
                    <!-- 07-15 추가 : 아이디 입력 + 중복확인 -->
                    <!-- ================================================= -->

                    <div class="id-check-wrap">

                        <input
                                type="text"
                                id="loginId"
                                name="loginId"
                                class="input input-bordered"
                                placeholder="아이디를 입력하세요"
                                autocomplete="off"
                                required>

                        <button
                                type="button"
                                id="checkLoginIdBtn"
                                class="check-btn">

                            중복확인

                        </button>

                    </div>

                    <!-- ================================================= -->
                    <!-- 07-15 추가 : 아이디 중복확인 결과 -->
                    <!-- ================================================= -->

                    <div id="loginIdMessage"
                         class="check-message">

                    </div>
                </div>
                <!-- 비밀번호 -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            비밀번호

                        </span>

                    </label>

                    <input
                            type="password"
                            id="password"
                            name="password"
                            class="input input-bordered"
                            placeholder="비밀번호"
                            required>

                </div>


                <!-- ========================= -->
                <!-- 비밀번호 확인 -->
                <!-- ========================= -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            비밀번호 확인

                        </span>

                    </label>

                    <input
                            type="password"
                            id="passwordCheck"
                            class="input input-bordered"
                            placeholder="비밀번호 확인"
                            required>

                    <label class="label">

                        <span
                                id="passwordMessage"
                                class="label-text-alt">

                        </span>

                    </label>

                </div>

                <!-- ========================= -->
                <!-- 닉네임 -->
                <!-- ========================= -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            닉네임

                        </span>

                    </label>

                    <input
                            type="text"
                            name="nickname"
                            class="input input-bordered"
                            placeholder="닉네임"
                            required>

                </div>

                <!-- ========================= -->
                <!-- 이메일 -->
                <!-- ========================= -->

                <div class="form-control mb-3">

                    <label class="label">

                        <span class="label-text">

                            이메일

                        </span>

                    </label>

                    <input
                            type="email"
                            id="email"
                            name="email"
                            class="input input-bordered"
                            placeholder="example@email.com"
                            required>

                </div>

                <!-- ========================= -->
                <!-- 전화번호 -->
                <!-- ========================= -->

                <div class="form-control mb-4">

                    <label class="label">

                        <span class="label-text">

                            전화번호

                        </span>

                    </label>

                    <input
                            type="text"
                            name="phone"
                            class="input input-bordered"
                            placeholder="010-0000-0000"
                            required>

                </div>

                <!-- ========================= -->
                <!-- 회원가입 버튼 -->
                <!-- ========================= -->

                <button
                        type="submit"
                        class="normal-btn">

                    회원가입

                </button>

            </form>

            <!-- ========================= -->
            <!-- SNS -->
            <!-- ========================= -->

            <div class="divider">

                <span>또는</span>

            </div>

            <a href="/oauth2/authorization/google"
               class="sns-btn google">

                Google로 시작하기

            </a>

            <a href="/oauth2/authorization/kakao"
               class="sns-btn kakao">

                Kakao로 시작하기

            </a>

            <a href="/oauth2/authorization/naver"
               class="sns-btn naver">

                NAVER로 시작하기

            </a>

            <div class="login-link">

                이미 회원이신가요?

                <a href="/member/login">

                    로그인

                </a>

            </div>

        </div>

    </div>

</section>

<script>

    const password = document.querySelector("#password");
    const passwordCheck = document.querySelector("#passwordCheck");
    const passwordMessage = document.querySelector("#passwordMessage");
    const signupForm = document.querySelector("#signupForm");

    function checkPassword() {

        if (passwordCheck.value === "") {

            passwordMessage.innerHTML = "";
            return;

        }

        if (password.value === passwordCheck.value) {

            passwordMessage.innerHTML = "비밀번호가 일치합니다.";
            passwordMessage.className = "label-text-alt text-success";

        } else {

            passwordMessage.innerHTML = "비밀번호가 일치하지 않습니다.";
            passwordMessage.className = "label-text-alt text-error";

        }

    }

    password.addEventListener("keyup", checkPassword);
    passwordCheck.addEventListener("keyup", checkPassword);

    // =====================================================
    // 07-15 수정 : 회원가입 검사
    // =====================================================
    signupForm.addEventListener("submit", function (e) {

        if (!loginIdChecked) {

            alert("아이디 중복확인을 해주세요.");

            loginId.focus();

            e.preventDefault();

            return;

        }

        if (password.value !== passwordCheck.value) {

            alert("비밀번호가 일치하지 않습니다.");

            passwordCheck.focus();

            e.preventDefault();

        }

    });
    // =====================================================
    // 07-15 추가 : 아이디 중복 확인(AJAX)
    // =====================================================

    const checkLoginIdBtn = document.querySelector("#checkLoginIdBtn");
    const loginId = document.querySelector("#loginId");
    const loginIdMessage = document.querySelector("#loginIdMessage");

    let loginIdChecked = false;

    checkLoginIdBtn.addEventListener("click", function () {

        if (loginId.value.trim() === "") {

            loginIdMessage.innerHTML = "아이디를 입력하세요.";
            loginIdMessage.className = "check-message text-error";

            loginId.focus();

            return;

        }

        fetch("/member/check-loginId?loginId=" + encodeURIComponent(loginId.value))

            .then(response => response.json())

            .then(result => {

                if (result) {

                    loginIdMessage.innerHTML = "❌ 이미 사용중인 아이디입니다.";
                    loginIdMessage.className = "check-message text-error";

                    loginIdChecked = false;

                } else {

                    loginIdMessage.innerHTML = "✅ 사용 가능한 아이디입니다.";
                    loginIdMessage.className = "check-message text-success";

                    loginIdChecked = true;

                }

            });

    });

    // =====================================================
    // 07-15 추가 : 아이디 변경 시 다시 검사
    // =====================================================

    loginId.addEventListener("keyup", function () {

        loginIdChecked = false;

        loginIdMessage.innerHTML = "";

    });

</script>
<!-- ================================================= -->
<!-- 07-15 오후 추가_상각 : 회원가입 JS -->
<!-- ================================================= -->
<script th:src="@{/js/member/signup.js}"></script>

</body>

</html>
