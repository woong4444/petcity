<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>일반 회원가입 | PetCity</title>

    <!-- 공통 헤더 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/common/head.css}">

    <!-- 회원가입 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/member/signup.css}">
</head>

<body>

<!-- 공통 헤더 -->
<header th:replace="~{common/head :: head}">
</header>


<section class="signup-section">

    <div class="signup-container">

        <!-- ========================================
             왼쪽 소개 영역
        ========================================= -->

        <div class="signup-left">

            <img th:src="@{/images/signup.jpg}"
                 class="signup-image"
                 alt="PetCity 회원가입">

            <h2>
                우리 아이를 위한<br>
                동물병원 플랫폼
            </h2>

            <p>
                가까운 병원 찾기부터<br>
                진료기록 관리까지<br>
                PetCity 하나면 충분합니다.
            </p>

            <ul>
                <li>🏥 가까운 동물병원 찾기</li>
                <li>📋 진료기록 관리</li>
                <li>💉 예방접종 일정 관리</li>
                <li>⭐ 병원 리뷰 확인</li>
            </ul>

        </div>


        <!-- ========================================
             오른쪽 회원가입 영역
        ========================================= -->

        <div class="signup-right">

            <h1>🐾 일반 회원가입</h1>

            <p>
                회원 정보를 입력하여 가입하세요.
            </p>


            <!-- 서버에서 전달한 오류 메시지 -->

            <div th:if="${message}"
                 class="alert">

                <span th:text="${message}">
                    오류 메시지
                </span>

            </div>


            <!-- ========================================
                 일반 회원가입 폼
            ========================================= -->

            <form th:action="@{/member/signup}"
                  method="post"
                  id="signupForm">


                <!-- 아이디 -->

                <div class="form-control">

                    <label for="loginId"
                           class="label">

                        <span class="label-text">
                            아이디
                        </span>

                    </label>

                    <div class="id-check-wrap">

                        <input type="text"
                               id="loginId"
                               name="loginId"
                               class="input"
                               placeholder="영문 소문자로 시작하는 5~20자"
                               autocomplete="username"
                               minlength="5"
                               maxlength="20"
                               pattern="[a-z][a-z0-9_]{4,19}"
                               title="영문 소문자로 시작하는 5~20자의 영문 소문자,숫자만 사용할 수 있습니다."
                               required>

                        <button type="button"
                                id="checkLoginIdBtn"
                                class="check-btn">

                            중복확인

                        </button>

                    </div>

                    <p id="loginIdMessage"
                       class="check-message">
                    </p>

                </div>


                <!-- 비밀번호 -->

                <div class="form-control">

                    <label for="password"
                           class="label">

                        <span class="label-text">
                            비밀번호
                        </span>

                    </label>

                    <input type="password"
                           id="password"
                           name="password"
                           class="input"
                           placeholder="9자 이상, 문자 종류 3종 이상"
                           autocomplete="new-password"
                           minlength="9"
                           maxlength="64"
                           required>

                    <p id="passwordStrengthMessage"
                       class="check-message">
                    </p>

                </div>


                <!-- 비밀번호 확인 -->

                <div class="form-control">

                    <label for="passwordCheck"
                           class="label">

                        <span class="label-text">
                            비밀번호 확인
                        </span>

                    </label>

                    <input type="password"
                           id="passwordCheck"
                           name="passwordConfirm"
                           class="input"
                           placeholder="비밀번호를 다시 입력하세요"
                           autocomplete="new-password"
                           minlength="9"
                           maxlength="64"
                           required>

                    <p id="passwordMatchMessage"
                       class="check-message">
                    </p>

                </div>


                <!-- 닉네임 -->

                <div class="form-control">

                    <label for="nickname"
                           class="label">

                        <span class="label-text">
                            닉네임
                        </span>

                    </label>

                    <div class="id-check-wrap">

                        <input type="text"
                               id="nickname"
                               name="nickname"
                               class="input"
                               placeholder="닉네임을 입력하세요"
                               minlength="2"
                               maxlength="20"
                               pattern="[가-힣a-zA-Z0-9_]+"
                               title="닉네임은 2~20자의 한글, 영문, 숫자만 사용할 수 있습니다."
                               required>

                        <button type="button"
                                id="checkNicknameBtn"
                                class="check-btn">

                            중복확인

                        </button>

                    </div>

                    <p id="nicknameMessage"
                       class="check-message">
                    </p>

                </div>


                <!-- 이메일 -->

                <div class="form-control">

                    <label for="email"
                           class="label">

                        <span class="label-text">
                            이메일
                        </span>

                    </label>

                    <!--
                        회원가입 실패 후 다시 돌아왔을 때
                        인증 완료 이메일을 그대로 표시한다.

                        readonly는 서버에 값이 전송되지만
                        disabled는 서버에 값이 전송되지 않는다.
                    -->

                    <input type="email"
                           id="email"
                           name="email"
                           class="input"
                           maxlength="254"
                           autocomplete="email"
                           placeholder="example@email.com"
                           th:value="${emailVerified
                                     ? verifiedEmail
                                     : ''}"
                           th:readonly="${emailVerified}"
                           required>

                    <p id="emailActivationMessage"
                       class="check-message"
                       th:classappend="${emailVerified
                                       ? ' text-success'
                                       : ' text-error'}"
                       th:text="${emailVerified
                                ? '이메일 인증이 완료되었습니다.'
                                : '아이디·비밀번호·닉네임 조건을 먼저 완료해주세요.'}">

                        아이디·비밀번호·닉네임 조건을 먼저 완료해주세요.

                    </p>


                    <!-- 이메일 중복확인 -->

                    <button type="button"
                            id="checkEmailBtn"
                            class="check-btn"
                            style="margin-top:10px;"
                            th:disabled="${emailVerified}">

                        이메일 중복확인

                    </button>

                    <p id="emailDuplicateMessage"
                       class="check-message">
                    </p>


                    <!-- 인증번호 발송 및 확인 -->

                    <div class="id-check-wrap"
                         style="margin-top:10px;">

                        <button type="button"
                                id="sendEmailCodeBtn"
                                class="check-btn"
                                th:disabled="${emailVerified}"
                                th:classappend="${emailVerified
                                                ? ' is-complete'
                                                : ''}"
                                th:text="${emailVerified
                                         ? '인증 완료'
                                         : '인증번호 발송'}">

                            인증번호 발송

                        </button>

                        <input type="text"
                               id="emailCode"
                               class="input"
                               placeholder="인증번호 6자리"
                               inputmode="numeric"
                               autocomplete="one-time-code"
                               pattern="[0-9]{6}"
                               maxlength="6"
                               disabled>

                    </div>

                    <p id="emailVerificationMessage"
                       class="check-message"
                       th:classappend="${emailVerified
                                       ? ' text-success'
                                       : ''}"
                       th:text="${emailVerified
                                ? '이미 인증이 완료된 이메일입니다.'
                                : ''}">
                    </p>

                </div>


                <!-- 전화번호 -->

                <div class="form-control">

                    <label for="phone"
                           class="label">

                        <span class="label-text">
                            전화번호
                        </span>

                    </label>

                    <input type="tel"
                           id="phone"
                           name="phone"
                           class="input"
                           inputmode="tel"
                           autocomplete="tel"
                           maxlength="13"
                           pattern="01[016789]-?[0-9]{3,4}-?[0-9]{4}"
                           title="휴대전화 번호를 010-0000-0000 형식으로 입력해주세요."
                           placeholder="010-0000-0000"
                           required>

                </div>


                <!-- 회원가입 버튼 -->

                <button type="submit"
                        class="normal-btn">

                    회원가입

                </button>

            </form>


            <!-- ========================================
                 소셜 회원가입
            ========================================= -->

            <div class="divider">
                <span>또는</span>
            </div>


            <!-- 소셜 로그인 이메일 수집 동의 -->

            <div class="agreement-box">

                <label class="agreement-label">

                    <input type="checkbox"
                           id="agreementEmail">

                    <span>
                        이메일 수집 및 개인정보 이용에 동의합니다.
                        <strong>(필수)</strong>
                    </span>

                </label>

                <p class="agreement-desc">
                    SNS 회원가입을 위해 이메일 수집 동의가 필요합니다.
                </p>

            </div>


            <a th:href="@{/oauth2/authorization/google}"
               id="googleLoginBtn"
               data-provider="google"
               class="sns-btn google">

                Google로 시작하기

            </a>

            <a th:href="@{/oauth2/authorization/kakao}"
               id="kakaoLoginBtn"
               data-provider="kakao"
               class="sns-btn kakao">

                Kakao로 시작하기

            </a>

            <a th:href="@{/oauth2/authorization/naver}"
               id="naverLoginBtn"
               data-provider="naver"
               class="sns-btn naver">

                NAVER로 시작하기

            </a>


            <div class="login-link">

                이미 회원이신가요?

                <a th:href="@{/member/login}">
                    로그인
                </a>

            </div>

        </div>

    </div>

</section>


<!-- ========================================
     회원가입 JavaScript

     이 HTML에 JavaScript가 전부 들어 있으므로
     signup.js를 여기서 다시 불러오지 않는다.
========================================= -->

<script th:inline="javascript">

    /* 서버에서 전달한 이메일 인증 상태 */

    const serverEmailVerified =
        /*[[${emailVerified}]]*/ false;

    const serverVerifiedEmail =
        /*[[${verifiedEmail}]]*/ "";


    /* 화면 요소 */

    const signupForm =
        document.querySelector("#signupForm");

    const loginId =
        document.querySelector("#loginId");

    const checkLoginIdBtn =
        document.querySelector("#checkLoginIdBtn");

    const loginIdMessage =
        document.querySelector("#loginIdMessage");


    const password =
        document.querySelector("#password");

    const passwordCheck =
        document.querySelector("#passwordCheck");

    const passwordStrengthMessage =
        document.querySelector("#passwordStrengthMessage");

    const passwordMatchMessage =
        document.querySelector("#passwordMatchMessage");


    const nickname =
        document.querySelector("#nickname");

    const checkNicknameBtn =
        document.querySelector("#checkNicknameBtn");

    const nicknameMessage =
        document.querySelector("#nicknameMessage");


    const email =
        document.querySelector("#email");

    const checkEmailBtn =
        document.querySelector("#checkEmailBtn");

    const emailActivationMessage =
        document.querySelector("#emailActivationMessage");

    const emailDuplicateMessage =
        document.querySelector("#emailDuplicateMessage");

    const sendEmailCodeBtn =
        document.querySelector("#sendEmailCodeBtn");

    const emailCode =
        document.querySelector("#emailCode");

    const emailVerificationMessage =
        document.querySelector("#emailVerificationMessage");


    /* 검사 상태 */

    let loginIdChecked = false;
    let nicknameChecked = false;

    let emailChecked = serverEmailVerified;
    let emailCodeSent = false;
    let emailVerified = serverEmailVerified;

    let verifiedEmailValue =
        serverVerifiedEmail || "";


    /* 메시지 출력 */

    function showMessage(
        element,
        message,
        success
    ) {

        element.textContent = message;

        element.classList.remove(
            "text-success",
            "text-error"
        );

        element.classList.add(
            success
                ? "text-success"
                : "text-error"
        );
    }


    function clearMessage(element) {

        element.textContent = "";

        element.classList.remove(
            "text-success",
            "text-error"
        );
    }


    /* ========================================
       아이디 검사
    ========================================= */

    function isValidLoginId(value) {

        return /^[a-z][a-z0-9_]{4,19}$/
            .test(value);
    }


    function isWeakLoginId(value) {

        const weakIds = [
            "administrator",
            "root",
            "manager",
            "test",
            "test01",
            "guest",
            "user",
            "member",
            "petcity",
            "qwerty",
            "asdf",
            "abcde"
        ];

        return weakIds.includes(value)
            || /^(.)\1{4,}$/.test(value)
            || value.includes("12345")
            || value.includes("01234")
            || value.includes("abcde");
    }


    checkLoginIdBtn.addEventListener(
        "click",
        async () => {

            const value =
                loginId.value
                    .trim()
                    .toLowerCase();

            loginId.value = value;


            if (!isValidLoginId(value)) {

                loginIdChecked = false;

                showMessage(
                    loginIdMessage,
                    "아이디는 영문 소문자로 시작하는 " +
                    "5~20자의 영문 소문자, 숫자, " +
                    "밑줄만 사용할 수 있습니다.",
                    false
                );

                loginId.focus();
                updateEmailControls();
                return;
            }


            if (isWeakLoginId(value)) {

                loginIdChecked = false;

                showMessage(
                    loginIdMessage,
                    "보안에 취약하거나 쉽게 추측되는 " +
                    "아이디는 사용할 수 없습니다.",
                    false
                );

                loginId.focus();
                updateEmailControls();
                return;
            }


            try {

                const response =
                    await fetch(
                        "/member/check-loginId" +
                        "?loginId=" +
                        encodeURIComponent(value)
                    );

                if (!response.ok) {
                    throw new Error();
                }

                const exists =
                    await response.json();

                if (exists) {

                    loginIdChecked = false;

                    showMessage(
                        loginIdMessage,
                        "이미 사용 중인 아이디입니다.",
                        false
                    );

                } else {

                    loginIdChecked = true;

                    showMessage(
                        loginIdMessage,
                        "사용 가능한 아이디입니다.",
                        true
                    );
                }

            } catch (error) {

                loginIdChecked = false;

                showMessage(
                    loginIdMessage,
                    "아이디 중복확인 중 오류가 발생했습니다.",
                    false
                );
            }

            updateEmailControls();
        }
    );


    loginId.addEventListener(
        "input",
        () => {

            loginIdChecked = false;

            showMessage(
                loginIdMessage,
                "아이디 중복확인이 필요합니다.",
                false
            );

            updateEmailControls();
        }
    );


    /* ========================================
       비밀번호 검사
    ========================================= */

    function getPasswordError(value) {

        if (value.length === 0) {
            return "";
        }

        if (value.length < 9
            || value.length > 64) {

            return "비밀번호는 9~64자로 입력해주세요.";
        }

        if (/\s/.test(value)) {

            return "비밀번호에는 공백을 사용할 수 없습니다.";
        }

        let characterTypes = 0;

        if (/[a-z]/.test(value)) {
            characterTypes++;
        }

        if (/[A-Z]/.test(value)) {
            characterTypes++;
        }

        if (/[0-9]/.test(value)) {
            characterTypes++;
        }

        if (/[^a-zA-Z0-9]/.test(value)) {
            characterTypes++;
        }

        if (characterTypes < 3) {

            return "영문 대문자, 영문 소문자, 숫자, " +
                "특수문자 중 3종 이상을 사용해주세요.";
        }

        return "";
    }


    function isStrongPassword(value) {

        return value.length > 0
            && getPasswordError(value) === "";
    }


    function updatePasswordMessages() {

        const passwordError =
            getPasswordError(password.value);

        if (password.value.length === 0) {

            clearMessage(
                passwordStrengthMessage
            );

        } else if (passwordError) {

            showMessage(
                passwordStrengthMessage,
                passwordError,
                false
            );

        } else {

            showMessage(
                passwordStrengthMessage,
                "사용 가능한 비밀번호입니다.",
                true
            );
        }


        if (passwordCheck.value.length === 0) {

            clearMessage(
                passwordMatchMessage
            );

        } else if (
            password.value
            === passwordCheck.value
        ) {

            showMessage(
                passwordMatchMessage,
                "비밀번호가 일치합니다.",
                true
            );

        } else {

            showMessage(
                passwordMatchMessage,
                "비밀번호가 일치하지 않습니다.",
                false
            );
        }
    }


    password.addEventListener(
        "input",
        () => {

            updatePasswordMessages();
            updateEmailControls();
        }
    );


    passwordCheck.addEventListener(
        "input",
        () => {

            updatePasswordMessages();
            updateEmailControls();
        }
    );


    /* ========================================
       닉네임 중복확인
    ========================================= */

    checkNicknameBtn.addEventListener(
        "click",
        async () => {

            const value =
                nickname.value.trim();

            nickname.value = value;


            if (!nickname.reportValidity()) {

                nicknameChecked = false;
                updateEmailControls();
                return;
            }


            try {

                const response =
                    await fetch(
                        "/member/check-nickname" +
                        "?nickname=" +
                        encodeURIComponent(value)
                    );

                if (!response.ok) {
                    throw new Error();
                }

                const exists =
                    await response.json();

                if (exists) {

                    nicknameChecked = false;

                    showMessage(
                        nicknameMessage,
                        "이미 사용 중인 닉네임입니다.",
                        false
                    );

                } else {

                    nicknameChecked = true;

                    showMessage(
                        nicknameMessage,
                        "사용 가능한 닉네임입니다.",
                        true
                    );
                }

            } catch (error) {

                nicknameChecked = false;

                showMessage(
                    nicknameMessage,
                    "닉네임 중복확인 중 오류가 발생했습니다.",
                    false
                );
            }

            updateEmailControls();
        }
    );


    nickname.addEventListener(
        "input",
        () => {

            nicknameChecked = false;

            showMessage(
                nicknameMessage,
                "닉네임 중복확인이 필요합니다.",
                false
            );

            updateEmailControls();
        }
    );


    /* ========================================
       이메일 입력 활성화
    ========================================= */

    function isPreviousStepComplete() {

        return loginIdChecked
            && nicknameChecked
            && isStrongPassword(
                password.value
            )
            && password.value
            === passwordCheck.value;
    }


    function updateEmailControls() {

        /*
            이미 인증 완료된 이메일은
            회원가입 실패 후에도 그대로 유지
        */

        if (emailVerified) {

            email.disabled = false;
            email.readOnly = true;

            checkEmailBtn.disabled = true;
            sendEmailCodeBtn.disabled = true;
            emailCode.disabled = true;

            sendEmailCodeBtn.textContent =
                "인증 완료";

            sendEmailCodeBtn.classList.remove(
                "is-verifying"
            );

            sendEmailCodeBtn.classList.add(
                "is-complete"
            );

            showMessage(
                emailActivationMessage,
                "이메일 인증이 완료되었습니다.",
                true
            );

            showMessage(
                emailVerificationMessage,
                "이미 인증이 완료된 이메일입니다.",
                true
            );

            return;
        }


        const canUseEmail =
            isPreviousStepComplete();

        email.disabled = !canUseEmail;
        email.readOnly = emailCodeSent;

        checkEmailBtn.disabled =
            !canUseEmail;

        sendEmailCodeBtn.disabled =
            !canUseEmail
            || !emailChecked;

        emailCode.disabled =
            !emailCodeSent;


        if (canUseEmail) {

            showMessage(
                emailActivationMessage,
                "이메일 중복확인 후 인증번호를 " +
                "발송할 수 있습니다.",
                true
            );

        } else {

            showMessage(
                emailActivationMessage,
                "아이디 중복확인, 비밀번호 조건, " +
                "닉네임 중복확인을 먼저 완료해주세요.",
                false
            );
        }
    }


    /* 이메일을 변경하면 기존 검사 무효화 */

    email.addEventListener(
        "input",
        () => {

            if (emailVerified) {
                return;
            }

            emailChecked = false;
            emailCodeSent = false;

            emailCode.value = "";
            emailCode.disabled = true;

            sendEmailCodeBtn.textContent =
                "인증번호 발송";

            sendEmailCodeBtn.classList.remove(
                "is-verifying",
                "is-complete"
            );

            clearMessage(
                emailDuplicateMessage
            );

            clearMessage(
                emailVerificationMessage
            );

            updateEmailControls();
        }
    );


    /* ========================================
       이메일 중복확인
    ========================================= */

    checkEmailBtn.addEventListener(
        "click",
        async () => {

            if (!email.reportValidity()) {
                return;
            }


            try {

                const response =
                    await fetch(
                        "/member/check-email" +
                        "?email=" +
                        encodeURIComponent(
                            email.value
                                .trim()
                                .toLowerCase()
                        )
                    );

                if (!response.ok) {
                    throw new Error();
                }

                const exists =
                    await response.json();

                if (exists) {

                    emailChecked = false;

                    showMessage(
                        emailDuplicateMessage,
                        "이미 사용 중인 이메일입니다.",
                        false
                    );

                } else {

                    emailChecked = true;

                    showMessage(
                        emailDuplicateMessage,
                        "사용 가능한 이메일입니다.",
                        true
                    );
                }

            } catch (error) {

                emailChecked = false;

                showMessage(
                    emailDuplicateMessage,
                    "이메일 중복확인 중 오류가 발생했습니다.",
                    false
                );
            }

            updateEmailControls();
        }
    );


    /* ========================================
       이메일 인증 요청 공통 함수
    ========================================= */

    async function requestEmailVerification(
        url,
        parameters
    ) {

        const response =
            await fetch(
                url,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/x-www-form-urlencoded"
                    },

                    body: new URLSearchParams(
                        parameters
                    )
                }
            );

        const message =
            await response.text();

        showMessage(
            emailVerificationMessage,
            message,
            response.ok
        );

        return {
            success: response.ok,
            message: message
        };
    }


    /* ========================================
       인증번호 발송 / 인증번호 확인
    ========================================= */

    sendEmailCodeBtn.addEventListener(
        "click",
        async () => {

            /*
                첫 번째 클릭:
                인증번호 발송
            */

            if (!emailCodeSent) {

                if (!email.reportValidity()) {
                    return;
                }

                const result =
                    await requestEmailVerification(
                        "/member/signup/email/send",
                        {
                            email:
                                email.value
                                    .trim()
                                    .toLowerCase()
                        }
                    );


                if (!result.success) {
                    return;
                }


                /*
                    서버에 이미 인증된 이메일이
                    저장된 경우
                */

                if (
                    result.message.includes(
                        "이미 인증 완료"
                    )
                ) {

                    emailVerified = true;

                    verifiedEmailValue =
                        email.value
                            .trim()
                            .toLowerCase();

                    updateEmailControls();
                    return;
                }


                emailCodeSent = true;

                email.readOnly = true;

                emailCode.disabled = false;
                emailCode.focus();

                sendEmailCodeBtn.textContent =
                    "이메일 인증";

                sendEmailCodeBtn.classList.add(
                    "is-verifying"
                );

                updateEmailControls();
                return;
            }


            /*
                두 번째 클릭:
                인증번호 확인
            */

            const code =
                emailCode.value.trim();

            if (!/^\d{6}$/.test(code)) {

                showMessage(
                    emailVerificationMessage,
                    "인증번호 6자리를 입력해주세요.",
                    false
                );

                emailCode.focus();
                return;
            }


            const result =
                await requestEmailVerification(
                    "/member/signup/email/verify",
                    {
                        email:
                            email.value
                                .trim()
                                .toLowerCase(),

                        code: code
                    }
                );


            if (result.success) {

                emailVerified = true;

                verifiedEmailValue =
                    email.value
                        .trim()
                        .toLowerCase();

                updateEmailControls();
            }
        }
    );


    /* ========================================
       전화번호 자동 하이픈
    ========================================= */

    const phone =
        document.querySelector("#phone");

    phone.addEventListener(
        "input",
        () => {

            const numbers =
                phone.value
                    .replace(/[^0-9]/g, "")
                    .slice(0, 11);

            if (numbers.length <= 3) {

                phone.value = numbers;

            } else if (numbers.length <= 7) {

                phone.value =
                    numbers.slice(0, 3)
                    + "-"
                    + numbers.slice(3);

            } else {

                phone.value =
                    numbers.slice(0, 3)
                    + "-"
                    + numbers.slice(
                        3,
                        numbers.length - 4
                    )
                    + "-"
                    + numbers.slice(-4);
            }
        }
    );


    /* ========================================
       최종 회원가입 검사
    ========================================= */

    signupForm.addEventListener(
        "submit",
        event => {

            const loginIdValue =
                loginId.value
                    .trim()
                    .toLowerCase();

            const passwordError =
                getPasswordError(
                    password.value
                );


            if (!loginIdChecked) {

                event.preventDefault();

                alert(
                    "아이디 중복확인을 완료해주세요."
                );

                loginId.focus();
                return;
            }


            if (!isValidLoginId(
                loginIdValue
            )) {

                event.preventDefault();

                alert(
                    "아이디 형식을 확인해주세요."
                );

                loginId.focus();
                return;
            }


            if (isWeakLoginId(
                loginIdValue
            )) {

                event.preventDefault();

                alert(
                    "보안에 취약하거나 쉽게 추측되는 " +
                    "아이디는 사용할 수 없습니다."
                );

                loginId.focus();
                return;
            }


            if (passwordError) {

                event.preventDefault();

                alert(passwordError);

                password.focus();
                return;
            }


            if (
                password.value
                !== passwordCheck.value
            ) {

                event.preventDefault();

                alert(
                    "비밀번호 확인이 일치하지 않습니다."
                );

                passwordCheck.focus();
                return;
            }


            if (!nicknameChecked) {

                event.preventDefault();

                alert(
                    "닉네임 중복확인을 완료해주세요."
                );

                nickname.focus();
                return;
            }


            if (!emailVerified) {

                event.preventDefault();

                alert(
                    "이메일 인증을 완료해주세요."
                );

                email.focus();
                return;
            }


            /*
                disabled 입력값은 서버로 전송되지 않으므로
                제출 직전에 반드시 활성화
            */

            email.disabled = false;
            email.readOnly = true;
        }
    );


    /* ========================================
       SNS 이메일 수집 동의
    ========================================= */

    const agreementEmail =
        document.querySelector(
            "#agreementEmail"
        );

    const socialLoginButtons =
        document.querySelectorAll(
            "#googleLoginBtn, " +
            "#kakaoLoginBtn, " +
            "#naverLoginBtn"
        );


    async function startSocialLogin(event) {

        event.preventDefault();

        if (!agreementEmail.checked) {

            alert(
                "이메일 수집 및 개인정보 이용에 " +
                "동의해야 SNS 회원가입이 가능합니다."
            );

            agreementEmail.focus();
            return;
        }


        const button =
            event.currentTarget;

        try {

            const response =
                await fetch(
                    "/member/oauth-email-agreement",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/x-www-form-urlencoded"
                        },

                        body: new URLSearchParams({
                            provider:
                            button.dataset.provider
                        })
                    }
                );


            const result =
                await response.text();


            if (!response.ok
                || result !== "true") {

                throw new Error();
            }


            window.location.href =
                button.href;

        } catch (error) {

            alert(
                "동의 정보를 저장하지 못했습니다. " +
                "잠시 후 다시 시도해주세요."
            );
        }
    }


    socialLoginButtons.forEach(
        button => {

            button.addEventListener(
                "click",
                startSocialLogin
            );
        }
    );


    /* 첫 화면 상태 적용 */

    updatePasswordMessages();
    updateEmailControls();

</script>

</body>
</html>
