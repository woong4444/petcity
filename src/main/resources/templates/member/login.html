<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>로그인 | PetCity</title>

    <!-- 공통 Header -->
    <link rel="stylesheet" th:href="@{/css/common/head.css}">

    <!-- 로그인 -->
    <link rel="stylesheet" th:href="@{/css/member/login.css}">

</head>

<body>

<!-- ================= HEADER ================= -->

<header th:replace="~{common/head :: head}"></header>

<!-- ================= LOGIN ================= -->

<div class="login-wrap">

    <div class="login-box">

        <h1>로그인</h1>

        <div th:if="${param.error}" class="error-msg">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <!-- ================================================= -->
        <!-- 07-15 오후 추가_상각 : SNS 이메일 수집 동의 -->
        <!-- ================================================= -->

        <div class="agreement-box">

            <label class="agreement-label">

                <input
                        type="checkbox"
                        id="agreementEmail">

                <span>

            이메일 수집 및 개인정보 이용에 동의합니다.
            <strong>(필수)</strong>

        </span>

            </label>

            <p class="agreement-desc">

                SNS 회원가입을 위해 이메일 수집 동의가 필요합니다.

            </p>

        </div>

        <a href="/oauth2/authorization/google"
           id="googleLoginBtn"
           class="sns-btn google">

            Google로 시작하기

        </a>

        <!-- Kakao -->
        <a href="/oauth2/authorization/kakao"
           class="sns-btn kakao">

            Kakao로 로그인

        </a>

        <!-- Naver -->
        <a href="/oauth2/authorization/naver"
           class="sns-btn naver">
            NAVER로 로그인

        </a>

        <div class="divider">

            <span>또는</span>

        </div>

        <h3>일반 로그인</h3>

        <form action="/member/login"
              method="post">

            <label>아이디</label>

            <input
                    type="text"
                    name="loginId"
                    placeholder="아이디">

            <label>비밀번호</label>

            <input
                    type="password"
                    name="password"
                    placeholder="비밀번호">

            <button type="submit">

                로그인

            </button>

        </form>

        <div class="bottom-link">

            <a href="/member/find-id">

                아이디 찾기

            </a>

            <span>|</span>

            <a href="/member/find-password">

                비밀번호 찾기

            </a>

        </div>

        <div class="signup-link">

            아직 회원이 아니신가요?

            <a href="/member/signup">

                회원가입

            </a>

        </div>

    </div>

</div>

</body>
</html>
