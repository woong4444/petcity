<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>로그인 | PetCity</title>

    <!-- 공통 헤더 -->
    <link rel="stylesheet"
          th:href="@{/css/common/head.css}">

    <!-- 로그인 -->
    <link rel="stylesheet"
          th:href="@{/css/member/login.css}">

</head>

<body>

<!-- ================= HEADER ================= -->

<header th:replace="~{common/head :: head}"></header>

<!-- ================= LOGIN ================= -->

<div class="login-wrap">

    <div class="login-box">

        <h1>로그인</h1>

        <!-- 일반 로그인 실패 -->
        <p th:if="${param.error != null
          and param.error[0] == 'local'}"
           class="login-error">

            아이디 또는 비밀번호가 올바르지 않습니다.

        </p>

        <!-- 소셜 로그인 실패 -->
        <p th:if="${param.error != null
          and param.error[0] == 'social'}"
           class="login-error">

            소셜 로그인 처리 중 문제가 발생했습니다.
            로그아웃 후 다시 시도해 주세요.

        </p>

        <!-- SNS 로그인 -->

        <a th:href="@{/oauth2/authorization/google}"
           id="googleLoginBtn"
           data-provider="google"
           class="sns-btn google">

            Google로 시작하기

        </a>

        <a th:href="@{/oauth2/authorization/kakao}"
           id="kakaoLoginBtn"
           data-provider="kakao"
           class="sns-btn kakao">

            Kakao로 로그인

        </a>

        <a th:href="@{/oauth2/authorization/naver}"
           id="naverLoginBtn"
           data-provider="naver"
           class="sns-btn naver">

            NAVER로 로그인

        </a>

        <div class="divider">

            <span>또는</span>

        </div>

        <h3>일반 로그인</h3>

        <form action="/member/login"
              method="post"
              id="loginForm">

            <label for="loginId">
                아이디
            </label>

            <input
                    id="loginId"
                    type="text"
                    name="loginId"
                    placeholder="아이디"
                    autocomplete="username"
                    required>

            <label for="password">
                비밀번호
            </label>

            <div class="password-input-wrap">

                <input
                        id="password"
                        type="password"
                        name="password"
                        placeholder="비밀번호"
                        autocomplete="current-password"
                        required>

                <button
                        type="button"
                        id="togglePasswordBtn"
                        class="password-toggle-btn">

                    보기

                </button>

            </div>

            <button
                    type="submit"
                    id="loginBtn">

                로그인

            </button>

        </form>

        <div class="bottom-link">

            <a href="/member/find-id">

                아이디 찾기

            </a>

            <span>|</span>

            <a href="/member/find-password">

                비밀번호 찾기

            </a>

        </div>

        <div class="signup-link">

            아직 회원이 아니신가요?

            <a href="/member/signup">

                회원가입

            </a>

        </div>

    </div>

</div>

<script>

    const loginForm = document.querySelector("#loginForm");
    const loginBtn = document.querySelector("#loginBtn");

    const passwordInput =
        document.querySelector("#password");

    const togglePasswordBtn =
        document.querySelector("#togglePasswordBtn");

    // ============================
    // 비밀번호 보기/숨기기
    // ============================

    togglePasswordBtn.addEventListener("click", () => {

        const hidden =
            passwordInput.type === "password";

        passwordInput.type =
            hidden ? "text" : "password";

        togglePasswordBtn.textContent =
            hidden ? "숨기기" : "보기";

    });

    // ============================
    // 로그인 중 중복 클릭 방지
    // ============================

    loginForm.addEventListener("submit", () => {

        loginBtn.disabled = true;
        loginBtn.textContent = "로그인 중...";

    });

</script>

</body>

</html>
