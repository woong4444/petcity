<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>로그인 | PetCity</title>

    <link rel="stylesheet" th:href="@{/css/member/login.css}">

</head>

<body>

<div class="login-wrap">

    <div class="login-box">

        <h1>로그인</h1>
        <div th:if="${param.error}" class="error-msg">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <p class="sub-title">

            <!-- 일반 로그인 오류 메시지 -->
            <div
                    th:if="${message}"
                    class="alert alert-error mb-3">

        </p>

        <!-- Google -->
        <a href="/oauth2/authorization/google"
           class="sns-btn google">

            <!-- 15분 미활동 자동 로그아웃 메시지 -->
            <div
                    th:if="${param.expired != null}"
                    class="alert alert-warning mb-3">

                <span>
                    장시간 활동이 없어 자동 로그아웃되었습니다.
                </span>

            </div>

            <form action="/member/login" method="post">

        </a>

        <!-- Kakao -->
        <a href="/oauth2/authorization/kakao"
           class="sns-btn kakao">

            Kakao로 로그인

        </a>

                    <input
                            type="text"
                            name="loginId"
                            class="input input-bordered"
                            placeholder="아이디"
                            required>

            NAVER로 로그인

                <div class="form-control mb-4">

            <span>또는</span>

        </div>

        <h3>일반 로그인</h3>

        <form action="/member/login"
              method="post">

            <!-- CSRF -->
<!--            <input type="hidden"-->
<!--                   th:name="${_csrf.parameterName}"-->
<!--                   th:value="${_csrf.token}">-->

                    <input
                            type="password"
                            name="password"
                            class="input input-bordered"
                            placeholder="비밀번호"
                            required>

            <input
                    type="text"
                    name="loginId"
                    placeholder="아이디">

                <button
                        type="submit"
                        class="btn btn-primary w-full">

            <button type="submit">

                로그인

            </button>

        </form>

            <div class="divider">
                OR
            </div>

            <a
                    href="/member/signup"
                    class="btn btn-outline">

                회원가입

            </a>

        </div>

    </div>

</div>

</body>
</html>
