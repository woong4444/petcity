<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">


<head>

    <meta charset="UTF-8">

    <title>로그인 | PetCity</title>

    <!-- 공통 Header -->
    <link rel="stylesheet" th:href="@{/css/common/head.css}">

    <!-- 로그인 -->
    <link rel="stylesheet" th:href="@{/css/member/login.css}">

</head>

<body>

<!-- ================= HEADER ================= -->

<header th:replace="~{common/head :: head}"></header>

<!-- ================= LOGIN ================= -->

<div class="login-wrap">

    <div class="login-box">

        <h1>로그인</h1>

        <!-- 일반 로그인 실패 -->
        <p th:if="${param.error != null
          and param.error[0] == 'local'}"
           class="login-error">

            아이디 또는 비밀번호가 올바르지 않습니다.

        </p>

        <!-- 소셜 로그인 실패 -->
        <p th:if="${param.error != null
          and param.error[0] == 'social'}"
           class="login-error">

            소셜 로그인 처리 중 문제가 발생했습니다.
            로그아웃 후 다시 시도해 주세요.

        </p>




        <a th:href="@{/oauth2/authorization/google}"
           id="googleLoginBtn"
           data-provider="google"
           class="sns-btn google">

            Google로 시작하기

        </a>

        <a th:href="@{/oauth2/authorization/kakao}"
           id="kakaoLoginBtn"
           data-provider="kakao"
           class="sns-btn kakao">

            Kakao로 로그인

        </a>

        <a th:href="@{/oauth2/authorization/naver}"
           id="naverLoginBtn"
           data-provider="naver"
           class="sns-btn naver">

            NAVER로 로그인

        </a>

        <div class="divider">

            <span>또는</span>

        </div>

        <h3>일반 로그인</h3>

        <form action="/member/login"
              method="post">

            <label>아이디</label>

            <input
                    type="text"
                    name="loginId"
                    placeholder="아이디">

            <label>비밀번호</label>

            <input
                    type="password"
                    name="password"
                    placeholder="비밀번호">

            <button type="submit">

                로그인

            </button>

        </form>

        <div class="bottom-link">

            <a href="/member/find-id">

                아이디 찾기

            </a>

            <span>|</span>

            <a href="/member/find-password">

                비밀번호 찾기

            </a>

        </div>

        <div class="signup-link">

            아직 회원이 아니신가요?

            <a href="/member/signup">

                회원가입

            </a>

        </div>

    </div>

</div>



</body>
</html>
