<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>새 비밀번호 설정 | PetCity</title>

    <!-- 07-22 상각 : 공통 헤더 CSS 적용 -->
    <link rel="stylesheet" th:href="@{/css/common/head.css}">

    <style>
        body {
            font-family: sans-serif;
            background: #f6f8fb;
        }

        .box {
            max-width: 500px;
            margin: 90px auto;
            padding: 36px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 35px #1f35521a;
        }

        .box p {
            color: #667085;
        }

        .box label {
            display: block;
            font-weight: 800;
            margin: 18px 0 7px;
        }

        .box input {
            box-sizing: border-box;
            width: 100%;
            padding: 13px;
            border: 1px solid #d4dce8;
            border-radius: 10px;
        }

        .box button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            font-weight: 800;
        }

        .msg {
            padding: 14px;
            background: #fff1f2;
            color: #b42338;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 07-22 상각 : 로그인 페이지와 동일한 공통 헤더 적용 -->
<header th:replace="~{common/head :: head}"></header>

<main class="box">
    <h1>새 비밀번호 설정</h1>

    <p>
        인증은 10분 동안 유효합니다.
        영문·숫자·특수문자를 포함한 8자 이상의 비밀번호를 입력해주세요.
    </p>

    <div th:if="${message}"
         class="msg"
         th:text="${message}">
    </div>

    <form method="post" action="/member/reset-password">

        <label>새 비밀번호</label>
        <input type="password"
               name="newPassword"
               minlength="8"
               autocomplete="new-password"
               required>

        <label>새 비밀번호 확인</label>
        <input type="password"
               name="newPasswordConfirm"
               minlength="8"
               autocomplete="new-password"
               required>

        <button>비밀번호 변경</button>

    </form>
</main>

</body>
</html>
