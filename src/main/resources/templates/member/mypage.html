<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page | PetCity</title>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
</head>
<body>
<header th:replace="~{common/head :: head}"></header>

<main class="mypage-wrap">
    <section class="mypage-card">
        <div class="mypage-heading">
            <span>&#128062;</span>
            <div>
                <h1>&#47560;&#51060;&#54168;&#51060;&#51648;</h1>
                <p>&#45236; &#54924;&#50896; &#51221;&#48372;&#47484; &#54869;&#51064;&#54616;&#44256; &#49688;&#51221;&#54624; &#49688; &#51080;&#50612;&#50836;.</p>
            </div>
        </div>

        <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
        <div th:if="${message}" class="message error" th:text="${message}"></div>

        <form method="post" action="/member/mypage" class="profile-form">
            <div class="field-grid">
                <label>&#50500;&#51060;&#46356;<input type="text" th:value="${member.loginId}" readonly></label>
                <label>&#51060;&#47700;&#51068;<input type="email" th:value="${member.email}" readonly></label>
            </div>
            <p class="field-help">&#50500;&#51060;&#46356;&#50752; &#51060;&#47700;&#51068;&#51008; &#48372;&#50504;&#51012; &#50948;&#54644; &#51060; &#54868;&#47732;&#50640;&#49436; &#48320;&#44221;&#54624; &#49688; &#50630;&#49845;&#45768;&#45796;.</p>

            <div class="field-grid">
                <label>&#45769;&#45348;&#51076;<input type="text" name="nickname" th:value="${member.nickname}" minlength="2" maxlength="20" required></label>
                <label>&#51204;&#54868;&#48264;&#54840;<input type="tel" name="phone" th:value="${member.phone}" placeholder="010-0000-0000" required></label>
            </div>
            <button class="btn primary" type="submit">&#54924;&#50896; &#51221;&#48372; &#51200;&#51109;</button>
        </form>
        <a class="pet-link" href="/member/mypage/pets">&#128062; &#45236; &#48152;&#47140;&#46041;&#47932; &#44288;&#47532;&#54616;&#44592;</a>
    </section>

    <section class="withdraw-card">
        <div>
            <h2>&#54924;&#50896; &#53448;&#53748;</h2>
            <p>&#53448;&#53664; &#50836;&#52397; &#54980; 3&#51068; &#46041;&#50504; <b>DELETE_PENDING</b> &#49345;&#53468;&#47196; &#48372;&#44288;&#46104;&#47728;, &#44592;&#44036;&#51060; &#51648;&#45208;&#47732; &#49325;&#51228; &#52376;&#47532;&#46121;&#45768;&#45796;.</p>
        </div>
        <div th:if="${withdrawMessage}" class="message error" th:text="${withdrawMessage}"></div>
        <form method="post" action="/member/mypage/withdraw" onsubmit="return confirm('&#53448;&#53748;&#47484; &#50836;&#52397;&#54616;&#49884;&#44192;&#49845;&#45768;&#44620;? &#50836;&#52397; &#54980; &#48148;&#47196; &#47196;&#44536;&#50500;&#50883;&#46121;&#45768;&#45796;.');" class="withdraw-form">
            <label>&#54788;&#51116; &#48708;&#48128;&#48264;&#54840;
                <input type="password" name="password" autocomplete="current-password" required placeholder="&#48708;&#48128;&#48264;&#54840;&#47484; &#51077;&#47141;&#54616;&#49464;&#50836;">
            </label>
            <button class="btn danger" type="submit">&#54924;&#50896; &#53448;&#53748; &#50836;&#52397;</button>
        </form>
    </section>
</main>

<style>
.mypage-wrap{max-width:980px;margin:56px auto 90px;padding:0 20px;color:#172033}.mypage-card,.withdraw-card{background:#fff;border:1px solid #e6ebf2;border-radius:20px;padding:34px;box-shadow:0 12px 30px rgba(31,53,82,.08);margin-bottom:24px}.mypage-heading{display:flex;gap:13px;align-items:center;border-bottom:1px solid #edf0f5;padding-bottom:22px;margin-bottom:25px}.mypage-heading span{font-size:34px}.mypage-heading h1{font-size:28px;margin:0}.mypage-heading p,.withdraw-card p{color:#718096;margin:6px 0 0;line-height:1.6}.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:18px 0}.profile-form label,.withdraw-form label{display:flex;flex-direction:column;gap:8px;font-weight:700;font-size:14px}.profile-form input,.withdraw-form input{border:1px solid #d8e0ec;border-radius:10px;padding:13px 14px;font-size:15px}.profile-form input[readonly]{background:#f5f7fa;color:#778398}.field-help{font-size:13px;color:#8c98a9;margin:-8px 0 18px}.btn{border:0;border-radius:10px;padding:13px 20px;font-weight:800;cursor:pointer}.primary{background:#2563eb;color:#fff}.danger{background:#fff1f2;color:#d7374b;border:1px solid #fecdd3}.pet-link{display:inline-block;margin-left:10px;color:#0f766e;font-weight:800;text-decoration:none}.withdraw-card{border-color:#ffe1e5}.withdraw-card h2{margin:0;color:#bd2739}.withdraw-form{display:flex;gap:12px;align-items:end;margin-top:22px}.withdraw-form label{flex:1}.message{padding:13px 15px;border-radius:10px;margin:14px 0;font-weight:700}.success{background:#eafaf0;color:#167a40}.error{background:#fff0f1;color:#c43646}@media(max-width:650px){.field-grid{grid-template-columns:1fr}.withdraw-form{flex-direction:column;align-items:stretch}.withdraw-form .btn{width:100%}.pet-link{display:block;margin:16px 0 0}}
</style>
</body>
</html>
