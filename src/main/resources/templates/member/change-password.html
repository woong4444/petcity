<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>비밀번호 변경 | PetCity</title><link rel="stylesheet" th:href="@{/css/common/head.css}"><style>.box{max-width:540px;margin:65px auto;padding:34px;border:1px solid #e5e7eb;border-radius:20px;box-shadow:0 12px 35px #1f35521a}.box p{color:#667085}.box label{display:block;font-weight:800;margin:18px 0 7px}.box input{box-sizing:border-box;width:100%;padding:13px;border:1px solid #d4dce8;border-radius:10px}.box button{width:100%;margin-top:24px;padding:14px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:800}.msg{padding:14px;border-radius:10px;background:#fff1f2;color:#b42338}.ok{background:#ecfdf3;color:#067647}</style></head><body><header th:replace="~{common/head :: head}"></header><main class="box"><h1>비밀번호 변경</h1><p>8자 이상, 영문·숫자·특수문자를 모두 포함해주세요.</p><div th:if="${message}" class="msg" th:text="${message}"></div><div th:if="${successMessage}" class="msg ok" th:text="${successMessage}"></div><form method="post" action="/member/mypage/password"><label>현재 비밀번호</label><input type="password" name="currentPassword" autocomplete="current-password" required><label>새 비밀번호</label><input type="password" name="newPassword" autocomplete="new-password" minlength="8" required><label>새 비밀번호 확인</label><input type="password" name="newPasswordConfirm" autocomplete="new-password" minlength="8" required><button>비밀번호 변경</button></form></main></body></html>
