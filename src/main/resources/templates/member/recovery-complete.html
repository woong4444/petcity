<!DOCTYPE html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="3;url=/member/login"><title>계정 복구 완료 | PetCity</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7fb;font-family:Arial,sans-serif}.card{width:min(540px,calc(100% - 32px));padding:48px;text-align:center;background:#fff;border-radius:22px;box-shadow:0 15px 45px #1f35521a}.icon{width:70px;height:70px;margin:0 auto 20px;display:grid;place-items:center;border-radius:50%;background:#ecfdf3;color:#067647;font-size:36px;font-weight:900}.msg{padding:16px;background:#ecfdf3;color:#067647;border-radius:12px;line-height:1.6}.button{display:inline-block;margin-top:24px;padding:13px 22px;background:#2563eb;color:#fff;text-decoration:none;border-radius:10px;font-weight:800}</style></head><body><main class="card"><div class="icon">✓</div><h1>계정 복구 완료</h1><div class="msg" th:text="${message != null ? message : '탈퇴가 취소되고 계정이 복구되었습니다.'}">탈퇴가 취소되고 계정이 복구되었습니다.</div><p>3초 후 로그인 화면으로 이동합니다.</p><a class="button" href="/member/login">지금 로그인하기</a></main></body></html>
