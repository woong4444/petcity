<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>맞춤 동물병원 검색 - PetCity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <link rel="stylesheet" th:href="@{/css/hospital/list.css}">
    <style>
        .custom-search-wrap { max-width: 1024px; margin: 52px auto 90px; padding: 0 20px; color: #172033; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20 font-sans">
<div th:replace="~{common/head :: head}"></div>

<main class="custom-search-wrap">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-3">내 반려동물 맞춤 병원 찾기</h1>
        <p class="text-slate-500 font-bold">우리 아이에게 딱 맞는 동물병원을 쉽고 빠르게 찾아보세요.</p>
    </div>

    <form id="customSearchForm" action="/hospital/list" method="get">
        <input type="hidden" name="animalId" id="searchAnimalId">
        <input type="hidden" name="subAnimalId" id="searchSubAnimalId">
        <input type="hidden" name="sort" value="recommend">

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mb-8">

            <!-- STEP 01: 반려동물 선택 -->
            <div class="step-section border-b border-slate-200">
                <div class="step-header flex cursor-pointer" onclick="toggleStep('step1')">
                    <div class="bg-slate-800 text-white w-40 flex items-center justify-center font-bold text-sm tracking-wide">
                        01 반려동물 선택
                    </div>
                    <div class="flex-1 p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                        <span class="font-extrabold text-slate-700">진료받을 반려동물을 선택해주세요 (필수)</span>
                        <span class="text-2xl text-slate-400" id="icon-step1">−</span>
                    </div>
                </div>
                <div id="content-step1" class="step-content p-8 bg-slate-50 border-t border-slate-100">
                    <div th:if="${#lists.isEmpty(myPets)}" id="emptyPetArea" class="text-center py-10 bg-white border border-dashed border-slate-300 rounded-xl mb-6">
                        <p class="text-slate-500 font-bold mb-4">등록된 반려동물이 없습니다!</p>
                        <button type="button" onclick="openPetModalForAdd()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-6 rounded-full transition inline-flex items-center gap-2">
                            <span class="text-xl leading-none">+</span> 반려동물 추가하기
                        </button>
                    </div>

                    <div th:unless="${#lists.isEmpty(myPets)}" id="myPetListArea" class="mb-6 space-y-4">
                        <div th:each="pet : ${myPets}" class="pet-card-wrap bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-6 shadow-sm hover:border-sky-300 transition">
                            <div class="w-24 h-24 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 text-3xl overflow-hidden border border-slate-200 shrink-0">
                                <img th:if="${not #strings.isEmpty(pet.photoUrl)}" th:src="${pet.photoUrl}" class="w-full h-full object-cover">
                                <span th:unless="${not #strings.isEmpty(pet.photoUrl)}">🐾</span>
                            </div>
                            <div class="flex-1 grid grid-cols-2 gap-y-2 text-sm">
                                <div class="col-span-2 mb-2">
                                    <strong class="text-xl text-slate-800 mr-2" th:text="${pet.petName}">이름</strong>
                                    <span class="text-sky-600 font-bold bg-sky-50 px-2 py-1 rounded" th:text="${pet.animalName}">동물종류</span>
                                </div>
                                <div class="text-slate-600" th:text="'생년월일 : ' + ${pet.birthDate} + ' (' + ${pet.age} + '살)'"></div>
                                <div class="text-slate-600">성별 : <span th:if="${pet.gender == 'M'}">수컷</span><span th:if="${pet.gender == 'F'}">암컷</span><span th:if="${pet.gender == 'NM'}">수컷(중성화)</span><span th:if="${pet.gender == 'NF'}">암컷(중성화)</span></div>
                                <div class="text-slate-600" th:text="'품종 : ' + ${pet.breedName}"></div>
                                <div class="text-slate-600" th:text="'몸무게 : ' + ${pet.weight} + 'kg'"></div>
                            </div>
                            <div class="flex flex-col gap-2 w-24 shrink-0">
                                <button type="button" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 rounded-lg text-sm transition btn-select-pet" th:data-animal-id="${pet.animalId}" th:data-sub-animal-id="${pet.subAnimalId}" onclick="selectPet(this)">선택</button>
                                <button type="button" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 font-bold py-2 rounded-lg text-sm transition btn-edit-pet" th:data-id="${pet.petId}" th:data-name="${pet.petName}" th:data-animal="${pet.animalId}" th:data-breed="${pet.breedName}" th:data-gender="${pet.gender}" th:data-birth="${pet.birthDate}" th:data-weight="${pet.weight}" th:data-reg="${pet.registrationNo}" onclick="loadPetModal(this)">수정</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- STEP 02: 진료 항목 선택 -->
            <div class="step-section border-b border-slate-200">
                <div class="step-header flex cursor-pointer" onclick="toggleStep('step2')">
                    <div class="bg-slate-700 text-white w-40 flex items-center justify-center font-bold text-sm tracking-wide">
                        02 진료 항목 선택
                    </div>
                    <div class="flex-1 p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                        <span class="font-extrabold text-slate-700">원하시는 진료 항목을 선택해주세요</span>
                        <span class="text-2xl text-slate-400" id="icon-step2">+</span>
                    </div>
                </div>
                <div id="content-step2" class="step-content p-8 bg-slate-50 border-t border-slate-100 hidden">
                    <h4 class="font-bold text-slate-700 mb-3">진료 과목 <span class="text-sm font-normal text-slate-500">(다중 선택)</span></h4>
                    <div class="pill-group wrap-group mb-8">
                        <label class="pill-check subject-all-check">
                            <input type="checkbox" id="subjectAllSearch" value="">
                            <span>전체 선택</span>
                        </label>
                        <label class="pill-check" th:each="subj : ${medicalSubjectList}">
                            <input type="checkbox" name="subjects" class="step2-subject-chk" th:value="${subj}">
                            <span th:text="${subj}">과목명</span>
                        </label>
                    </div>

                    <h4 class="font-bold text-slate-700 mb-3 border-t border-slate-200 pt-6">진료 옵션 및 시설</h4>
                    <div class="pill-group wrap-group">
                        <label class="pill-check service-all-check">
                            <input type="checkbox" id="serviceAllSearch" value="">
                            <span>전체 선택</span>
                        </label>
                        <label class="pill-check" th:each="svc : ${medicalServiceList}">
                            <input type="checkbox" name="serviceIds" class="step2-service-chk" th:value="${svc.serviceId}">
                            <span th:text="${svc.serviceName}">옵션명</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- STEP 03: 의료지역 선택 -->
            <div class="step-section">
                <div class="step-header flex cursor-pointer" onclick="toggleStep('step3')">
                    <div class="bg-slate-600 text-white w-40 flex items-center justify-center font-bold text-sm tracking-wide">
                        03 의료지역 선택
                    </div>
                    <div class="flex-1 p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                        <span class="font-extrabold text-slate-700">방문하실 지역을 선택해주세요</span>
                        <span class="text-2xl text-slate-400" id="icon-step3">+</span>
                    </div>
                </div>
                <div id="content-step3" class="step-content p-8 bg-slate-50 border-t border-slate-100 hidden">
                    <div class="pill-group wrap-group region-checkbox-group">
                        <label class="pill-check seoul-all-check">
                            <input type="checkbox" id="seoulAllSearch" value="">
                            <span>전체 선택</span>
                        </label>
                        <th:block th:each="item : ${districtList}">
                            <label class="pill-check seoul-district-search" th:if="${!item.contains('시 ') and !item.endsWith('군') and !item.endsWith('시')}">
                                <input type="checkbox" name="districts" class="step3-district-chk" th:value="${item}">
                                <span th:text="${item}">지역명</span>
                            </label>
                        </th:block>
                        <label class="pill-check">
                            <input type="checkbox" id="otherAllSearch" value="">
                            <span>그 외 지역 전체</span>
                        </label>
                    </div>
                    <div style="display: none;">
                        <th:block th:each="item : ${districtList}">
                            <input type="checkbox" name="districts" class="hidden-other-district-search" th:value="${item}" th:if="${item.contains('시 ') or item.endsWith('군') or item.endsWith('시')}">
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <div id="ajaxDynamicResult" class="mt-8 hidden"></div>

        <div class="text-center mt-8">
            <button type="submit" id="btnFullSearch" class="bg-sky-500 hover:bg-sky-600 text-white text-lg font-extrabold py-4 px-20 rounded-xl shadow-lg transition">전체 맞춤 검색 결과 보기</button>
        </div>
    </form>
</main>

<div id="petModal" class="fixed top-0 left-0 w-full h-full bg-slate-900/60 z-50 hidden items-center justify-center p-4"></div>

<script th:inline="javascript">
    function toggleStep(stepId) {
        const content = document.getElementById('content-' + stepId);
        const icon = document.getElementById('icon-' + stepId);
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.textContent = '−';
        } else {
            content.classList.add('hidden');
            icon.textContent = '+';
        }
    }

    function selectPet(btn) {
        const animalId = btn.getAttribute('data-animal-id');
        const subId = btn.getAttribute('data-sub-animal-id') || '';
        document.getElementById('searchAnimalId').value = animalId;
        document.getElementById('searchSubAnimalId').value = subId;

        document.querySelectorAll('.pet-card-wrap').forEach(el => {
            el.classList.remove('border-sky-500', 'bg-sky-50');
            el.classList.add('border-slate-200', 'bg-white');
        });
        btn.closest('.pet-card-wrap').classList.remove('border-slate-200', 'bg-white');
        btn.closest('.pet-card-wrap').classList.add('border-sky-500', 'bg-sky-50');

        document.getElementById('content-step2').classList.remove('hidden');
        document.getElementById('icon-step2').textContent = '−';
        document.getElementById('content-step3').classList.remove('hidden');
        document.getElementById('icon-step3').textContent = '−';

        fetchDynamicResults();
    }

    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('customSearchForm');
        if (form) {
            form.addEventListener('change', function() {
                fetchDynamicResults();
            });
        }

        const otherAllSearch = document.getElementById('otherAllSearch');
        if (otherAllSearch) {
            otherAllSearch.addEventListener('change', function () {
                document.querySelectorAll('.hidden-other-district-search').forEach(chk => chk.checked = this.checked);
                fetchDynamicResults();
            });
        }

        const subjectAllSearch = document.getElementById('subjectAllSearch');
        if(subjectAllSearch) {
            subjectAllSearch.addEventListener('change', function() {
                document.querySelectorAll('.step2-subject-chk').forEach(chk => chk.checked = this.checked);
                fetchDynamicResults();
            });
        }

        const serviceAllSearch = document.getElementById('serviceAllSearch');
        if(serviceAllSearch) {
            serviceAllSearch.addEventListener('change', function() {
                document.querySelectorAll('.step2-service-chk').forEach(chk => chk.checked = this.checked);
                fetchDynamicResults();
            });
        }
    });

    function fetchDynamicResults() {
        const form = document.getElementById('customSearchForm');
        const formData = new FormData(form);
        const searchParams = new URLSearchParams(formData);

        if(!searchParams.get('animalId')) {
            return;
        }

        const resultArea = document.getElementById('ajaxDynamicResult');
        resultArea.classList.remove('hidden');
        resultArea.innerHTML = '<div class="text-center py-10 text-slate-500 font-bold">맞춤 병원을 불러오는 중입니다...</div>';

        fetch('/hospital/list/ajax?' + searchParams.toString(), {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(res => res.text())
            .then(html => {
                resultArea.innerHTML = html;
                resultArea.classList.add('bg-white', 'p-6', 'rounded-xl', 'border', 'border-slate-200', 'shadow-sm');
            })
            .catch(err => {
                console.error(err);
                resultArea.innerHTML = '<div class="text-center py-10 text-red-500 font-bold">오류가 발생했습니다.</div>';
            });
    }
</script>
</body>
</html>
