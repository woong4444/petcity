<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>맞춤 동물병원 검색 - PetCity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <link rel="stylesheet" th:href="@{/css/hospital/list.css}">
    <!-- 맞춤검색 전용 임시 스타일 (나중에 css 파일로 옮기셔도 됩니다) -->
    <style>
        .custom-search-wrap {
            max-width: 1024px;
            margin: 52px auto 90px;
            padding: 0 20px;
            color: #172033;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
<div th:replace="~{common/head :: head}"></div>

<main class="custom-search-wrap">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-3">내 반려동물 맞춤 병원 찾기</h1>
        <p class="text-slate-500 font-bold">우리 아이에게 딱 맞는 동물병원을 쉽고 빠르게 찾아보세요.</p>
    </div>

    <form id="customSearchForm" action="/hospital/list" method="get">
        <input type="hidden" name="animalId" id="searchAnimalId">
        <input type="hidden" name="subAnimalId" id="searchSubAnimalId">
        <input type="hidden" name="sort" value="recommend">

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden mb-8">

            <!-- STEP 01: 반려동물 선택 -->
            <div class="step-section border-b border-slate-200">
                <div class="step-header flex cursor-pointer" onclick="toggleStep('step1')">
                    <div class="bg-slate-800 text-white w-40 flex items-center justify-center font-bold text-sm tracking-wide">
                        01 반려동물 선택
                    </div>
                    <div class="flex-1 p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                        <span class="font-extrabold text-slate-700">진료받을 반려동물을 선택해주세요 (필수)</span>
                        <span class="text-2xl text-slate-400" id="icon-step1">−</span>
                    </div>
                </div>
                <div id="content-step1" class="step-content p-8 bg-slate-50 border-t border-slate-100">
                    <div th:if="${#lists.isEmpty(myPets)}" id="emptyPetArea"
                         class="text-center py-10 bg-white border border-dashed border-slate-300 rounded-xl mb-6">
                        <p class="text-slate-500 font-bold mb-4">등록된 반려동물이 없습니다!</p>
                        <button type="button" onclick="openPetModalForAdd()"
                                class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-6 rounded-full transition inline-flex items-center gap-2">
                            <span class="text-xl leading-none">+</span> 반려동물 추가하기
                        </button>
                    </div>
                    <div th:unless="${#lists.isEmpty(myPets)}" id="myPetListArea" class="mb-6 space-y-4">
                        <div th:each="pet : ${myPets}"
                             class="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-6 shadow-sm hover:border-sky-300 transition">
                            <div class="w-24 h-24 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 text-3xl overflow-hidden border border-slate-200">
                                <img th:if="${pet.photoUrl != null and pet.photoUrl != ''}" th:src="${pet.photoUrl}"
                                     class="w-full h-full object-cover">
                                <span th:unless="${pet.photoUrl != null and pet.photoUrl != ''}">🐾</span>
                            </div>
                            <div class="flex-1 grid grid-cols-2 gap-y-2 text-sm">
                                <div class="col-span-2 mb-2">
                                    <strong class="text-xl text-slate-800 mr-2" th:text="${pet.petName}">이름</strong>
                                    <span class="text-sky-600 font-bold bg-sky-50 px-2 py-1 rounded"
                                          th:text="${pet.animalName}">동물종류</span>
                                </div>
                                <div class="text-slate-600"
                                     th:text="'생년월일 : ' + ${pet.birthDate} + ' (' + ${pet.age} + '살)'"></div>
                                <div class="text-slate-600">성별 : <span th:text="${pet.gender}"></span></div>
                                <div class="text-slate-600" th:text="'품종 : ' + ${pet.breedName}"></div>
                                <div class="text-slate-600" th:text="'몸무게 : ' + ${pet.weight} + 'kg'"></div>
                            </div>
                            <div class="flex flex-col gap-2 w-24">
                                <button type="button"
                                        class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-2 rounded-lg text-sm transition btn-select-pet"
                                        th:data-animal-id="${pet.animalId}" th:data-sub-animal-id="${pet.subAnimalId}">
                                    선택
                                </button>
                                <button type="button"
                                        class="btn-edit-pet bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 font-bold py-2 rounded-lg text-sm transition"
                                        th:data-id="${pet.petId}" onclick="loadPetModal(this)">수정
                                </button>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button type="button" onclick="openPetModalForAdd()"
                                    class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 font-bold py-2 px-6 rounded-full transition inline-flex items-center gap-2 text-sm">
                                <span class="text-lg leading-none">+</span> 다른 반려동물 추가
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- STEP 02: 진료 항목 선택 -->
            <div class="step-section border-b border-slate-200">
                <div class="step-header flex cursor-pointer" onclick="toggleStep('step2')">
                    <div class="bg-slate-700 text-white w-40 flex items-center justify-center font-bold text-sm tracking-wide">
                        02 진료 항목 선택
                    </div>
                    <div class="flex-1 p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                        <span class="font-extrabold text-slate-700">원하시는 진료 항목을 선택해주세요</span>
                        <span class="text-2xl text-slate-400" id="icon-step2">+</span>
                    </div>
                </div>
                <div id="content-step2" class="step-content p-8 bg-slate-50 border-t border-slate-100 hidden">
                    <h4 class="font-bold text-slate-700 mb-3">진료 과목 <span class="text-sm font-normal text-slate-500">(다중 선택)</span>
                    </h4>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
                        <label class="custom-chk-btn" th:each="subj : ${medicalSubjectList}">
                            <input type="checkbox" name="subjects" class="step2-subject-chk" th:value="${subj}">
                            <span th:text="${subj}">과목명</span>
                        </label>
                    </div>
                    <h4 class="font-bold text-slate-700 mb-3 border-t border-slate-200 pt-6">진료 옵션 및 시설</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <label class="custom-chk-btn" th:each="svc : ${medicalServiceList}">
                            <input type="checkbox" name="serviceIds" class="step2-service-chk"
                                   th:value="${svc.serviceId}">
                            <span th:text="${svc.serviceName}">옵션명</span>
                        </label>
                    </div>
                    <div class="text-right mt-8">
                        <button type="button"
                                class="bg-slate-800 text-white font-bold py-2 px-6 rounded-lg text-sm hover:bg-slate-900 transition"
                                onclick="toggleStep('step3')">다음 단계로
                        </button>
                    </div>
                </div>
            </div>

            <!-- STEP 03: 의료지역 선택 -->
            <div class="step-section">
                <div class="step-header flex cursor-pointer" onclick="toggleStep('step3')">
                    <div class="bg-slate-600 text-white w-40 flex items-center justify-center font-bold text-sm tracking-wide">
                        03 의료지역 선택
                    </div>
                    <div class="flex-1 p-5 flex justify-between items-center bg-white hover:bg-slate-50 transition">
                        <span class="font-extrabold text-slate-700">방문하실 지역을 선택해주세요</span>
                        <span class="text-2xl text-slate-400" id="icon-step3">+</span>
                    </div>
                </div>
                <div id="content-step3" class="step-content p-8 bg-slate-50 border-t border-slate-100 hidden">
                    <div class="mb-4 flex items-center gap-4">
                        <label class="custom-chk-btn seoul-all" style="width: auto;">
                            <input type="checkbox" id="seoulAllSearch" class="step3-district-chk">
                            <span style="padding: 10px 20px;">서울 전체</span>
                        </label>
                        <!-- 🌟 그 외 지역 버튼 -->
                        <label class="custom-chk-btn" style="width: auto;">
                            <input type="checkbox" id="otherAllSearch" class="step3-district-chk">
                            <span style="color:#0ea5e9; font-weight: 800; padding: 10px 20px;">그 외 지역 전체</span>
                        </label>
                    </div>

                    <div class="grid grid-cols-3 sm:grid-cols-5 gap-3 border-t border-slate-200 pt-4">
                        <th:block th:each="item : ${districtList}">
                            <label class="custom-chk-btn seoul-district-search"
                                   th:if="${!item.contains('시 ') and !item.endsWith('군') and !item.endsWith('시')}">
                                <input type="checkbox" name="districts" class="step3-district-chk" th:value="${item}">
                                <span th:text="${item}">지역명</span>
                            </label>
                        </th:block>
                    </div>

                    <!-- 🌟 서버로 전송할 그 외 지역 (숨김) -->
                    <div style="display: none;">
                        <th:block th:each="item : ${districtList}">
                            <input type="checkbox" name="districts" class="hidden-other-district-search"
                                   th:value="${item}"
                                   th:if="${item.contains('시 ') or item.endsWith('군') or item.endsWith('시')}">
                        </th:block>
                    </div>
                </div>
            </div>
        </div>

        <div id="ajaxDynamicResult" class="mt-8 hidden"></div>

        <div class="text-center mt-8">
            <button type="submit" id="btnFullSearch"
                    class="bg-sky-500 hover:bg-sky-600 text-white text-lg font-extrabold py-4 px-20 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                전체 맞춤 검색 결과 보기
            </button>
        </div>
    </form>
</main>

<!-- JS에서 사용하기 위해 타임리프 변수는 여기에 둡니다 -->
<script th:inline="javascript">
    const subAnimalList = /*[[${subAnimalTypeList}]]*/ [];
</script>

<!-- 모든 JS 코드를 분리하여 로드 -->
<script th:src="@{/js/hospital/search.js?v=6}"></script>
</body>
</html>
