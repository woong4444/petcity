<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>동물병원 찾기 - PetCity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 공통 헤더 CSS -->
    <link rel="stylesheet" th:href="@{/css/common/head.css}">

    <!-- 병원 목록 CSS -->
    <link rel="stylesheet" th:href="@{/css/hospital/list.css}">
</head>
<body>

<!-- 공통 헤더 -->
<div th:replace="~{common/head :: head}"></div>

<main class="hospital-list-wrap">

    <!-- 페이지 제목 -->
    <section class="hospital-list-header">
        <p class="page-badge">PetCity Hospital Finder</p>
        <h1>동물병원 찾기</h1>
        <p class="page-desc">반려동물 종류와 지역을 선택해서 우리 아이에게 맞는 병원을 찾아보세요.</p>
    </section>

    <!-- 필터 영역 -->
    <form id="hospitalFilterForm"
          th:action="@{/hospital/list}"
          method="get"
          class="hospital-filter-wrap"
          th:data-ajax-url="@{/hospital/list/ajax}"
          th:data-page-url="@{/hospital/list}">

        <!-- 동물 분류 -->
        <div class="filter-box">
            <div class="filter-title-row">
                <h3>동물 분류</h3>
                <span>하나만 선택 가능</span>
            </div>

            <div class="radio-group">
                <label class="filter-radio">
                    <input type="radio"
                           name="animalId"
                           value=""
                           th:checked="${animalId == null}">
                    <span>전체</span>
                </label>

                <label class="filter-radio"
                       th:each="animal : ${animalTypeList}">
                    <input type="radio"
                           name="animalId"
                           th:value="${animal.animalId}"
                           th:checked="${animalId != null and animalId == animal.animalId}">
                    <span th:text="${animal.animalName}">강아지</span>
                </label>
            </div>
        </div>

        <!-- 지역 분류 -->
        <div class="filter-box">
            <div class="filter-title-row">
                <h3>지역 분류</h3>
                <span>여러 개 선택 가능</span>
            </div>

            <div class="checkbox-group region-checkbox-group">

                <!-- 서울 전체 -->
                <label class="filter-check seoul-all-check">
                    <input type="checkbox"
                           id="seoulAll"
                           th:checked="${districts == null or districts.size() == 0}">
                    <span>서울 전체</span>
                </label>

                <!-- 지역 목록 -->
                <label class="filter-check"
                       th:each="item : ${districtList}">
                    <input type="checkbox"
                           name="districts"
                           th:value="${item}"
                           th:checked="${districts != null and districts.contains(item)}">
                    <span th:text="${item}">강남구</span>
                </label>

            </div>
        </div>

        <!-- 검색 영역 -->
        <div class="filter-box filter-search-box">
            <div class="filter-title-row">
                <h3>검색</h3>
                <span>검색어는 검색 버튼을 눌러야 적용</span>
            </div>

            <div class="hospital-search-form">
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       placeholder="병원명 또는 주소를 입력하세요">

                <button type="submit">검색</button>

                <a th:href="@{/hospital/list}" id="resetButton" class="reset-button">
                    초기화
                </a>
            </div>
        </div>

    </form>

    <!-- Ajax로 교체될 영역 시작 -->
    <div id="hospitalResultArea" th:fragment="hospitalResultArea" class="hospital-result-area">

        <!-- 검색 결과 개수 -->
        <section class="hospital-result-top">
            <div>
                <p class="result-label">검색 결과</p>
                <p class="result-count">
                    총
                    <strong th:text="${#lists.size(hospitalList)}">0</strong>
                    개의 병원이 검색되었습니다.
                </p>
            </div>
        </section>

        <!-- 병원 목록 -->
        <section class="hospital-card-list">

            <article class="hospital-card" th:each="hospital : ${hospitalList}">

                <!-- 병원 이미지 -->
                <div class="hospital-image">
                    <img th:if="${hospital.imageUrl != null and hospital.imageUrl != ''}"
                         th:src="${hospital.imageUrl}"
                         alt="병원 이미지">

                    <div th:if="${hospital.imageUrl == null or hospital.imageUrl == ''}"
                         class="no-image">
                        <span>병원</span>
                    </div>
                </div>

                <!-- 병원 정보 -->
                <div class="hospital-info">

                    <div class="hospital-title-row">
                        <div>
                            <span class="district-badge" th:text="${hospital.district}">강남구</span>
                            <h2 th:text="${hospital.name}">병원명</h2>
                        </div>
                    </div>

                    <div class="hospital-detail-list">
                        <p>
                            <span class="detail-label">주소</span>
                            <span th:text="${hospital.address}">서울시 강남구...</span>
                        </p>

                        <p>
                            <span class="detail-label">전화</span>
                            <span th:text="${hospital.phone != null and hospital.phone != '' ? hospital.phone : '정보 없음'}">
                                정보 없음
                            </span>
                        </p>

                        <p>
                            <span class="detail-label">영업시간</span>
                            <span th:text="${hospital.openTime != null and hospital.openTime != '' ? hospital.openTime : '정보 없음'}">
                                정보 없음
                            </span>
                        </p>
                    </div>

                    <div class="hospital-actions">
                        <a class="detail-button"
                           th:href="@{/hospital/view(hospitalId=${hospital.hospitalId})}">
                            상세보기
                        </a>

                        <a class="site-button"
                           th:if="${hospital.websiteUrl != null and hospital.websiteUrl != ''}"
                           th:href="${hospital.websiteUrl}"
                           target="_blank">
                            병원 사이트
                        </a>
                    </div>
                </div>
            </article>

            <!-- 병원 목록이 없을 때 -->
            <div th:if="${#lists.isEmpty(hospitalList)}" class="empty-list">
                <strong>검색된 병원이 없습니다.</strong>
                <p>동물 분류, 지역, 검색어 조건을 다시 확인해 주세요.</p>
            </div>

        </section>

    </div>
    <!-- Ajax로 교체될 영역 끝 -->

</main>

<!-- 병원 목록 JS -->
<script th:src="@{/js/hospital/list.js}"></script>

</body>
</html>
