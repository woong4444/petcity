<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>병원장 신청 관리</title>

    <!-- 관리자 사이드바 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/admin/sidebar.css}">

    <!-- 병원장 신청 목록 CSS -->
    <link rel="stylesheet"
          th:href="@{/css/admin/hospital-owner-request-list.css}">

    <!-- 관리자 사이드바 JS -->
    <script defer
            th:src="@{/js/admin/sidebar.js}">
    </script>
</head>

<body>

<div class="admin-layout">

    <!-- 관리자 사이드바 -->
    <th:block
            th:replace="~{admin/fragments/sidebar
                :: sidebar('ownerRequests')}">
    </th:block>


    <!-- 관리자 본문 -->
    <main class="admin-main request-main">

        <!-- ========================================
             페이지 제목
        ========================================= -->
        <header class="page-header">

            <div>

                <h2 class="page-title">
                    병원장 신청 관리
                </h2>

                <p class="page-description">
                    병원장 권한 신청 내역과 제출 서류,
                    처리 상태를 확인합니다.
                </p>

            </div>

        </header>


        <!-- ========================================
             검색 및 상태 필터
        ========================================= -->
        <form class="request-filter-form"
              th:action="@{/admin/hospital-owner-requests}"
              method="get">

            <!-- 검색 시 첫 페이지부터 조회 -->
            <input type="hidden"
                   name="page"
                   value="1">


            <!-- 현재 정렬 조건 유지 -->
            <input type="hidden"
                   name="sort"
                   th:value="${pageList.sort}">

            <input type="hidden"
                   name="direction"
                   th:value="${pageList.direction}">


            <!-- 검색어 -->
            <div class="request-search-area">

                <label for="keyword"
                       class="filter-label">
                    신청 정보 검색
                </label>

                <input type="search"
                       id="keyword"
                       name="keyword"
                       class="request-search-input"
                       placeholder="병원 이름 또는 병원장 이름 검색"
                       autocomplete="off"
                       th:value="${pageList.keyword}">

            </div>


            <!-- 신청 상태 -->
            <div class="request-filter-item">

                <label for="status"
                       class="filter-label">
                    신청 상태
                </label>

                <select id="status"
                        name="status"
                        class="request-filter-select">

                    <option value=""
                            th:selected="${pageList.status == ''}">
                        전체 신청 상태
                    </option>

                    <option value="PENDING"
                            th:selected="${pageList.status == 'PENDING'}">
                        PENDING
                    </option>

                    <option value="APPROVED"
                            th:selected="${pageList.status == 'APPROVED'}">
                        APPROVED
                    </option>

                    <option value="REJECTED"
                            th:selected="${pageList.status == 'REJECTED'}">
                        REJECTED
                    </option>

                </select>

            </div>


            <!-- 검색 및 초기화 버튼 -->
            <div class="request-filter-buttons">

                <button type="submit"
                        class="request-search-button">
                    검색
                </button>

                <a class="request-filter-reset-button"
                   th:href="@{/admin/hospital-owner-requests(
                        page=1,
                        sort=${pageList.sort},
                        direction=${pageList.direction}
                   )}">
                    초기화
                </a>

            </div>

        </form>


        <!-- ========================================
             병원장 신청 목록 카드
        ========================================= -->
        <section class="request-card">

            <!-- 카드 상단 -->
            <div class="request-card-header">

                <h3 class="request-card-title">
                    전체 신청
                </h3>


                <p class="request-count">

                    총

                    <strong th:text="${pageList.totalElements}">
                        0
                    </strong>

                    건

                </p>

            </div>


            <!-- ========================================
                 신청 목록 테이블
            ========================================= -->
            <div class="request-table-wrapper">

                <table class="request-table">

                    <!-- 테이블 열 너비 -->
                    <colgroup>

                        <col class="column-request-id">

                        <col class="column-member">

                        <col class="column-hospital">

                        <col class="column-business-number">

                        <col class="column-document">

                        <col class="column-request-status">

                        <col class="column-reject-reason">

                        <col class="column-created-at">

                        <col class="column-processed-at">

                        <col class="column-action">

                    </colgroup>


                    <!-- ========================================
                         테이블 헤더
                    ========================================= -->
                    <thead>

                    <tr>

                        <!-- 신청 번호 정렬 -->
                        <th class="center-cell">

                            <a class="sort-link"
                               th:classappend="${pageList.sort == 'requestId'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='requestId',
                                    direction=${pageList.sort == 'requestId'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                신청 번호

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'requestId'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 회원 정보 정렬 -->
                        <th>

                            <a class="sort-link"
                               th:classappend="${pageList.sort == 'memberInfo'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='memberInfo',
                                    direction=${pageList.sort == 'memberInfo'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                회원 정보

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'memberInfo'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 병원 정보 정렬 -->
                        <th>

                            <a class="sort-link"
                               th:classappend="${pageList.sort == 'hospitalInfo'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='hospitalInfo',
                                    direction=${pageList.sort == 'hospitalInfo'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                병원 정보

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'hospitalInfo'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 사업자 번호 -->
                        <th>
                            사업자 번호
                        </th>


                        <!-- 제출 서류 -->
                        <th class="center-cell">
                            서류
                        </th>


                        <!-- 신청 상태 정렬 -->
                        <th class="center-cell">

                            <a class="sort-link center-sort-link"
                               th:classappend="${pageList.sort == 'status'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='status',
                                    direction=${pageList.sort == 'status'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                상태

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'status'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 반려 사유 정렬 -->
                        <th>

                            <a class="sort-link"
                               th:classappend="${pageList.sort == 'rejectReason'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='rejectReason',
                                    direction=${pageList.sort == 'rejectReason'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                반려 사유

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'rejectReason'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 신청일 정렬 -->
                        <th class="center-cell">

                            <a class="sort-link center-sort-link"
                               th:classappend="${pageList.sort == 'createdAt'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='createdAt',
                                    direction=${pageList.sort == 'createdAt'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                신청일

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'createdAt'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 처리일 정렬 -->
                        <th class="center-cell">

                            <a class="sort-link center-sort-link"
                               th:classappend="${pageList.sort == 'processedAt'
                                    ? ' active'
                                    : ''}"

                               th:href="@{/admin/hospital-owner-requests(
                                    page=1,
                                    sort='processedAt',
                                    direction=${pageList.sort == 'processedAt'
                                        and pageList.direction == 'asc'
                                            ? 'desc'
                                            : 'asc'},
                                    keyword=${pageList.keyword},
                                    status=${pageList.status}
                               )}">

                                처리일

                                <span class="sort-arrow"
                                      th:text="${pageList.sort == 'processedAt'
                                            ? (pageList.direction == 'asc'
                                                ? '▲'
                                                : '▼')
                                            : '↕'}">
                                    ↕
                                </span>

                            </a>

                        </th>


                        <!-- 상세 관리 -->
                        <th class="center-cell">
                            관리
                        </th>

                    </tr>

                    </thead>


                    <!-- ========================================
                         신청 목록
                    ========================================= -->
                    <tbody>

                    <tr th:each="request : ${requests}">

                        <!-- 신청 번호 -->
                        <td class="request-id-cell"
                            th:text="${request.requestId}">
                            1
                        </td>


                        <!-- 회원 정보 -->
                        <td>

                            <div class="request-info">

                                <strong th:text="${request.nickname != null
                                    and not #strings.isEmpty(request.nickname)
                                        ? request.nickname
                                        : '-'}">
                                    회원 닉네임
                                </strong>
                            </div>
                        </td>


                        <!-- 병원 정보 -->
                        <td>

                            <div class="request-info">

                                <strong th:text="${request.hospitalName != null
                                    and not #strings.isEmpty(request.hospitalName)
                                        ? request.hospitalName
                                        : '-'}">
                                    동물병원
                                </strong>

                                <small th:text="|병원 번호 ${request.hospitalId}|">
                                    병원 번호 1
                                </small>

                            </div>

                        </td>


                        <!-- 사업자 번호 -->
                        <td class="business-number-cell"
                            th:text="${request.businessNumber != null
                                and not #strings.isEmpty(request.businessNumber)
                                    ? request.businessNumber
                                    : '-'}">
                            123-45-67890
                        </td>


                        <!-- PDF 서류 -->
                        <td class="center-cell">

                            <a class="document-button"
                               th:if="${request.documentUrl != null
                                   and not #strings.isEmpty(
                                       request.documentUrl
                                   )}"

                               th:href="${request.documentUrl}"

                               target="_blank"
                               rel="noopener noreferrer">
                                PDF 보기
                            </a>


                            <span class="empty-value"
                                  th:unless="${request.documentUrl != null
                                      and not #strings.isEmpty(
                                          request.documentUrl
                                      )}">
                                -
                            </span>

                        </td>


                        <!-- 신청 상태 -->
                        <td class="center-cell">

                            <span class="request-status-badge"
                                  th:classappend="${request.status != null
                                      ? ' status-' +
                                          #strings.toLowerCase(
                                              #strings.trim(
                                                  request.status
                                              )
                                          )
                                      : ''}"

                                  th:text="${request.status != null
                                      ? request.status
                                      : '-'}">
                                PENDING
                            </span>

                        </td>


                        <!-- 반려 사유 -->
                        <td>

                            <p class="reject-reason"
                               th:title="${request.rejectReason}"

                               th:text="${request.rejectReason != null
                                   and not #strings.isEmpty(
                                       request.rejectReason
                                   )
                                       ? request.rejectReason
                                       : '-'}">
                                -
                            </p>

                        </td>


                        <!-- 신청일 -->
                        <td class="request-date-cell"
                            th:text="${request.createdAt != null
                                ? #temporals.format(
                                    request.createdAt,
                                    'yyyy-MM-dd HH:mm'
                                  )
                                : '-'}">
                            -
                        </td>


                        <!-- 처리일 -->
                        <td class="request-date-cell"
                            th:text="${request.processedAt != null
                                ? #temporals.format(
                                    request.processedAt,
                                    'yyyy-MM-dd HH:mm'
                                  )
                                : '-'}">
                            -
                        </td>


                        <!-- 상세 -->
                        <td class="center-cell">

                            <a class="detail-button"
                               th:href="@{/admin/hospital-owner-requests/{requestId}(
                                    requestId=${request.requestId}
                               )}">

                                상세

                                <span class="detail-arrow">
                                    ›
                                </span>

                            </a>

                        </td>

                    </tr>


                    <!-- 검색 결과 없음 -->
                    <tr th:if="${#lists.isEmpty(requests)}">

                        <td colspan="10"
                            class="empty-request-row">
                            검색 조건에 해당하는 병원장 신청 내역이 없습니다.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>


            <!-- ========================================
                 페이지네이션
            ========================================= -->
            <nav class="pagination"
                 th:if="${pageList.totalPages > 1}"
                 aria-label="병원장 신청 목록 페이지">


                <!-- 이전 페이지 -->
                <a th:if="${pageList.hasPrevious}"

                   th:href="@{/admin/hospital-owner-requests(
                        page=${pageList.currentPage - 1},
                        sort=${pageList.sort},
                        direction=${pageList.direction},
                        keyword=${pageList.keyword},
                        status=${pageList.status}
                   )}"

                   class="pagination-link pagination-direction">

                    이전

                </a>


                <span th:unless="${pageList.hasPrevious}"
                      class="pagination-link pagination-direction disabled">

                    이전

                </span>


                <!-- 페이지 번호 -->
                <a th:each="pageNumber : ${#numbers.sequence(
                        pageList.startPage,
                        pageList.endPage
                   )}"

                   th:href="@{/admin/hospital-owner-requests(
                        page=${pageNumber},
                        sort=${pageList.sort},
                        direction=${pageList.direction},
                        keyword=${pageList.keyword},
                        status=${pageList.status}
                   )}"

                   th:text="${pageNumber}"

                   class="pagination-link"

                   th:classappend="${pageNumber
                        == pageList.currentPage
                            ? ' active'
                            : ''}">

                    1

                </a>


                <!-- 다음 페이지 -->
                <a th:if="${pageList.hasNext}"

                   th:href="@{/admin/hospital-owner-requests(
                        page=${pageList.currentPage + 1},
                        sort=${pageList.sort},
                        direction=${pageList.direction},
                        keyword=${pageList.keyword},
                        status=${pageList.status}
                   )}"

                   class="pagination-link pagination-direction">

                    다음

                </a>


                <span th:unless="${pageList.hasNext}"
                      class="pagination-link pagination-direction disabled">

                    다음

                </span>

            </nav>

        </section>

    </main>

</div>

</body>
</html>
