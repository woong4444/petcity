<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>병원장 신청 관리</title>

    <link rel="stylesheet"
          th:href="@{/css/admin/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/hospital-owner-request-list.css}">

    <script defer
            th:src="@{/js/admin/sidebar.js}">
    </script>
</head>

<body>

<div class="admin-layout">

    <!-- 관리자 사이드바 -->
    <th:block
            th:replace="~{admin/fragments/sidebar :: sidebar('ownerRequests')}">
    </th:block>


    <main class="admin-main request-main">

        <div class="request-container">

            <!-- 페이지 상단 -->
            <header class="request-page-header">

                <div>
                    <h2 class="request-page-title">
                        병원장 신청 관리
                    </h2>

                    <p class="request-page-description">
                        병원장 권한 신청 내역과 제출 정보를 확인합니다.
                    </p>
                </div>

                <div class="request-count-box">

                    전체 신청

                    <strong th:text="${requestCount}">
                        0
                    </strong>

                    건

                </div>

            </header>


            <!-- 신청 목록 카드 -->
            <section class="request-list-card">

                <div class="table-wrapper">

                    <table class="request-table">

                        <thead>

                        <tr>
                            <th>신청 번호</th>
                            <th>회원 정보</th>
                            <th>병원 정보</th>
                            <th>사업자 번호</th>
                            <th>서류</th>
                            <th>상태</th>
                            <th>반려 사유</th>
                            <th>신청일</th>
                            <th>처리일</th>
                            <th>관리</th>
                        </tr>

                        </thead>


                        <tbody>

                        <!-- 데이터가 없는 경우 -->
                        <tr th:if="${#lists.isEmpty(requests)}">

                            <td colspan="10"
                                class="empty-cell">
                                등록된 병원장 신청 내역이 없습니다.
                            </td>

                        </tr>


                        <!-- 신청 목록 -->
                        <tr th:each="request : ${requests}">

                            <!-- 신청 번호 -->
                            <td>

                                <strong th:text="${request.requestId}">
                                    1
                                </strong>

                            </td>


                            <!-- 회원 정보 -->
                            <td>

                                <div class="member-info">

                                    <strong th:text="${request.nickname != null
                                        ? request.nickname
                                        : '-'}">
                                        회원 닉네임
                                    </strong>

                                    <span th:text="${request.loginId != null
                                        ? request.loginId
                                        : '-'}">
                                        login01
                                    </span>

                                    <small th:text="|회원 번호 ${request.memberId}|">
                                        회원 번호 1
                                    </small>

                                </div>

                            </td>


                            <!-- 병원 정보 -->
                            <td>

                                <div class="hospital-info">

                                    <strong th:text="${request.hospitalName != null
                                        ? request.hospitalName
                                        : '-'}">
                                        동물병원
                                    </strong>

                                    <small th:text="|병원 번호 ${request.hospitalId}|">
                                        병원 번호 1
                                    </small>

                                </div>

                            </td>


                            <!-- 사업자 번호 -->
                            <td th:text="${request.businessNumber != null
                                ? request.businessNumber
                                : '-'}">
                                000-00-00000
                            </td>


                            <!-- 제출 서류 -->
                            <td>

                                <a class="document-link"
                                   th:if="${request.documentUrl != null
                                       and not #strings.isEmpty(request.documentUrl)}"
                                   th:href="${request.documentUrl}"
                                   target="_blank"
                                   rel="noopener noreferrer">
                                    서류 보기
                                </a>

                                <span th:unless="${request.documentUrl != null
                                    and not #strings.isEmpty(request.documentUrl)}">
                                    -
                                </span>

                            </td>


                            <!-- 상태 -->
                            <td>

                                <span class="status-badge"
                                      th:classappend="${' status-' +
                                          #strings.toLowerCase(request.status)}"
                                      th:text="${request.status}">
                                    PENDING
                                </span>

                            </td>


                            <!-- 반려 사유 -->
                            <td class="reject-reason-cell"
                                th:text="${request.rejectReason != null
                                    and not #strings.isEmpty(request.rejectReason)
                                        ? request.rejectReason
                                        : '-'}">
                                -
                            </td>


                            <!-- 신청일 -->
                            <td th:text="${request.createdAt != null
                                ? #temporals.format(
                                    request.createdAt,
                                    'yyyy-MM-dd HH:mm'
                                  )
                                : '-'}">
                                -
                            </td>


                            <!-- 처리일 -->
                            <td th:text="${request.processedAt != null
                                ? #temporals.format(
                                    request.processedAt,
                                    'yyyy-MM-dd HH:mm'
                                  )
                                : '-'}">
                                -
                            </td>


                            <!-- 상세 -->
                            <td>

                                <a class="detail-button"
                                   th:href="@{/admin/hospital-owner-requests/{requestId}(
                                       requestId=${request.requestId}
                                   )}">
                                    상세
                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </section>

        </div>

    </main>

</div>

</body>
</html>
