<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<body>

<aside class="admin-sidebar"
       th:fragment="sidebar(activeMenu)">

    <div class="sidebar-header">

        <a th:href="@{/admin/dashboard}"
           class="admin-brand">

            <span class="brand-mark">
                P
            </span>

            <span class="brand-text">
                PET ADMIN
            </span>

        </a>

        <button type="button"
                id="sidebarToggle"
                class="sidebar-toggle"
                aria-label="사이드바 접기"
                aria-expanded="true">

            <svg viewBox="0 0 24 24"
                 aria-hidden="true">
                <path d="M15 18L9 12L15 6"/>
            </svg>

        </button>

    </div>

    <nav class="admin-nav">

        <!-- 대시보드 -->
        <a th:href="@{/admin/dashboard}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'dashboard' ? ' active' : ''}"
           data-tooltip="대시보드">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="3" y="3"
                          width="7" height="7"/>
                    <rect x="14" y="3"
                          width="7" height="7"/>
                    <rect x="3" y="14"
                          width="7" height="7"/>
                    <rect x="14" y="14"
                          width="7" height="7"/>
                </svg>
            </span>

            <span class="nav-label">
                대시보드
            </span>

        </a>

        <!-- 병원 관리 -->
        <a href="#"
           class="admin-nav-link"
           data-tooltip="병원 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <path d="M4 21V7L12 3L20 7V21"/>
                    <path d="M9 21V15H15V21"/>
                    <path d="M9 9H15"/>
                    <path d="M12 6V12"/>
                </svg>
            </span>

            <span class="nav-label">
                병원 관리
            </span>

        </a>

        <!-- 회원 관리 -->
        <a th:href="@{/admin/members}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'members' ? ' active' : ''}"
           data-tooltip="회원 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <circle cx="9" cy="8" r="4"/>
                    <path d="M3 21V18C3 15.8 4.8 14 7 14H11C13.2 14 15 15.8 15 18V21"/>
                    <path d="M16 5.5C18.2 6.1 19.5 8.3 18.9 10.5"/>
                    <path d="M17 14C19.2 14 21 15.8 21 18V21"/>
                </svg>
            </span>

            <span class="nav-label">
                회원 관리
            </span>

        </a>

        <!-- 병원장 신청 -->
        <a href="#"
           class="admin-nav-link"
           data-tooltip="병원장 신청">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="5" y="3"
                          width="14" height="18"
                          rx="2"/>
                    <path d="M9 3V6H15V3"/>
                    <path d="M8 11H16"/>
                    <path d="M8 15H13"/>
                </svg>
            </span>

            <span class="nav-label">
                병원장 신청
            </span>

        </a>

        <!-- 리뷰 관리 -->
        <a href="#"
           class="admin-nav-link"
           data-tooltip="리뷰 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <path d="M12 3L14.8 8.7L21 9.6L16.5 14L17.6 20.2L12 17.3L6.4 20.2L7.5 14L3 9.6L9.2 8.7Z"/>
                </svg>
            </span>

            <span class="nav-label">
                리뷰 관리
            </span>

        </a>

        <!-- 게시판 관리 -->
        <a href="#"
           class="admin-nav-link"
           data-tooltip="게시판 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="3" y="4"
                          width="18" height="16"
                          rx="2"/>
                    <path d="M7 9H17"/>
                    <path d="M7 13H17"/>
                    <path d="M7 17H13"/>
                </svg>
            </span>

            <span class="nav-label">
                게시판 관리
            </span>

        </a>

        <!-- 메인 배너 관리 -->
        <a href="#"
           class="admin-nav-link"
           data-tooltip="메인 배너 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="3" y="4"
                          width="18" height="16"
                          rx="2"/>
                    <circle cx="9" cy="10" r="2"/>
                    <path d="M3 17L8 13L12 16L16 11L21 16"/>
                </svg>
            </span>

            <span class="nav-label">
                메인 배너 관리
            </span>

        </a>
        <a th:href="@{/member/logout}" id="adminLogoutLink"
           class="admin-nav-link">
            로그아웃
        </a>
    </nav>

</aside>

</body>
</html>
