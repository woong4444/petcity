<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<body>

<aside class="admin-sidebar"
       th:fragment="sidebar(activeMenu)">

    <div class="sidebar-header">

        <a th:href="@{/admin/dashboard}"
           class="admin-brand">

            <span class="brand-mark">
                P
            </span>

            <span class="brand-text">
                PET ADMIN
            </span>

        </a>

        <button type="button"
                id="sidebarToggle"
                class="sidebar-toggle"
                aria-label="사이드바 접기"
                aria-expanded="true">

            <svg viewBox="0 0 24 24"
                 aria-hidden="true">
                <path d="M15 18L9 12L15 6"/>
            </svg>

        </button>

    </div>

    <nav class="admin-nav">

        <a th:href="@{/admin/dashboard}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'dashboard' ? ' active' : ''}"
           data-tooltip="대시보드">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="3"
                          y="3"
                          width="7"
                          height="7"/>
                    <rect x="14"
                          y="3"
                          width="7"
                          height="7"/>
                    <rect x="3"
                          y="14"
                          width="7"
                          height="7"/>
                    <rect x="14"
                          y="14"
                          width="7"
                          height="7"/>
                </svg>
            </span>

            <span class="nav-label">
                대시보드
            </span>

        </a>

        <a th:href="@{/admin/hospitals}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'hospitalManagement' ? ' active' : ''}"
           data-tooltip="병원 관리">

    <span class="nav-icon">
        <svg viewBox="0 0 24 24"
             aria-hidden="true">
            <path d="M4 21V7L12 3L20 7V21"/>
            <path d="M9 21V15H15V21"/>
            <path d="M9 9H15"/>
            <path d="M12 6V12"/>
        </svg>
    </span>

            <span class="nav-label">
        병원 관리
    </span>

        </a>
        <a th:href="@{/admin/members}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'members' ? ' active' : ''}"
           data-tooltip="회원 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <circle cx="9"
                            cy="8"
                            r="4"/>
                    <path d="M3 21V18C3 15.8 4.8 14 7 14H11C13.2 14 15 15.8 15 18V21"/>
                    <path d="M16 5.5C18.2 6.1 19.5 8.3 18.9 10.5"/>
                    <path d="M17 14C19.2 14 21 15.8 21 18V21"/>
                </svg>
            </span>

            <span class="nav-label">
                회원 관리
            </span>

        </a>

        <a th:href="@{/admin/hospital-owner-requests}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'ownerRequests' ? ' active' : ''}"
           data-tooltip="병원장 신청">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="5"
                          y="3"
                          width="14"
                          height="18"
                          rx="2"/>
                    <path d="M9 3V6H15V3"/>
                    <path d="M8 11H16"/>
                    <path d="M8 15H13"/>
                </svg>
            </span>

            <span class="nav-label">
                병원장 신청
            </span>

        </a>

        <a th:href="@{/admin/main-banners}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'main-banners' ? ' active' : ''}"
           data-tooltip="메인 배너 관리">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <rect x="3"
                          y="4"
                          width="18"
                          height="16"
                          rx="2"/>
                    <circle cx="9"
                            cy="10"
                            r="2"/>
                    <path d="M3 17L8 13L12 16L16 11L21 16"/>
                </svg>
            </span>

            <span class="nav-label">
                메인 배너 관리
            </span>

        </a>

        <a th:href="@{/admin/visitor-statistics}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'visitorStatistics' ? ' active' : ''}"
           data-tooltip="방문자 통계">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <path d="M4 20V10"/>
                    <path d="M10 20V4"/>
                    <path d="M16 20V13"/>
                    <path d="M22 20V7"/>
                    <path d="M2 20H22"/>
                </svg>
            </span>

            <span class="nav-label">
                방문자 통계
            </span>

        </a>

        <!-- 채팅 관리 -->
        <a th:href="@{/admin/chat}"
           class="admin-nav-link"
           th:classappend="${activeMenu == 'chat' ? ' active' : ''}"
           data-tooltip="채팅 관리">

    <span class="nav-icon">

        <svg viewBox="0 0 24 24"
             aria-hidden="true">

            <path d="M21 15C21 16.1 20.1 17 19 17H8L3 21V5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V15Z"/>

            <path d="M8 8H16"/>

            <path d="M8 12H13"/>

        </svg>

    </span>

            <span class="nav-label">
        채팅 관리
    </span>

        </a>

        <a th:href="@{/member/logout}"
           id="adminLogoutLink"
           class="admin-nav-link">

            <span class="nav-icon">
                <svg viewBox="0 0 24 24"
                     aria-hidden="true">
                    <path d="M10 4H5C3.9 4 3 4.9 3 6V18C3 19.1 3.9 20 5 20H10"/>
                    <path d="M14 8L18 12L14 16"/>
                    <path d="M18 12H8"/>
                </svg>
            </span>

            <span class="nav-label">
                로그아웃
            </span>

        </a>

    </nav>

</aside>

</body>
</html>
