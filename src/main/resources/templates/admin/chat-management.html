<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>관리자 채팅 관리</title>

    <link rel="stylesheet"
          th:href="@{/css/admin/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/admin.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/chat-management.css}">

    <script defer
            th:src="@{/js/admin/sidebar.js}">
    </script>

    <script defer
            src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.2.0/bundles/stomp.umd.min.js">
    </script>

    <script defer
            th:src="@{/js/admin/chat-management.js}">
    </script>

</head>

<body>

<div class="admin-layout">

    <th:block th:replace="~{admin/fragments/sidebar
                           :: sidebar('chat')}">
    </th:block>

    <main id="adminChatPage"
          class="admin-main admin-chat-main"
          th:attr="
              data-chat-view=${chatView},
              data-selected-room-uuid=${selectedRoomUuid}">

        <header class="admin-chat-header">

            <div>

                <span class="admin-chat-category">
                    CUSTOMER SUPPORT
                </span>

                <h1>
                    실시간 채팅 관리
                </h1>

                <p>
                    회원과 비회원의 1:1 상담 문의를 확인하고 답변합니다.
                </p>

            </div>

            <div class="admin-chat-header-actions">

                <button type="button"
                        id="adminChatNotificationButton"
                        class="admin-chat-notification-button">
                    알림·소리 켜기
                </button>

                <a th:href="@{/admin/dashboard}"
                   class="admin-chat-dashboard-link">
                    대시보드로 이동
                </a>

            </div>

        </header>

        <nav class="admin-chat-filter"
             aria-label="채팅방 필터">

            <a th:href="@{/admin/chat}"
               class="admin-chat-filter-link"
               th:classappend="${chatView == 'all' ? ' active' : ''}">
                전체 채팅방
            </a>

            <a th:href="@{/admin/chat(view='unread')}"
               class="admin-chat-filter-link"
               th:classappend="${chatView == 'unread' ? ' active' : ''}">
                안 읽은 채팅방
            </a>

        </nav>

        <section class="admin-chat-layout">

            <aside class="admin-chat-room-panel">

                <div class="admin-chat-panel-header">

                    <div>

                        <span>
                            CHAT ROOMS
                        </span>

                        <h2 th:text="${chatView == 'unread'
                                    ? '안 읽은 채팅방'
                                    : '전체 채팅방'}">
                            전체 채팅방
                        </h2>

                    </div>

                    <button type="button"
                            id="adminChatRoomRefreshButton"
                            class="admin-chat-refresh-button">
                        새로고침
                    </button>

                </div>

                <div id="adminChatRoomList"
                     class="admin-chat-room-list">

                    <div class="admin-chat-placeholder">

                        <strong>
                            채팅방 목록을 불러오는 중입니다.
                        </strong>

                        <p>
                            잠시만 기다려 주세요.
                        </p>

                    </div>

                </div>

            </aside>

            <section class="admin-chat-message-panel">

                <div id="adminChatEmptyState"
                     class="admin-chat-empty-state">

                    <div class="admin-chat-empty-icon">

                        <svg viewBox="0 0 24 24"
                             aria-hidden="true">

                            <path d="M21 15C21 16.1 20.1 17 19 17H8L3 21V5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V15Z">
                            </path>

                            <path d="M8 8H16">
                            </path>

                            <path d="M8 12H13">
                            </path>

                        </svg>

                    </div>

                    <strong>
                        채팅방을 선택해 주세요
                    </strong>

                    <p>
                        왼쪽 목록에서 상담할 채팅방을 선택하면
                        메시지 내용이 표시됩니다.
                    </p>

                </div>

                <div id="adminChatConversation"
                     class="admin-chat-conversation"
                     hidden>

                    <header class="admin-chat-conversation-header">

                        <div>

                            <span id="adminChatRoomStatus"
                                  class="admin-chat-room-status">
                                WAITING
                            </span>

                            <h2 id="adminChatRoomTitle">
                                고객명
                            </h2>

                            <p id="adminChatRoomMeta">
                                채팅방 정보를 불러오는 중입니다.
                            </p>

                        </div>

                        <button type="button"
                                id="adminChatCloseRoomButton"
                                class="admin-chat-close-room-button">
                            상담 종료
                        </button>

                    </header>

                    <div id="adminChatMessageList"
                         class="admin-chat-message-list">
                    </div>

                    <form id="adminChatReplyForm"
                          class="admin-chat-reply-form">

                        <div class="admin-chat-reply-count">
                            <span id="adminChatReplyLength">0</span>
                            / 500
                        </div>

                        <div class="admin-chat-reply-row">

                            <textarea id="adminChatReplyInput"
                                      class="admin-chat-reply-input"
                                      rows="1"
                                      maxlength="500"
                                      placeholder="관리자 답변을 입력해 주세요."></textarea>

                            <button type="submit"
                                    id="adminChatReplySendButton"
                                    class="admin-chat-reply-send-button">
                                전송
                            </button>

                        </div>

                        <p id="adminChatReplyNotice"
                           class="admin-chat-reply-notice">
                            고객에게 실시간으로 답변이 전송됩니다.
                        </p>

                    </form>

                </div>

            </section>

        </section>

    </main>

</div>

<audio id="adminChatAlertSound"
       preload="auto"
       th:src="@{/audio/admin-chat-alert.mp3}">
</audio>

</body>
</html>
