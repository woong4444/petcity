<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>관리자 채팅 관리</title>

    <link rel="stylesheet"
          th:href="@{/css/admin/sidebar.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/admin.css}">

    <link rel="stylesheet"
          th:href="@{/css/admin/chat/chat-management.css}">

    <script defer
            th:src="@{/js/admin/sidebar.js}">
    </script>

</head>

<body>

<div class="admin-layout">

    <th:block th:replace="~{admin/fragments/sidebar
                           :: sidebar('chat')}">
    </th:block>


    <main id="adminChatPage"
          class="admin-main admin-chat-main"
          th:attr="
              data-chat-view=${chatView},
              data-selected-room-uuid=${selectedRoomUuid}">

        <header class="admin-chat-header">

            <div>

                <span class="admin-chat-category">
                    CUSTOMER SUPPORT
                </span>

                <h1>
                    실시간 채팅 관리
                </h1>

                <p>
                    회원과 비회원의 1:1 상담 문의를 확인하고 답변합니다.
                </p>

            </div>

            <a th:href="@{/admin/dashboard}"
               class="admin-chat-dashboard-link">
                대시보드로 이동
            </a>

        </header>


        <!-- 채팅방 필터 -->
        <nav class="admin-chat-filter"
             aria-label="채팅방 필터">

            <a th:href="@{/admin/chat}"
               class="admin-chat-filter-link"
               th:classappend="${chatView == 'all' ? ' active' : ''}">

                <span>
                    전체 채팅방
                </span>

            </a>

            <a th:href="@{/admin/chat(view='unread')}"
               class="admin-chat-filter-link"
               th:classappend="${chatView == 'unread' ? ' active' : ''}">

                <span>
                    안 읽은 채팅방
                </span>

            </a>

        </nav>


        <!-- 채팅 관리 본문 -->
        <section class="admin-chat-layout">

            <!-- 왼쪽 채팅방 목록 -->
            <aside class="admin-chat-room-panel">

                <div class="admin-chat-panel-header">

                    <div>

                        <span>
                            CHAT ROOMS
                        </span>

                        <h2 th:text="${chatView == 'unread'
                                    ? '안 읽은 채팅방'
                                    : '전체 채팅방'}">
                            전체 채팅방
                        </h2>

                    </div>

                    <button type="button"
                            id="adminChatRoomRefreshButton"
                            class="admin-chat-refresh-button">
                        새로고침
                    </button>

                </div>


                <div id="adminChatRoomList"
                     class="admin-chat-room-list">

                    <div class="admin-chat-placeholder">

                        <strong>
                            채팅방 목록 준비 완료
                        </strong>

                        <p>
                            다음 단계에서 관리자 채팅방 API를 연결합니다.
                        </p>

                    </div>

                </div>

            </aside>


            <!-- 오른쪽 메시지 영역 -->
            <section class="admin-chat-message-panel">

                <div id="adminChatEmptyState"
                     class="admin-chat-empty-state">

                    <div class="admin-chat-empty-icon">

                        <svg viewBox="0 0 24 24"
                             aria-hidden="true">

                            <path d="M21 15C21 16.1 20.1 17 19 17H8L3 21V5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V15Z">
                            </path>

                            <path d="M8 8H16">
                            </path>

                            <path d="M8 12H13">
                            </path>

                        </svg>

                    </div>

                    <strong>
                        채팅방을 선택해 주세요
                    </strong>

                    <p>
                        왼쪽 목록에서 상담할 채팅방을 선택하면
                        메시지 내용이 표시됩니다.
                    </p>

                </div>

            </section>

        </section>

    </main>

</div>

</body>
</html>
