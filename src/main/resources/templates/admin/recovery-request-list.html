<!-- 상각_07-19: 회원 탈퇴·복구 보안 감사 이력 조회(1년 보관) -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>탈퇴·복구 이력 | PetCity Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin/sidebar.css}">
    <style>
        body{margin:0;background:#f5f7fb;font-family:sans-serif;color:#101828}.layout{display:flex}.content{margin-left:270px;padding:38px;width:calc(100% - 270px);box-sizing:border-box}.guide{color:#667085}.notice{padding:14px 18px;background:#eff6ff;color:#1d4ed8;border-radius:12px;margin:20px 0}.card{background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 7px 24px #1f355214}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.meta span{display:block;color:#667085;font-size:12px;margin-bottom:5px}.reason{padding:14px;background:#f8fafc;border-radius:10px;margin-top:16px;white-space:pre-wrap}.success{color:#067647}.failure{color:#b42318}.empty{padding:50px;text-align:center;color:#667085}@media(max-width:1000px){.content{margin-left:0;width:100%}.meta{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{admin/fragments/sidebar :: sidebar('recoveryRequests')}"></aside>
    <main class="content">
        <h1>탈퇴·복구 보안 이력</h1>
        <p class="guide">회원 탈퇴와 계정 복구 관련 보안 이벤트를 관리 목적으로 조회합니다.</p>
        <div class="notice">복구코드와 이메일 인증번호 원문은 저장하지 않으며, 이력은 발생일로부터 1년 후 자동 삭제됩니다.</div>
        <div th:if="${#lists.isEmpty(audits)}" class="card empty">등록된 탈퇴·복구 이력이 없습니다.</div>
        <article th:each="audit : ${audits}" class="card">
            <div class="meta">
                <div><span>회원 번호</span><b th:text="${audit.memberId != null ? audit.memberId : '-'}">-</b></div>
                <div><span>아이디</span><b th:text="${audit.loginId}">-</b></div>
                <div><span>닉네임</span><b th:text="${audit.nickname != null ? audit.nickname : '-'}">-</b></div>
                <div><span>가입 방식</span><b th:text="${audit.loginType != null ? audit.loginType : '-'}">-</b></div>
                <div><span>이벤트</span><b th:text="${audit.eventType == 'WITHDRAWAL_REQUESTED' ? '탈퇴 요청' : (audit.eventType == 'ACCOUNT_RECOVERED' ? '탈퇴 취소' : (audit.eventType == 'ACCOUNT_RECOVERY_ATTEMPT' ? '탈퇴 취소 시도' : (audit.eventType == 'RECOVERY_CODE_REISSUED' ? '복구코드 재발급' : (audit.eventType == 'RECOVERY_EMAIL_VERIFICATION' ? '이메일 인증' : audit.eventType))))}">-</b></div>
                <div><span>결과</span><b th:class="${audit.eventResult == 'SUCCESS' ? 'success' : 'failure'}" th:text="${audit.eventResult == 'SUCCESS' ? '성공' : '실패'}">-</b></div>
                <div><span>발생 일시</span><b th:text="${#temporals.format(audit.occurredAt,'yyyy-MM-dd HH:mm:ss')}">-</b></div>
                <div><span>보관 만료일</span><b th:text="${#temporals.format(audit.expiresAt,'yyyy-MM-dd HH:mm:ss')}">-</b></div>
                <div><span>접속 IP</span><b th:text="${audit.ipAddress != null ? audit.ipAddress : '-'}">-</b></div>
            </div>
            <div class="reason"><b>사유/처리 내용</b><br><span th:text="${audit.eventReason != null && !audit.eventReason.isBlank() ? audit.eventReason : '-'}">-</span></div>
        </article>
    </main>
</div>
<script th:src="@{/js/admin/sidebar.js}"></script>
</body>
</html>
