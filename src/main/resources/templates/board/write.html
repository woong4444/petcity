<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${boardTitle} + ' 글쓰기'">게시글 작성</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">

    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <link rel="stylesheet" th:href="@{/css/board/write.css}">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/lang/summernote-ko-KR.min.js"></script>

    <script defer th:src="@{/js/board/board-animal.js}"></script>
    <script defer th:src="@{/js/board/board-image-preview.js}"></script>
    <script defer th:src="@{/js/board/board-editor.js}"></script>
    <script defer
            th:src="@{/js/board/board-text-limit.js}">
    </script>
    <script defer th:src="@{/js/board/board-write-type.js}"></script>
</head>
<body>

<div th:replace="~{common/head :: head}"></div>

<main class="board-write-wrap">

    <div class="board-write-layout">

        <aside class="community-sidebar">

            <div class="community-box">
                <p>COMMUNITY</p>
                <h2>커뮤니티</h2>
            </div>

            <nav class="community-menu">
                <a th:href="@{/board/list(type='QNA')}"
                   th:classappend="${boardType == 'QNA'} ? ' active' : ''">
                    <span>수의사상담</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='FREE')}"
                   th:classappend="${boardType == 'FREE'} ? ' active' : ''">
                    <span>수다마당</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='INFO')}"
                   th:classappend="${boardType == 'INFO'} ? ' active' : ''">
                    <span>펫도감</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='NOTICE')}"
                   th:classappend="${boardType == 'NOTICE'} ? ' active' : ''">
                    <span>공지사항</span>
                    <strong>›</strong>
                </a>
                <a th:href="@{/board/list(type='FAQ', page=1)}"
                   th:classappend="${boardType == 'FAQ'}
        ? ' active' : ''">

                    <span>자주 묻는 질문</span>
                    <strong>›</strong>
                </a>
            </nav>

        </aside>

        <section class="board-write-content">

            <section class="board-write-hero">
                <div>
                    <h1>글쓰기</h1>
                    <p id="boardWriteGuide"
                       th:text="${boardTitle} + '에 게시글을 작성해 주세요.'">
                        PetCity 커뮤니티에 게시글을 작성해 주세요.
                    </p>
                </div>

                <div class="board-write-pet">
                    <span>🐶</span>
                    <span>🐱</span>
                </div>
            </section>

            <form th:action="@{/board/write}"
                  method="post"
                  enctype="multipart/form-data"
                  class="write-form"
                  id="boardWriteForm">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="form-row pretty-row">
                    <label for="boardTypeSelect">게시판 선택</label>

                    <div class="input-box">
                        <select id="boardTypeSelect"
                                name="boardType"
                                class="form-select"
                                required>

                            <option value="QNA"
                                    th:selected="${boardType == 'QNA'}">
                                수의사상담
                            </option>

                            <option value="FREE"
                                    th:selected="${boardType == 'FREE'}">
                                수다마당
                            </option>

                            <option value="INFO"
                                    th:if="${isAdmin}"
                                    th:selected="${boardType == 'INFO'}">
                                펫도감
                            </option>

                            <option value="NOTICE"
                                    th:if="${isAdmin}"
                                    th:selected="${boardType == 'NOTICE'}">
                                공지사항
                            </option>
                            <option value="FAQ"
                                    th:if="${isAdmin}"
                                    th:selected="${boardType == 'FAQ'}">
                                자주 묻는 질문
                            </option>
                        </select>

                        <p class="form-help">
                            작성할 게시판을 선택하세요. 공지사항과 FAQ는 관리자만 작성할 수 있습니다.
                        </p>
                    </div>
                </div>

                <div class="form-row">
                    <label for="title"
                           id="titleLabel">
                        제목
                    </label>

                    <input type="text"
                           id="title"
                           name="title"
                           maxlength="100"
                           th:placeholder="${boardType == 'FAQ'}
           ? '자주 묻는 질문을 입력하세요.'
           : '제목을 입력하세요.'"
                           required>
                </div>

                <div class="form-row content-row editor-row">
                    <label for="content"
                           id="contentLabel">
                        내용
                    </label>

                    <div class="editor-box">
                        <textarea id="content"
                                  name="content"
                                  class="summernote-editor"></textarea>

                        <p class="form-help">
                            본문은 최대 3000자까지 입력할 수 있습니다.
                        </p>
                    </div>
                </div>

                <div id="animalArea">

                    <div class="form-row pretty-row">
                        <label for="parentAnimalSelect">반려동물</label>

                        <div class="input-box">
                            <select id="parentAnimalSelect" class="form-select">
                                <option value="">반려동물 선택</option>

                                <option th:each="animal : ${parentAnimalList}"
                                        th:value="${animal.animalId}"
                                        th:text="${animal.animalName}">
                                    강아지
                                </option>
                            </select>

                            <p class="form-help">
                                강아지, 고양이, 파충류처럼 어떤 반려동물인지 선택하세요.
                            </p>
                        </div>
                    </div>

                    <div class="form-row pretty-row">
                        <label for="childAnimalSelect">품종·종류</label>

                        <div class="input-box">
                            <select id="childAnimalSelect"
                                    name="animalId"
                                    class="form-select">
                                <option value="">먼저 반려동물을 선택하세요</option>
                            </select>

                            <p class="form-help">
                                선택한 반려동물에 맞는 품종 또는 종류를 선택하세요.
                            </p>
                        </div>
                    </div>

                </div>

                <!-- 여기부터 펫도감 전용. 처음에는 화면에서 안 보임 -->
                <div id="infoOnlyArea" style="display: none;">

                    <div class="form-row file-row pretty-row">
                        <label for="infoImage">대표 이미지</label>

                        <div class="file-box pretty-file-box">
                            <input type="file"
                                   id="infoImage"
                                   name="imageFiles"
                                   accept="image/*">

                            <p>펫도감 카드 목록에 표시될 대표 이미지입니다.</p>

                            <div id="imagePreview" class="image-preview-list"></div>
                        </div>
                    </div>

                    <div class="form-row pretty-row">
                        <label for="linkUrl">관련 링크</label>

                        <div class="input-box">
                            <input type="url"
                                   id="linkUrl"
                                   name="linkUrl"
                                   placeholder="https://blog.naver.com/...">

                            <p class="form-help">
                                펫도감 목록에서 대표 이미지를 클릭했을 때 이동할 링크입니다.
                            </p>
                        </div>
                    </div>

                </div>

                <div class="write-buttons">
                    <a th:href="@{/board/list(type=${boardType})}" class="cancel-button">
                        취소
                    </a>

                    <button type="submit" class="submit-button">
                        등록하기
                    </button>
                </div>

            </form>

        </section>

    </div>

</main>

</body>
</html>
