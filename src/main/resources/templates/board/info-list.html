<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>펫도감</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          th:href="@{/css/common/head.css}">

    <link rel="stylesheet"
          th:href="@{/css/board/list.css}">

    <link rel="stylesheet"
          th:href="@{/css/board/info-list.css}">

    <script defer
            th:src="@{/js/board/board-list-refresh.js}">
    </script>
</head>

<body>

<div th:replace="~{common/head :: head}"></div>

<main class="info-wrap">

    <div class="info-layout">

        <!-- 왼쪽 커뮤니티 메뉴 -->
        <aside class="community-sidebar">

            <div class="community-box">
                <p>COMMUNITY</p>
                <h2>커뮤니티</h2>
            </div>

            <nav class="community-menu">

                <a th:href="@{/board/list(type='QNA', page=1)}">
                    <span>수의사상담</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='FREE', page=1)}">
                    <span>수다마당</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='INFO', page=1)}"
                   class="active">

                    <span>펫도감</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='NOTICE', page=1)}">
                    <span>공지사항</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='FAQ', page=1)}">
                    <span>자주 묻는 질문</span>
                    <strong>›</strong>
                </a>

            </nav>

        </aside>


        <!-- 오른쪽 펫도감 -->
        <section class="info-content">

            <section class="info-hero">
                <div class="info-hero-copy">
                    <span class="info-eyebrow">PET ENCYCLOPEDIA</span>

                    <div class="info-title-row">
                        <h1>펫도감</h1>

                        <span class="admin-only-badge">
                🔒 관리자 작성
            </span>
                    </div>

                    <p>
                        반려동물 건강과 생활 정보를 한곳에 모아보세요.
                    </p>
                </div>

                <img class="info-hero-illustration"
                     th:src="@{/images/board/pet-guide-hero.png}"
                     alt="책을 읽는 강아지와 고양이">
            </section>

            <!-- 반려동물 필터 -->
            <section class="info-animal-filter">

                <div class="info-animal-filter-header">
                    <div class="info-animal-filter-title">
                        <strong>반려동물별 보기</strong>
                        <span>관심 있는 반려동물의 펫도감만 모아볼 수 있어요.</span>
                    </div>

                    <a th:href="@{/board/list(type='INFO', page=1)}"
                       class="animal-reset-link">
                        전체 글 보기
                    </a>
                </div>

                <!-- 대분류: 강아지 / 고양이 / 파충류 ... -->
                <div class="animal-filter-block">
                    <div class="animal-filter-label">반려동물</div>

                    <div class="animal-chip-list animal-parent-chip-list">

                        <a th:href="@{/board/list(type='INFO', page=1)}"
                           class="animal-chip animal-chip-parent animal-chip-all"
                           th:classappend="${parentAnimalId == null and animalId == null}
            ? ' active' : ''">
                            <span class="animal-chip-icon">✦</span>
                            <span>전체</span>
                        </a>

                        <a th:each="animal : ${parentAnimalList}"
                           th:href="@{/board/list(
            type='INFO',
            parentAnimalId=${animal.animalId},
            page=1
       )}"
                           class="animal-chip animal-chip-parent"
                           th:classappend="${(parentAnimalId != null
                and parentAnimalId == animal.animalId
                ? ' active'
                : '')
                + (animal.animalName == '강아지'
                ? ' chip-dog'
                : animal.animalName == '고양이'
                ? ' chip-cat'
                : animal.animalName == '파충류'
                ? ' chip-reptile'
                : animal.animalName == '설치류'
                ? ' chip-rodent'
                : animal.animalName == '어류'
                ? ' chip-fish'
                : '')}">

                            <span class="animal-chip-icon"></span>

                            <span th:text="${animal.animalName}">
            강아지
        </span>
                        </a>

                    </div>
                </div>

                <!-- 대분류를 선택했을 때만 세부 품종 표시 -->
                <div class="animal-filter-block animal-detail-filter"
                     th:if="${childAnimalList != null
                and !#lists.isEmpty(childAnimalList)}">

                    <div class="animal-filter-label">세부 선택</div>

                    <div class="animal-chip-list">
                        <a th:href="@{/board/list(
                    type='INFO',
                    parentAnimalId=${parentAnimalId},
                    page=1
               )}"
                           class="animal-chip sub"
                           th:classappend="${animalId == null}
                    ? ' active' : ''">
                            전체
                        </a>

                        <a th:each="animal : ${childAnimalList}"
                           th:href="@{/board/list(
                    type='INFO',
                    parentAnimalId=${parentAnimalId},
                    animalId=${animal.animalId},
                    page=1
               )}"
                           th:text="${animal.animalName}"
                           class="animal-chip sub"
                           th:classappend="${animalId != null
                    and animalId == animal.animalId}
                    ? ' active' : ''">
                            골든리트리버
                        </a>
                    </div>
                </div>
            </section>


            <!-- 카드 목록 -->
            <section class="info-card-list"
                     id="info-card-list">

                <article class="info-card"
                         th:each="board : ${boardList}">

                    <!-- 외부 링크가 있는 경우 -->
                    <a th:if="${board.linkUrl != null
                              and board.linkUrl != ''}"
                       th:href="${board.linkUrl}"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="info-image-link">

                        <img th:if="${board.thumbnailUrl != null
                                    and board.thumbnailUrl != ''}"
                             th:src="${board.thumbnailUrl}"
                             alt="펫도감 이미지">

                        <div th:if="${board.thumbnailUrl == null
                                    or board.thumbnailUrl == ''}"
                             class="no-info-image">

                            이미지 없음
                        </div>

                    </a>


                    <!-- 외부 링크가 없는 경우 -->
                    <a th:unless="${board.linkUrl != null
                                  and board.linkUrl != ''}"
                       th:href="@{/board/view(
                            boardId=${board.boardId}
                       )}"
                       class="info-image-link">

                        <img th:if="${board.thumbnailUrl != null
                                    and board.thumbnailUrl != ''}"
                             th:src="${board.thumbnailUrl}"
                             alt="펫도감 이미지">

                        <div th:if="${board.thumbnailUrl == null
                                    or board.thumbnailUrl == ''}"
                             class="no-info-image">

                            이미지 없음
                        </div>

                    </a>


                    <div class="info-card-body">

                        <div class="info-animal-name"
                             th:if="${board.animalName != null}">

                            <span th:text="${board.parentAnimalName}">
                                강아지
                            </span>

                            <strong>›</strong>

                            <span th:text="${board.animalName}">
                                골든리트리버
                            </span>

                        </div>


                        <h2>

                            <a th:if="${board.linkUrl != null
                                      and board.linkUrl != ''}"
                               th:href="${board.linkUrl}"
                               target="_blank"
                               rel="noopener noreferrer"
                               th:text="${board.title}">

                                펫도감 제목
                            </a>

                            <a th:unless="${board.linkUrl != null
                                          and board.linkUrl != ''}"
                               th:href="@{/board/view(
                                    boardId=${board.boardId}
                               )}"
                               th:text="${board.title}">

                                펫도감 제목
                            </a>

                        </h2>


                        <p th:text="${#temporals.format(
                                board.createdAt,
                                'yyyy.MM.dd'
                            )}">

                            2026.07.09
                        </p>
                        <!-- 관리자 전용 글 관리 버튼 -->
                        <div class="info-admin-actions"
                             th:if="${isAdmin}">

                            <a th:href="@{/board/update(
            boardId=${board.boardId}
        )}"
                               class="info-admin-edit">

                                수정
                            </a>

                            <form th:action="@{/board/delete}"
                                  method="post"
                                  class="info-admin-delete-form"
                                  onsubmit="return confirm('정말 이 펫도감 글을 삭제하시겠습니까?');">

                                <input type="hidden"
                                       name="boardId"
                                       th:value="${board.boardId}">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <button type="submit"
                                        class="info-admin-delete">

                                    삭제
                                </button>
                            </form>
                        </div>

                    </div>

                </article>


                <!-- 글 없음 -->
                <div th:if="${boardList == null
                             or #lists.isEmpty(boardList)}"
                     class="empty-info">

                    등록된 펫도감 글이 없습니다.
                </div>

            </section>


            <!-- 글쓰기 -->
            <div class="info-bottom"
                 th:if="${isAdmin}">

                <a th:href="@{/board/write(type='INFO')}"
                   class="write-button">
                    펫도감 글쓰기
                </a>
            </div>


            <!-- 페이징 -->
            <nav class="board-pagination"
                 th:if="${totalPage > 1}"
                 aria-label="펫도감 페이지">

                <!-- 첫 페이지 -->
                <a th:if="${currentPage > 1}"
                   class="page-button page-move"
                   th:href="@{/board/list(
                        type='INFO',
                        parentAnimalId=${parentAnimalId},
                        animalId=${animalId},
                        page=1
                   )}">

                    &lt;&lt;
                </a>

                <span th:unless="${currentPage > 1}"
                      class="page-button page-disabled">

                    &lt;&lt;
                </span>


                <!-- 이전 묶음 -->
                <a th:if="${hasPreviousBlock}"
                   class="page-button page-move"
                   th:href="@{/board/list(
                        type='INFO',
                        parentAnimalId=${parentAnimalId},
                        animalId=${animalId},
                        page=${previousBlockPage}
                   )}">

                    &lt;
                </a>

                <span th:unless="${hasPreviousBlock}"
                      class="page-button page-disabled">

                    &lt;
                </span>


                <!-- 페이지 번호 -->
                <a th:each="pageNumber : ${#numbers.sequence(
                        startPage,
                        endPage
                    )}"
                   class="page-button"
                   th:classappend="${pageNumber == currentPage}
                        ? ' active' : ''"
                   th:text="${pageNumber}"
                   th:href="@{/board/list(
                        type='INFO',
                        parentAnimalId=${parentAnimalId},
                        animalId=${animalId},
                        page=${pageNumber}
                   )}">

                    1
                </a>


                <!-- 다음 묶음 -->
                <a th:if="${hasNextBlock}"
                   class="page-button page-move"
                   th:href="@{/board/list(
                        type='INFO',
                        parentAnimalId=${parentAnimalId},
                        animalId=${animalId},
                        page=${nextBlockPage}
                   )}">

                    &gt;
                </a>

                <span th:unless="${hasNextBlock}"
                      class="page-button page-disabled">

                    &gt;
                </span>


                <!-- 마지막 페이지 -->
                <a th:if="${currentPage < totalPage}"
                   class="page-button page-move"
                   th:href="@{/board/list(
                        type='INFO',
                        parentAnimalId=${parentAnimalId},
                        animalId=${animalId},
                        page=${totalPage}
                   )}">

                    &gt;&gt;
                </a>

                <span th:unless="${currentPage < totalPage}"
                      class="page-button page-disabled">

                    &gt;&gt;
                </span>

            </nav>

        </section>

    </div>

</main>

<div th:replace="~{common/footer :: footer}"></div>

</body>
</html>
