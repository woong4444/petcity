<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>멍냥백서</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/common/head.css}">
    <link rel="stylesheet" th:href="@{/css/board/info-list.css}">
</head>
<body>

<div th:replace="~{common/head :: head}"></div>

<main class="info-wrap">

    <div class="info-layout">

        <!-- 왼쪽 커뮤니티 메뉴 -->
        <aside class="community-sidebar">

            <div class="community-box">
                <p>COMMUNITY</p>
                <h2>커뮤니티</h2>
            </div>

            <nav class="community-menu">
                <a th:href="@{/board/list(type='QNA')}">
                    <span>수의사상담</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='FREE')}">
                    <span>자유토크</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='INFO')}" class="active">
                    <span>멍냥백서</span>
                    <strong>›</strong>
                </a>

                <a th:href="@{/board/list(type='NOTICE')}">
                    <span>공지사항</span>
                    <strong>›</strong>
                </a>
            </nav>

        </aside>

        <!-- 오른쪽 멍냥백서 -->
        <section class="info-content">

            <section class="info-hero">
                <div>
                    <h1>멍냥백서</h1>
                    <p>반려견, 반려묘 보호자분들을 위한 꿀팁 정보입니다!</p>
                </div>

                <div class="info-pet-banner">
                    <span>🐱</span>
                    <span>🐶</span>
                    <span>🐕</span>
                    <span>🐾</span>
                </div>
            </section>

            <!-- 반려동물 필터 -->
            <section class="info-animal-filter">

                <div class="animal-filter-head">
                    <div>
                        <h3>반려동물별 보기</h3>
                        <p>관심 있는 반려동물의 멍냥백서만 모아볼 수 있어요.</p>
                    </div>

                    <a th:href="@{/board/list(type='INFO')}"
                       class="animal-reset-link">
                        전체 글 보기
                    </a>
                </div>

                <!-- 반려동물 -->
                <div class="animal-filter-block">
                    <div class="animal-filter-label">반려동물</div>

                    <div class="animal-chip-list">
                        <a th:href="@{/board/list(type='INFO')}"
                           class="animal-chip"
                           th:classappend="${parentAnimalId == null and animalId == null} ? ' active' : ''">
                            전체
                        </a>

                        <a th:each="animal : ${parentAnimalList}"
                           th:href="@{/board/list(type='INFO', parentAnimalId=${animal.animalId})}"
                           th:text="${animal.animalName}"
                           class="animal-chip"
                           th:classappend="${parentAnimalId != null and parentAnimalId == animal.animalId} ? ' active' : ''">
                            강아지
                        </a>
                    </div>
                </div>

                <!-- 품종·종류 -->
                <div class="animal-filter-block"
                     th:if="${childAnimalList != null and !#lists.isEmpty(childAnimalList)}">

                    <div class="animal-filter-label">품종·종류</div>

                    <div class="animal-chip-list">
                        <a th:href="@{/board/list(type='INFO', parentAnimalId=${parentAnimalId})}"
                           class="animal-chip sub"
                           th:classappend="${animalId == null} ? ' active' : ''">
                            전체
                        </a>

                        <a th:each="animal : ${childAnimalList}"
                           th:href="@{/board/list(type='INFO', parentAnimalId=${parentAnimalId}, animalId=${animal.animalId})}"
                           th:text="${animal.animalName}"
                           class="animal-chip sub"
                           th:classappend="${animalId != null and animalId == animal.animalId} ? ' active' : ''">
                            골든리트리버
                        </a>
                    </div>
                </div>

            </section>

            <!-- 카드 목록 -->
            <section class="info-card-list">

                <article class="info-card" th:each="board : ${boardList}">

                    <!-- 링크 URL이 있으면 외부 URL로 이동 -->
                    <a th:if="${board.linkUrl != null and board.linkUrl != ''}"
                       th:href="${board.linkUrl}"
                       target="_blank"
                       class="info-image-link">

                        <img th:if="${board.thumbnailUrl != null and board.thumbnailUrl != ''}"
                             th:src="${board.thumbnailUrl}"
                             alt="멍냥백서 이미지">

                        <div th:if="${board.thumbnailUrl == null or board.thumbnailUrl == ''}"
                             class="no-info-image">
                            이미지 없음
                        </div>
                    </a>

                    <!-- 링크 URL이 없으면 상세 페이지로 이동 -->
                    <a th:unless="${board.linkUrl != null and board.linkUrl != ''}"
                       th:href="@{/board/view(boardId=${board.boardId})}"
                       class="info-image-link">

                        <img th:if="${board.thumbnailUrl != null and board.thumbnailUrl != ''}"
                             th:src="${board.thumbnailUrl}"
                             alt="멍냥백서 이미지">

                        <div th:if="${board.thumbnailUrl == null or board.thumbnailUrl == ''}"
                             class="no-info-image">
                            이미지 없음
                        </div>
                    </a>

                    <div class="info-card-body">

                        <div class="info-animal-name"
                             th:if="${board.animalName != null}">
                            <span th:text="${board.parentAnimalName}">강아지</span>
                            <strong>›</strong>
                            <span th:text="${board.animalName}">골든리트리버</span>
                        </div>

                        <h2>
                            <a th:if="${board.linkUrl != null and board.linkUrl != ''}"
                               th:href="${board.linkUrl}"
                               target="_blank"
                               th:text="${board.title}">
                                멍냥백서 제목
                            </a>

                            <a th:unless="${board.linkUrl != null and board.linkUrl != ''}"
                               th:href="@{/board/view(boardId=${board.boardId})}"
                               th:text="${board.title}">
                                멍냥백서 제목
                            </a>
                        </h2>

                        <p th:text="${#temporals.format(board.createdAt, 'yyyy.MM.dd')}">
                            2026.07.09
                        </p>
                    </div>

                </article>

                <div th:if="${#lists.isEmpty(boardList)}" class="empty-info">
                    등록된 멍냥백서 글이 없습니다.
                </div>

            </section>

            <div class="info-bottom">
                <a th:href="@{/board/write(type='INFO')}" class="write-button">
                    글쓰기
                </a>
            </div>

        </section>

    </div>

</main>

</body>
</html>
