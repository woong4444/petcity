<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<body>

<th:block th:fragment="chatbot">

    <link rel="stylesheet"
          th:href="@{/css/common/chatbot.css}">

    <div id="petcityChatbot"
         class="petcity-chatbot">

        <!-- 챗봇 열기 버튼 -->
        <button type="button"
                id="chatbotToggleButton"
                class="chatbot-toggle-button"
                aria-controls="chatbotPanel"
                aria-expanded="false"
                aria-label="PetCity 고객센터 열기">

            <img th:src="@{/images/chatbot/chatbot1.png}"
                 src="/images/chatbot/chatbot1.png"
                 alt="고객센터"
                 class="chatbot-toggle-image">

        </button>


        <!-- 챗봇 패널 -->
        <section id="chatbotPanel"
                 class="chatbot-panel"
                 role="dialog"
                 aria-label="PetCity 고객센터"
                 aria-hidden="true">

            <!-- 챗봇 상단 -->
            <div class="chatbot-header">

                <div class="chatbot-header-info">

                    <div class="chatbot-profile-icon">
                        🐶
                    </div>

                    <div class="chatbot-header-text">

                        <strong>
                            PetCity 고객센터
                        </strong>

                        <p>
                            궁금한 질문을 선택해 주세요.
                        </p>

                    </div>

                </div>


                <div class="chatbot-header-actions">

                    <!-- 사용자 알림 설정 버튼 -->
                    <button type="button"
                            id="customerChatNotificationButton"
                            class="chatbot-notification-button"
                            aria-label="채팅 알림과 소리 켜기"
                            aria-pressed="false">

                        <svg viewBox="0 0 24 24"
                             aria-hidden="true">

                            <path d="M18 8A6 6 0 0 0 6 8
                                     C6 15 3 16 3 16
                                     H21
                                     C21 16 18 15 18 8Z">
                            </path>

                            <path d="M10 20H14">
                            </path>

                        </svg>

                        <span>
                            알림받기
                        </span>

                    </button>


                    <!-- 챗봇 닫기 버튼 -->
                    <button type="button"
                            id="chatbotCloseButton"
                            class="chatbot-close-button"
                            aria-label="챗봇 닫기">

                        ×

                    </button>

                </div>

            </div>


            <!-- 메시지 출력 영역 -->
            <div id="chatbotMessageList"
                 class="chatbot-message-list">
            </div>


            <!-- 1:1 상담 입력 영역 -->
            <form id="chatbotChatForm"
                  class="chatbot-chat-form"
                  hidden>

                <div class="chatbot-chat-count">

                    <span id="chatbotChatLength">
                        0
                    </span>

                    / 500

                </div>


                <div class="chatbot-chat-input-row">

                    <textarea id="chatbotChatInput"
                              class="chatbot-chat-input"
                              rows="1"
                              maxlength="500"
                              placeholder="문의 내용을 입력해 주세요."></textarea>

                    <button type="submit"
                            id="chatbotChatSendButton"
                            class="chatbot-chat-send-button">
                        전송
                    </button>

                </div>


                <p id="chatbotChatNotice"
                   class="chatbot-chat-notice">
                    관리자 답변 전 최대 3개까지 전송할 수 있습니다.
                </p>

            </form>


            <!-- 챗봇 하단 -->
            <div class="chatbot-footer">

                <button type="button"
                        id="chatbotHomeButton"
                        class="chatbot-footer-button">
                    처음으로
                </button>

                <a th:href="@{/board/list(type='FAQ', page=1)}"
                   class="chatbot-footer-link">
                    FAQ 전체 보기
                </a>

            </div>

        </section>

    </div>


    <!-- STOMP 클라이언트 -->
    <script defer
            src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.2.0/bundles/stomp.umd.min.js">
    </script>

    <!-- 챗봇 JavaScript -->
    <script defer
            th:src="@{/js/common/chatbot.js}">
    </script>

</th:block>

</body>
</html>
